<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StockMo | Premium Automotive Logistics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#EB0A1D",
              "on-surface": "#1A1014",
              "secondary": "#6B7280",
              "background": "#F8F5F6",
              "surface": "#FFFFFF",
            },
            fontFamily: {
              "sans": ["Inter", "sans-serif"],
            },
            boxShadow: {
              'card': '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
            background-color: #F8F5F6;
        }
    </style>
</head>
<body class="font-sans text-on-surface antialiased flex flex-col items-center">
<div class="w-[390px] min-h-screen flex flex-col px-4 bg-background">
<!-- Logo Section -->
<header class="pt-12 pb-4 flex flex-col items-center">
<div class="relative mb-1">
<div class="flex items-center justify-center space-x-2">
<div class="w-6 h-1 bg-primary rounded-full rotate-[-45deg] translate-y-1.5"></div>
<span class="text-2xl font-black tracking-tighter text-on-surface">StockMo</span>
<div class="w-6 h-1 bg-primary rounded-full rotate-[45deg] translate-y-1.5"></div>
</div>
</div>
<span class="text-[10px] font-bold tracking-[0.2em] text-secondary uppercase">INVENTORY CONTROL</span>
</header>
<main class="flex flex-col flex-1 pb-8">
<!-- Hero Section -->
<section class="mt-8 mb-4">
<h1 class="text-[18px] font-bold text-on-surface mb-1">Welcome.</h1>
<p class="text-[13px] font-medium text-on-surface">Please select your role to proceed.</p>
</section>
<!-- Role Selection Grid -->
<div class="flex flex-col gap-4 mb-4">
<!-- Technician Card -->
<button class="flex flex-col items-start p-[12px_14px] bg-surface rounded-[14px] border border-[rgba(0,0,0,0.10)] shadow-card text-left transition-transform active:scale-[0.98]">
<div class="flex space-x-3 mb-3 text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="car_repair">car_repair</span>
<span class="material-symbols-outlined text-[20px]" data-icon="build">build</span>
<span class="material-symbols-outlined text-[20px]" data-icon="local_shipping">local_shipping</span>
</div>
<h3 class="text-[15px] font-bold mb-0.5">Technician</h3>
<p class="text-[11px] font-medium text-secondary leading-tight">PDI, Maintenance, and Delivery Operations</p>
</button>
<!-- Administrator Card -->
<button class="flex flex-col items-start p-[12px_14px] bg-surface rounded-[14px] border border-[rgba(0,0,0,0.10)] shadow-card text-left transition-transform active:scale-[0.98]">
<div class="flex space-x-3 mb-3 text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="network_manage">network_manage</span>
<span class="material-symbols-outlined text-[20px]" data-icon="assignment">assignment</span>
<span class="material-symbols-outlined text-[20px]" data-icon="analytics">analytics</span>
</div>
<h3 class="text-[15px] font-bold mb-0.5">Administrator</h3>
<p class="text-[11px] font-medium text-secondary leading-tight">Fleet, Assignments, and Performance Reports</p>
</button>
</div>
<!-- Action Area -->
<div class="mt-auto pt-4">
<button class="w-full bg-primary text-white text-[13px] font-bold py-4 rounded-[10px] tracking-wide active:scale-95 transition-transform">
                    GET STARTED
                </button>
<footer class="mt-6 text-center">
<a class="text-[11px] font-medium tracking-wide text-secondary uppercase" href="#">
                        Need assistance? <span class="text-on-surface font-bold">Contact support</span>
</a>
</footer>
</div>
</main>
</div>
<!-- Decorative Background Element -->
<div class="fixed top-0 right-0 -z-10 opacity-[0.03] pointer-events-none">
<svg fill="none" height="600" viewbox="0 0 400 600" width="400" xmlns="http://www.w3.org/2000/svg">
<path d="M400 0L0 600H400V0Z" fill="#EB0A1D"></path>
</svg>
</div>
</body></html>
