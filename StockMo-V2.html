<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#D0112B"/>
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; object-src 'none'; base-uri 'self';"/>
  <title>StockMo — Automotive Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#D0112B', navy: '#1A1A2E', muted: '#8A8FA3' },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          boxShadow: {
            card: '0 2px 12px rgba(0,0,0,0.06)',
            'card-hover': '0 4px 20px rgba(0,0,0,0.10)',
            'primary-glow': '0 8px 30px rgba(208,17,43,0.28)',
          },
        },
      },
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    html, body { overscroll-behavior-y: none; }
    body { text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    @keyframes slideUp   { from { transform: translateY(100%);  opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    .anim-fade-in    { animation: fadeIn    0.2s ease-out }
    .anim-slide-down { animation: slideDown 0.28s ease-out }
    .anim-slide-up   { animation: slideUp   0.3s  ease-out }

    /* ── Desktop sidebar layout padding ───────────────────────────────────── */
    @media (min-width: 1024px) {
      .desktop-content { padding-left: 240px; }
    }

    /* ── Mobile tap target + touch feedback baseline ──────────────────────── */
    /* Every button/link gets tactile feedback by default; fine-tune per-component. */
    button, [role="button"], a {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    /* Subtle press feedback on every button globally (touch + mouse). */
    button:active:not(:disabled), [role="button"]:active { transform: scale(0.97); }
    button, [role="button"] { transition: transform 0.08s ease-out, background-color 0.15s ease; }
    /* Minimum 44×44pt tap target on small screens, as per Apple HIG. */
    @media (max-width: 767px) {
      button:not(.no-min), [role="button"]:not(.no-min) {
        min-height: 44px;
      }
      /* Icon-only buttons: give them a wider hit box without changing layout */
      button.icon-btn, [role="button"].icon-btn {
        min-width: 44px;
      }
      /* Body text minimums */
      body { font-size: 15px; }
    }
    /* Safe-area helpers (iOS notch / home-indicator) */
    .pb-safe   { padding-bottom: max(env(safe-area-inset-bottom), 0.75rem); }
    .pt-safe   { padding-top:    max(env(safe-area-inset-top),    0.75rem); }
    .pl-safe   { padding-left:   env(safe-area-inset-left); }
    .pr-safe   { padding-right:  env(safe-area-inset-right); }
    /* Bottom nav clears the home indicator */
    .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    /* Avoid iOS 16px auto-zoom on focus: enforce ≥16px font on inputs */
    @media (max-width: 767px) {
      input, select, textarea { font-size: 16px !important; }
    }
    /* Global active feedback for interactive elements on touch */
    .tap-feedback:active { transform: scale(0.98); }
  </style>
</head>
<body class="bg-[#F5F5F5] min-h-screen">
  <div id="root"></div>

  <!-- External libs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!--
    Component files are loaded in dependency order. Each file is a
    <script type="text/babel"> — Babel Standalone fetches, compiles (presets env+react),
    and injects as a classic script; top-level var/function declarations are reachable
    across scripts at script scope. No bundler required; serve via any http server.
  -->

  <!-- 1. Bootstrap: React hooks alias, Supabase client, translations, helpers -->
  <script type="text/babel" data-presets="env,react" src="src/config/bootstrap.jsx?v=20260420"></script>

  <!-- 2. Shared primitives -->
  <script type="text/babel" data-presets="env,react" src="src/shared/utilities.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/shared/Modal.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/shared/BottomSheet.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/shared/useMediaQuery.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/shared/permissions.jsx?v=20260420"></script>

  <!-- 3. Navigation (DesktopSidebar depends on NAV constants in AdminBottomNav/TechBottomNav) -->
  <script type="text/babel" data-presets="env,react" src="src/nav/AdminBottomNav.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/nav/TechBottomNav.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/nav/DesktopSidebar.jsx?v=20260420"></script>

  <!-- 4. Shared UI sub-components -->
  <script type="text/babel" data-presets="env,react" src="src/screens/AccountCard.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/ConfigSubNav.jsx?v=20260420"></script>

  <!-- 5. Screens -->
  <script type="text/babel" data-presets="env,react" src="src/screens/LoginScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TechDashboardScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TechInspectScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TechStockyardScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TechDeliveryScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TechSettingsScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/AdminDashboard.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/FleetListScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/TeamScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/ReportsScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/HoldTrackerScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/SettingsScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/EmployeeSettingsScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/PipelineManagerScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/ChecklistEditorScreen.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/ModelManagerScreen.jsx?v=20260420"></script>

  <!-- 6. Modals -->
  <script type="text/babel" data-presets="env,react" src="src/modals/CameraModal.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/modals/VehicleDetailOverlay.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/modals/NotificationsPanel.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/modals/AddVehicleModal.jsx?v=20260420"></script>
  <script type="text/babel" data-presets="env,react" src="src/modals/ImportFleetModal.jsx?v=20260420"></script>

  <!-- 7. App root & render (App.jsx contains the ReactDOM.createRoot(...).render call) -->
  <script type="text/babel" data-presets="env,react" src="src/App.jsx?v=20260420"></script>
</body>
</html>
