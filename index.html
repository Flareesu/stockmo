    const todayStr = () => new Date().toISOString().slice(0, 10);
    const daysAgo = (d) => { if (!d) return 0; return Math.floor((new Date() - new Date(d)) / 86400000); };
    const addDays = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
    const imgForType = (t) => t === 'sedan' ? IMG_SEDAN : t === 'mpv' ? IMG_LARGE : IMG_SUV;

    const makePdi = () => PDI_ITEMS.map(i => ({ id:i.id, section:i.section, name:i.name, priority:i.priority, state:'pending', note:'' }));
    const makeFinal = () => FINAL_ITEMS.map(i => ({ id:i.id, section:i.section, name:i.name, priority:i.priority, state:'pending', note:'' }));
    const makeMaint = (start) => STOCK_MAINT_TEMPLATE.map(m => ({ id:m.id, name:m.name, freq:m.freq, priority:m.priority, lastDone:start, nextDue:addDays(start, m.freq), note:'' }));

    const pdiProgress = (car) => {
      const done = car.pdiChecks.filter(c => c.state === 'done' || c.state === 'na').length;
      return { done, total: car.pdiChecks.length, pct: car.pdiChecks.length ? Math.round((done / car.pdiChecks.length) * 100) : 0 };
    };
    const finalProgress = (car) => {
      const done = car.finalChecks.filter(c => c.state === 'done' || c.state === 'na').length;
      return { done, total: car.finalChecks.length, pct: car.finalChecks.length ? Math.round((done / car.finalChecks.length) * 100) : 0 };
    };
    const countIssues = (car) => [
      ...(car.pdiChecks  || []),
      ...(car.finalChecks || []),
    ].filter(c => c.state === 'issue').length;
    const hasMaintDue = (car) => car.stockMaint.some(m => daysAgo(m.nextDue) >= 0);
    const countMaintDue = (car) => car.stockMaint.filter(m => daysAgo(m.nextDue) >= 0).length;

        if (!email.trim() || !password) return;
        setLoading(true); setError('');
        const { error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });

    /* ─── TechDashboardScreen ─── */
    function TechDashboardScreen({ navigate, vehicles, currentTechId, onNotificationClick, unreadCount, onOpenDetail, t }) {
      const tech = techById(currentTechId);
      const myCars = vehicles.filter(v => v.assignedTech === currentTechId && v.stage !== 'released');
      const activePdi = myCars.filter(v => v.stage === 'pdi').length;
      const overdue   = myCars.filter(v => v.stage === 'stock' && hasMaintDue(v)).length;
      const holds     = myCars.filter(v => v.stage === 'hold').length;
      const hour = new Date().getHours();
      const greeting = hour < 12 ? t('goodMorning') : hour < 18 ? t('goodAfternoon') : t('goodEvening');

      // Stage config for "my fleet" list
      const stageInfo = {
        port:     { icon:'anchor',        color:'text-orange-500', bg:'bg-orange-50',  label:'At Port'      },
        pdi:      { icon:'checklist',     color:'text-blue-500',   bg:'bg-blue-50',    label:'PDI'          },
        hold:     { icon:'error',         color:'text-red-500',    bg:'bg-red-50',     label:'On Hold'      },
        stock:    { icon:'warehouse',     color:'text-indigo-500', bg:'bg-indigo-50',  label:'In Stock'     },
        ready:    { icon:'local_shipping',color:'text-purple-500', bg:'bg-purple-50',  label:'Ready'        },
        released: { icon:'check_circle',  color:'text-emerald-500',bg:'bg-emerald-50', label:'Released'     },
      };

      const priority = useMemo(() => {
        const items = [];
        myCars.filter(v => v.stage === 'hold').forEach(v => items.push({ v, type:'HOLD', desc:t('issuesFound', {count:countIssues(v)}), icon:'error', color:'text-red-500' }));
        myCars.filter(v => v.stage === 'stock' && hasMaintDue(v)).forEach(v => items.push({ v, type:'OVERDUE', desc:t('tasksOverdue', {count:countMaintDue(v)}), icon:'schedule', color:'text-amber-500' }));
        myCars.filter(v => v.stage === 'pdi').forEach(v => { const p = pdiProgress(v); items.push({ v, type:'PDI', desc:t('complete', {pct:p.pct}), icon:'checklist', color:'text-blue-500' }); });
        myCars.filter(v => v.stage === 'ready').forEach(v => { const p = finalProgress(v); items.push({ v, type:'FINAL', desc:t('complete', {pct:p.pct}), icon:'local_shipping', color:'text-purple-500' }); });
        return items.slice(0, 5);
      }, [vehicles, currentTechId]);

      const recentActivity = useMemo(() => {
        const all = [];
        myCars.forEach(v => v.history.forEach(h => all.push({ text: `${v.label || v.model}: ${h.split(': ').slice(1).join(': ')}`, date: h.split(':')[0] })));
        return all.sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
      }, [vehicles, currentTechId]);

      // Stage sort order for "my fleet"
      const stageOrder = { hold:0, pdi:1, port:2, stock:3, ready:4 };
      const sortedCars = [...myCars].sort((a,b) => (stageOrder[a.stage]??9) - (stageOrder[b.stage]??9));

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 pb-4 shadow-card">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white text-[13px] font-black shadow-md" style={{backgroundColor:tech.color}}>{tech.ini}</div>
                <div>
                  <h1 className="text-[15px] font-bold text-navy">{greeting}, {tech.name.split(' ')[0]}</h1>
                  <p className="text-[11px] text-muted">{tech.role}</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onNotificationClick} className="relative p-2 hover:bg-gray-100 rounded-full transition-colors">
                  <Icon name="notifications" className="text-navy" />
                  {unreadCount > 0 && <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
                </button>
                <button onClick={() => sb.auth.signOut()} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                  <Icon name="logout" className="text-muted text-xl" />
                </button>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-4">
            {/* Stats */}
            <div className="grid grid-cols-3 gap-3">
              {[
                { label:t('assigned'), value:myCars.length, icon:'directions_car', color:'text-navy' },
                { label:t('activePdi'), value:activePdi, icon:'checklist', color:'text-blue-500' },
                { label:t('overdue'), value:overdue, icon:'schedule', color: overdue > 0 ? 'text-red-500' : 'text-emerald-500' },
              ].map(s => (
                <div key={s.label} className="bg-white rounded-[16px] p-3 shadow-card text-center">
                  <Icon name={s.icon} fill className={`${s.color} text-[22px] mb-1`} />
                  <div className="text-xl font-black text-navy">{s.value}</div>
                  <div className="text-[10px] text-muted font-medium leading-tight mt-0.5">{s.label}</div>
                </div>
              ))}
            </div>

            {/* Priority alerts */}
            {priority.length > 0 && (
              <div>
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('priorityQueue')}</h2>
                <div className="space-y-2">
                  {priority.map(p => (
                    <button key={p.v.id + p.type} onClick={() => onOpenDetail(p.v.id)} className="w-full bg-white rounded-[16px] p-3 shadow-card flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                      <div className="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0">
                        <Icon name={p.icon} fill className={`${p.color} text-xl`} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-black text-primary uppercase tracking-wider">{p.v.label || p.v.model}</span>
                          <StatusBadge status={p.v.stage} t={t} />
                        </div>
                        <div className="font-bold text-navy text-[13px] leading-tight">{p.v.model}</div>
                        <div className="text-[11px] text-muted">{p.desc}</div>
                      </div>
                      <Icon name="chevron_right" className="text-muted" />
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* My Fleet — ALL assigned vehicles, every stage */}
            <div>
              <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">My Fleet</h2>
              {sortedCars.length === 0 ? (
                <div className="bg-white rounded-[20px] p-8 shadow-card text-center">
                  <Icon name="directions_car" fill className="text-[40px] text-muted/40 mb-2" />
                  <div className="text-[13px] font-bold text-muted">No vehicles assigned yet</div>
                  <div className="text-[11px] text-muted mt-1">Ask your admin to assign vehicles to you</div>
                </div>
              ) : (
                <div className="space-y-2">
                  {sortedCars.map(v => {
                    const si = stageInfo[v.stage] || stageInfo.port;
                    return (
                      <button key={v.id} onClick={() => onOpenDetail(v.id)}
                        className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                        <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                          <img src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-0.5">
                            <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                            <StatusBadge status={v.stage} t={t} />
                          </div>
                          <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                          <div className="text-[11px] text-muted">{v.color} · {t('lot')} {v.lot}</div>
                        </div>
                        <div className={`w-8 h-8 rounded-full ${si.bg} flex items-center justify-center flex-shrink-0`}>
                          <Icon name={si.icon} fill className={`${si.color} text-[16px]`} />
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Recent activity */}
            {recentActivity.length > 0 && (
              <div>
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('recentActivity')}</h2>
                <div className="bg-white rounded-[20px] overflow-hidden shadow-card">
                  {recentActivity.map((a, i) => (
                    <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i < recentActivity.length - 1 ? 'border-b border-gray-50' : ''}`}>
                      <Icon name="history" fill className="text-muted text-[18px] flex-shrink-0" />
                      <div className="flex-1 min-w-0 text-[12px] font-medium text-navy truncate">{a.text}</div>
                      <div className="text-[10px] text-muted font-medium flex-shrink-0">{a.date}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-home" holdCount={holds} overdueCount={overdue} t={t} />
        </div>
      );
    }

                  <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">

          <TechBottomNav navigate={navigate} currentView="tech-inspect" holdCount={holds} overdueCount={overdueCount} t={t} />
        </div>
      );
    }

    /* ─── TechStockyardScreen ─── */
    function TechStockyardScreen({ navigate, vehicles, currentTechId, onOpenDetail, t }) {
      const [filter, setFilter] = useState('all');
      const [sort, setSort] = useState('overdue');
      const stockCars = vehicles.filter(v => v.stage === 'stock');
      const filtered = useMemo(() => {
        let list = [...stockCars];
        if (filter === 'overdue') list = list.filter(v => hasMaintDue(v));
        else if (filter === 'due_soon') list = list.filter(v => v.stockMaint.some(m => { const d = daysAgo(m.nextDue); return d < 0 && d >= -7; }));
        else if (filter === 'ok') list = list.filter(v => !hasMaintDue(v));
        if (sort === 'overdue') list.sort((a, b) => countMaintDue(b) - countMaintDue(a));
        else if (sort === 'days') list.sort((a, b) => daysAgo(b.stockDate) - daysAgo(a.stockDate));
        else list.sort((a, b) => a.model.localeCompare(b.model));
        return list;
      }, [vehicles, filter, sort]);
      const holds = vehicles.filter(v => v.assignedTech === currentTechId && v.stage === 'hold').length;
      const overdueCount = stockCars.filter(v => hasMaintDue(v)).length;
      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 pb-4 shadow-card">
            <h1 className="text-[22px] font-black text-navy leading-tight">{t('stockyard')}</h1>
            <p className="text-xs text-muted">{t('vehiclesInStock', {count:stockCars.length})}</p>
          </header>
          <div className="bg-white px-4 pb-3 pt-3 flex items-center gap-2 overflow-x-auto no-scroll border-b border-gray-100">
            {[['all',t('filterAll')],['overdue',t('filterOverdue')],['due_soon',t('filterDueSoon')],['ok',t('filterOk')]].map(([val, label]) => (
              <button key={val} onClick={() => setFilter(val)}
                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all ${filter === val ? 'bg-primary text-white shadow-md' : 'bg-gray-100 text-muted hover:bg-gray-200'}`}>
                {label}
              </button>
            ))}
            <select value={sort} onChange={e => setSort(e.target.value)} className="ml-auto flex-shrink-0 text-[11px] font-bold text-muted bg-gray-100 rounded-full px-3 py-1.5 outline-none">
              <option value="overdue">{t('sortOverdueFirst')}</option>
              <option value="days">{t('sortDaysInStock')}</option>
              <option value="alpha">{t('sortAZ')}</option>
            </select>
          </div>
          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-3">
            {filtered.length === 0 && (
              <div className="text-center py-20 text-muted">
                <Icon name="warehouse" fill className="text-[52px] mb-2 opacity-40" />
                <div className="text-[13px] font-bold">{t('noVehiclesMatch')}</div>
              </div>
            )}
            {filtered.map(v => {
              const od = countMaintDue(v);
              const dis = daysAgo(v.stockDate);
              return (
                <button key={v.id} onClick={() => onOpenDetail(v.id)}
                  className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                  <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                    <img src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                      {od > 0 && <span className="bg-red-100 text-red-700 text-[9px] font-black px-1.5 py-0.5 rounded">{t('overdueLabel', {count:od})}</span>}
                    </div>
                    <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                    <div className="text-[11px] text-muted">{t('lot')} {v.lot} · {t('dInStock', {days:dis})}</div>
                  </div>
                  <Icon name="chevron_right" className="text-muted text-xl flex-shrink-0" />
                </button>
              );
            })}
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-stockyard" holdCount={holds} overdueCount={overdueCount} t={t} />
        </div>
      );
    }

    /* ─── TechDeliveryScreen ─── */
    function TechDeliveryScreen({ navigate, vehicles, currentTechId, onOpenDetail, updateVehicle, t }) {
      const readyCars = vehicles.filter(v => v.stage === 'ready');
      const pdiComplete = vehicles.filter(v => v.stage === 'pdi' && pdiProgress(v).pct === 100 && countIssues(v) === 0);

      const overdueCount = vehicles.filter(v => v.stage === 'stock' && hasMaintDue(v)).length;

      const moveToStock = (id) => {
        updateVehicle(id, car => ({
          ...car, stage:'stock', pdiDate:todayStr(), stockDate:todayStr(),
          stockMaint: makeMaint(todayStr()),
          history:[`${todayStr()}: PDI passed — moved to stockyard — ${techById(car.assignedTech).name}`, ...car.history]
        }));
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">

                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('readyForStockyard')}</h2>

                  {pdiComplete.map(v => (
                    <div key={v.id} className="bg-white rounded-[16px] shadow-card p-3">
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-16 h-11 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                          <img src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1">
                          <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                          <div className="font-bold text-navy text-[13px]">{v.model}</div>
                        </div>
                        <StatusBadge status="pdi" t={t} />

                        className="w-full py-2.5 bg-emerald-500 text-white font-bold text-[11px] uppercase tracking-widest rounded-full flex items-center justify-center gap-1.5 hover:bg-emerald-600 active:scale-95 transition-all">
                        <Icon name="check" className="text-sm" /> {t('moveToStockyard')}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div>
              <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('finalInspection')}</h2>
              {readyCars.length === 0 && pdiComplete.length === 0 && (
                <div className="text-center py-20 text-muted">
                  <Icon name="local_shipping" fill className="text-[52px] mb-2 opacity-40" />

              <div className="space-y-2">
                {readyCars.map(v => {
                  const p = finalProgress(v);
                  return (
                    <button key={v.id} onClick={() => onOpenDetail(v.id)}
                      className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                      <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                        <img src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-0.5">
                          <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                          <StatusBadge status="ready" t={t} />
                        </div>
                        <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                        <div className="flex items-center gap-2 mt-1">
                          <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div className="h-full bg-purple-500 rounded-full" style={{ width: `${p.pct}%` }} />
                          </div>
                          <span className="text-[10px] font-bold text-muted">{p.pct}%</span>
                        </div>
                      </div>
                      <Icon name="chevron_right" className="text-muted text-xl flex-shrink-0" />
                    </button>
                  );
                })}
              </div>
            </div>
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-delivery" holdCount={holds} overdueCount={overdueCount} t={t} />
        </div>
      );
    }

    /* ─── CameraModal (desktop getUserMedia live preview) ─── */
    function CameraModal({ onCapture, onClose, onFallback }) {
      const videoRef  = useRef(null);
      const streamRef = useRef(null);
      const [ready, setReady] = useState(false);
      const [error, setError] = useState(false);

      useEffect(() => {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(stream => {
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.onloadedmetadata = () => setReady(true);
            }
          })
          .catch(() => { setError(true); });
        return () => {
          streamRef.current?.getTracks().forEach(t => t.stop());
        };
      }, []);

      const snap = () => {
        const video = videoRef.current;
        if (!video) return;
        const canvas = document.createElement('canvas');
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
          if (blob) onCapture(new File([blob], `snap_${Date.now()}.jpg`, { type: 'image/jpeg' }));
        }, 'image/jpeg', 0.85);
        onClose();
      };

      if (error) {
        return (
          <div className="fixed inset-0 z-[70] bg-black/60 flex items-end justify-center anim-fade-in" onClick={onClose}>
            <div className="w-full max-w-[430px] bg-white rounded-t-[28px] p-6 text-center anim-slide-up" onClick={e => e.stopPropagation()}>
              <Icon name="no_photography" className="text-muted text-[40px] mb-3" />
              <p className="text-navy font-bold mb-1">Camera not available</p>
              <p className="text-muted text-[12px] mb-4">Permission denied or no camera found.</p>
              <div className="flex gap-3">
                <button onClick={onFallback} className="flex-1 py-3 bg-primary text-white font-bold rounded-full text-[13px]">Browse Files</button>
                <button onClick={onClose}   className="flex-1 py-3 border-2 border-gray-200 text-navy font-bold rounded-full text-[13px]">Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 z-[70] bg-black flex flex-col anim-fade-in" onClick={onClose}>
          <div className="flex items-center justify-between px-4 pt-12 pb-3" onClick={e => e.stopPropagation()}>
            <span className="text-white font-bold text-[15px]">Take Photo</span>
            <button onClick={onClose} className="p-2 text-white"><Icon name="close" /></button>
          </div>
          <div className="flex-1 relative overflow-hidden" onClick={e => e.stopPropagation()}>
            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
            {!ready && (
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="w-8 h-8 border-[3px] border-white border-t-transparent rounded-full animate-spin" />
              </div>
            )}
          </div>
          <div className="flex items-center justify-center gap-6 px-6 py-8 bg-black" onClick={e => e.stopPropagation()}>
            <button onClick={onFallback} className="w-12 h-12 rounded-full border-2 border-white/40 flex items-center justify-center">
              <Icon name="photo_library" className="text-white text-[22px]" />
            </button>
            <button onClick={snap} disabled={!ready}
              className="w-18 h-18 rounded-full bg-white border-4 border-white shadow-lg flex items-center justify-center disabled:opacity-40 active:scale-95 transition-transform"
              style={{ width:72, height:72 }}>
              <div className="w-14 h-14 rounded-full bg-white border-4 border-navy/20" />
            </button>
            <div className="w-12 h-12" />
          </div>
        </div>
      );
    }

    /* ─── VehicleDetailOverlay ─── */
    function VehicleDetailOverlay({ vehicle: v, onClose, updateVehicle, db, isAdmin, t }) {
      const [tab,          setTab]          = useState('VEHICLE');
      const [dealerName,   setDealerName]   = useState('');
      const [uploading,    setUploading]    = useState(false);
      const [imgCheckInfo, setImgCheckInfo] = useState(null); // {type, idx, itemId}
      const [showCamera,   setShowCamera]   = useState(false);
      const [reportedItems, setReportedItems] = useState({}); // {`${type}-${id}`: 'sending'|'done'}
      const [confirmState, setConfirmState] = useState({}); // {pdi:'idle'|'saving'|'saved', final:'idle'|...}
      const vehicleImgRef  = useRef(null);
      const issueImgRef    = useRef(null);
      const noteDebounceRef = useRef({});  // keyed by `${type}-${idx}`, holds timer IDs
      const tech   = techById(v.assignedTech);
      const pp     = pdiProgress(v);
      const fp     = finalProgress(v);
      const issues = countIssues(v);

      /* ── check toggle ── */
      const toggleCheck = async (type, idx) => {
        if (isAdmin) return;
        const field     = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
        const order     = ['pending', 'done', 'issue', 'na'];
        const curCheck  = v[field]?.[idx];
        const curState  = curCheck?.state || 'pending';
        const nextState = order[(order.indexOf(curState) + 1) % order.length];

        // Optimistic local update immediately (snappy UI feedback)
        updateVehicle(v.id, car => {
          const checks = [...car[field]];
          checks[idx] = { ...checks[idx], state: nextState };
          return { ...car, [field]: checks };
        });

        // ① AWAIT the check-state write to DB first — critical order
        // This ensures pdi_checks/final_checks row has state='issue' BEFORE
        // updateStage fires the vehicles realtime subscription + refetch.
        // Without await, the refetch races and overwrites with stale 'done' state.
        if (db) {
          const fn = type === 'pdi' ? db.upsertPdiCheck : db.upsertFinalCheck;
          await fn(v.id, curCheck?.id, nextState, curCheck?.note || '').catch(console.error);
        }

        // ② Only after check is committed, trigger hold (which fires realtime refetch)
        if (nextState === 'issue' && ['port', 'pdi', 'ready'].includes(v.stage)) {
          const today  = todayStr();
          const action = `On hold — issue flagged on ${type.toUpperCase()} checklist — ${tech?.name || 'Tech'}`;
          updateVehicle(v.id, car => ({ ...car, stage: 'hold' }));
          if (db) {
            db.updateStage(v.id, 'hold').catch(console.error);
            db.insertHistory(v.id, action, v.stage, 'hold').catch(console.error);
          }
        }
      };

      /* ── check note (debounced DB write — instant local update) ── */
      const setCheckNote = (type, idx, note) => {
        const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
        // Immediate optimistic update so typing feels instant
        updateVehicle(v.id, car => {
          const checks = [...car[field]];
          checks[idx] = { ...checks[idx], note };
          return { ...car, [field]: checks };
        });
        if (!db) return;
        // Debounce DB write — only fire 600ms after user stops typing
        const key = `${type}-${idx}`;
        clearTimeout(noteDebounceRef.current[key]);
        noteDebounceRef.current[key] = setTimeout(() => {
          const fn  = type === 'pdi' ? db.upsertPdiCheck : db.upsertFinalCheck;
          const arr = type === 'pdi' ? v.pdiChecks : v.finalChecks;
          fn(v.id, arr[idx]?.id, arr[idx]?.state || 'issue', note).catch(console.error);
        }, 600);
      };

      /* ── confirm / bulk-save checklist ── */
      const handleConfirmSave = async (type) => {
        const checks = type === 'pdi' ? v.pdiChecks : v.finalChecks;
        setConfirmState(prev => ({ ...prev, [type]: 'saving' }));
        try {
          if (db) {
            // Flush any pending debounced note write immediately
            Object.keys(noteDebounceRef.current).forEach(k => {
              if (k.startsWith(type + '-')) clearTimeout(noteDebounceRef.current[k]);
            });
            await db.bulkSaveChecks(v.id, type, checks);
          }
          setConfirmState(prev => ({ ...prev, [type]: 'saved' }));
          setTimeout(() => setConfirmState(prev => ({ ...prev, [type]: 'idle' })), 3000);
        } catch (err) {
          console.error('bulkSaveChecks', err);
          setConfirmState(prev => ({ ...prev, [type]: 'idle' }));
        }
      };

      /* ── report issue to admin ── */
      const handleReportIssue = async (type, item) => {
        const key = `${type}-${item.id}`;
        if (reportedItems[key]) return;                    // already reported
        setReportedItems(prev => ({ ...prev, [key]: 'sending' }));
        try {
          if (db) {
            await db.reportIssue(v.id, v.label || v.model, type, item.name, item.note, tech?.name || 'Tech');
          }
          setReportedItems(prev => ({ ...prev, [key]: 'done' }));
        } catch (err) {
          console.error('reportIssue', err);
          setReportedItems(prev => ({ ...prev, [key]: null })); // reset on error
        }
      };

      /* ── stage mutations ── */
      const startPdi = () => {
        const action = `PDI started — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'pdi', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'pdi').catch(console.error); db.insertHistory(v.id, action, v.stage, 'pdi').catch(console.error); }
      };
      const putOnHold = () => {
        const action = `HOLD — PDI failed (${issues} issues) — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'hold', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'hold').catch(console.error); db.insertHistory(v.id, action, v.stage, 'hold').catch(console.error); }
      };
      const resumePdi = () => {
        const action = `PDI resumed after repair — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'pdi', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'pdi').catch(console.error); db.insertHistory(v.id, action, v.stage, 'pdi').catch(console.error); }
      };
      const pdiPassToStock = () => {
        const action = `PDI passed — moved to stockyard — ${tech.name}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'stock', pdiDate:today, stockDate:today, stockMaint:makeMaint(today), history:[`${today}: ${action}`, ...car.history] }));
        if (db) {
          db.updateStage(v.id, 'stock', { pdi_date: today, stock_date: today }).catch(console.error);
          db.insertHistory(v.id, action, v.stage, 'stock').catch(console.error);
          db.insertMaintTasks(v.id, today).catch(console.error);
        }
      };
      const passToFinal = () => {
        const action = `Passed to final inspection — ${tech.name}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'ready', finalDate:today, history:[`${today}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'ready', { final_date: today }).catch(console.error); db.insertHistory(v.id, action, v.stage, 'ready').catch(console.error); }
      };
      const releaseCar = () => {
        if (!dealerName.trim()) return;
        const dealer = dealerName.trim();
        const action = `Released to ${dealer}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'released', releaseDate:today, dealer, history:[`${today}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'released', { release_date: today, dealer }).catch(console.error); db.insertHistory(v.id, action, v.stage, 'released').catch(console.error); }
      };
      const completeMaint = (idx) => {
        const today = todayStr();
        const m     = v.stockMaint[idx];
        const action = `${m.name} — completed — ${tech.name}`;
        updateVehicle(v.id, car => {
          const maint = [...car.stockMaint];
          maint[idx] = { ...maint[idx], lastDone: today, nextDue: addDays(today, maint[idx].freq) };
          return { ...car, stockMaint: maint, history: [`${today}: ${action}`, ...car.history] };
        });
        if (db) { db.completeMaint(v.id, m.id, m.freq).catch(console.error); db.insertHistory(v.id, action, v.stage, v.stage).catch(console.error); }
      };

      /* ── image uploads ── */
      const handleVehicleImgUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !db) return;
        setUploading(true);
        try {
          const url = await db.uploadVehicleImage(v.id, file);
          updateVehicle(v.id, car => ({ ...car, img: url }));
        } catch (err) { console.error(err); }
        setUploading(false);
        e.target.value = '';
      };
      const handleIssueImgUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !imgCheckInfo || !db) return;
        const { type, idx, itemId } = imgCheckInfo;
        try {
          const url = await db.uploadIssueImage(v.id, type, itemId, file);
          const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
          updateVehicle(v.id, car => {
            const checks = [...car[field]];
            checks[idx] = { ...checks[idx], image_url: url };
            return { ...car, [field]: checks };
          });
        } catch (err) { console.error(err); }
        e.target.value = '';
        setImgCheckInfo(null);
      };

      /* ── camera opener: mobile → file input, desktop → CameraModal ── */
      const openCameraForCheck = (type, item) => {
        setImgCheckInfo({ type, idx: item._i, itemId: item.id });
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        if (isMobile || !navigator.mediaDevices?.getUserMedia) {
          issueImgRef.current?.click();
        } else {
          setShowCamera(true);
        }
      };

      /* ── CameraModal capture handler ── */
      const handleCameraCapture = async (file) => {
        if (!imgCheckInfo || !db) return;
        const { type, idx, itemId } = imgCheckInfo;
        try {
          const url = await db.uploadIssueImage(v.id, type, itemId, file);
          const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
          updateVehicle(v.id, car => {
            const checks = [...car[field]];
            checks[idx] = { ...checks[idx], image_url: url };
            return { ...car, [field]: checks };
          });
        } catch (err) { console.error(err); }
        setImgCheckInfo(null);
      };

      const ChecklistTab = ({ type, checks }) => {
        const sections = [...new Set(checks.map(c => c.section))];
        return (
          <div className="space-y-5">
            {sections.map(sec => {
              const items = checks.map((c, i) => ({ ...c, _i: i })).filter(c => c.section === sec);
              const done = items.filter(c => c.state === 'done' || c.state === 'na').length;
              return (
                <div key={sec}>
                  <div className="flex items-center justify-between mb-2">
                    <h3 className="text-[11px] font-bold uppercase tracking-widest text-muted">{sec} ({done}/{items.length})</h3>
                    <div className="h-1.5 w-20 bg-primary/10 rounded-full overflow-hidden">
                      <div className="h-full bg-primary rounded-full" style={{ width: `${items.length ? (done / items.length) * 100 : 0}%` }} />
                    </div>
                  </div>
                  <div className="space-y-2">
                    {items.map(item => {
                      const st = item.state;
                      const stIcon = st === 'done' ? 'check_circle' : st === 'issue' ? 'error' : st === 'na' ? 'remove_circle' : null;
                      const stBg = st === 'done' ? 'bg-emerald-50 border-emerald-200' : st === 'issue' ? 'bg-red-50 border-red-200' : st === 'na' ? 'bg-gray-100 border-gray-300' : 'bg-white border-gray-200';
                      const stColor = st === 'done' ? 'bg-emerald-500' : st === 'issue' ? 'bg-red-500' : st === 'na' ? 'bg-gray-400' : '';
                      return (
                        <div key={item.id}>
                          <button onClick={() => toggleCheck(type, item._i)} disabled={isAdmin}
                            className={`flex items-start gap-3 p-3 rounded-xl text-left w-full border transition-all duration-150 ${stBg} ${!isAdmin ? 'cursor-pointer active:scale-[0.98]' : 'cursor-default'}`}>
                            {stIcon ? (
                              <div className={`w-6 h-6 ${stColor} rounded-md flex items-center justify-center flex-shrink-0 mt-0.5`}>
                                <Icon name={stIcon} fill className="text-white text-sm" />
                              </div>
                            ) : (
                              <div className="w-6 h-6 border-2 border-gray-300 rounded-md flex-shrink-0 mt-0.5" />
                            )}
                            <div className="flex-1 min-w-0">
                              <p className="text-[12px] font-semibold text-navy leading-snug">{item.name}</p>
                              <div className="flex items-center gap-2 mt-1">
                                <StatusBadge status={item.priority} />
                                <span className="text-[9px] font-bold uppercase text-muted tracking-wider">{st}</span>
                              </div>
                            </div>
                          </button>
                          {/* Camera + Report buttons — tech only */}
                          {!isAdmin && (
                            <div className="mt-1 space-y-1">
                              {st === 'issue' && (
                                <input type="text" value={item.note} onChange={e => setCheckNote(type, item._i, e.target.value)}
                                  placeholder={t('describeIssue')}
                                  className="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-[12px] text-navy outline-none focus:border-primary" />
                              )}
                              <div className="flex items-center gap-1.5">
                                {/* Photo button — always visible */}
                                <button onClick={() => openCameraForCheck(type, item)}
                                  className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[11px] font-semibold transition-colors ${item.image_url ? 'bg-green-50 border border-green-200 text-green-700 hover:bg-green-100' : st === 'issue' ? 'bg-red-50 border border-red-200 text-red-500 hover:bg-red-100' : 'bg-gray-50 border border-gray-200 text-muted hover:bg-gray-100'}`}
                                  title="Take photo">
                                  <Icon name="photo_camera" className="text-sm" />
                                  {item.image_url ? 'Retake' : 'Photo'}
                                </button>
                                {/* Report button — only when item is flagged as issue */}
                                {st === 'issue' && (() => {
                                  const rKey   = `${type}-${item.id}`;
                                  const rState = reportedItems[rKey];
                                  return (
                                    <button
                                      onClick={() => handleReportIssue(type, item)}
                                      disabled={!!rState}
                                      className={`flex-1 flex items-center justify-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[11px] font-bold transition-all
                                        ${rState === 'done'
                                          ? 'bg-emerald-50 border border-emerald-200 text-emerald-700 cursor-default'
                                          : rState === 'sending'
                                          ? 'bg-gray-50 border border-gray-200 text-muted cursor-wait'
                                          : 'bg-primary/10 border border-primary/30 text-primary hover:bg-primary/20 active:scale-95'
                                        }`}>
                                      <Icon name={rState === 'done' ? 'check_circle' : rState === 'sending' ? 'hourglass_empty' : 'send'} fill={rState === 'done'} className="text-sm" />
                                      {rState === 'done' ? 'Reported' : rState === 'sending' ? 'Sending…' : 'Report to Admin'}
                                    </button>
                                  );
                                })()}
                              </div>
                              {item.image_url && (
                                <img src={item.image_url} alt="Evidence photo" className={`w-full max-h-36 object-cover rounded-lg border ${st === 'issue' ? 'border-red-200' : 'border-gray-200'}`} />
                              )}
                            </div>
                          )}
                          {isAdmin && st === 'issue' && (
                            <div className="mt-1 space-y-1">
                              {item.note
                                ? <div className="px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-[11px] text-red-700 italic">{item.note}</div>
                                : <div className="flex items-center gap-1.5 px-2 py-1 text-[10px] text-red-500 font-bold"><Icon name="warning" fill className="text-[14px]" /> Issue flagged — no note added</div>
                              }
                              {item.image_url && <img src={item.image_url} alt="Issue photo" className="w-full max-h-36 object-cover rounded-lg border border-red-200" />}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="fixed inset-0 bg-black/50 z-50 anim-fade-in flex items-end justify-center" onClick={onClose}>
          {/* Hidden file inputs */}

                  {isAdmin && v.stage === 'hold' && (() => {

                    const allIssues  = [

                                  </span>
                                  <span className="text-navy">{h.action}</span>
                                </div>
                              ))}
                            </div>

                        </div>

                        {/* Admin resolution buttons */}
                        <div className="flex gap-2">
                          <button onClick={() => {
                            const action = 'Sent back for re-inspection';
                            updateVehicle(v.id, car => ({ ...car, stage: 'pdi' }));

                              db.insertHistory(v.id, action, 'hold', 'pdi').catch(console.error);
                            }
                          }} className="flex-1 py-2.5 border-2 border-primary text-primary font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/5 transition-colors active:scale-95">
                            <Icon name="restart_alt" className="text-base" /> Re-inspect
                          </button>
                          <button onClick={() => {
                            const today  = todayStr();
                            const action = 'Cleared to stock';

                              db.updateStage(v.id, 'stock', { pdi_date: today, stock_date: today }).catch(console.error);

                  {!isAdmin && v.stage === 'stock' && (

                      <div className="bg-white rounded-[16px] p-3 shadow-card">

                          <span className="text-muted font-medium">{t('finalProgress')}</span>
                          <span className="font-black text-navy">{fp.done}/{fp.total}</span>

                          <span className="text-[11px] font-black text-navy">{done}/{checks.length}</span>

                        {/* Progress bar */}
                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full transition-all duration-500 ${issues > 0 ? 'bg-red-400' : 'bg-emerald-500'}`}
                            style={{ width: `${checks.length ? (done / checks.length) * 100 : 0}%` }} />
                        </div>
                        {/* Confirm button */}
                        <button
                          onClick={() => handleConfirmSave(type)}
                          disabled={cState === 'saving'}
                          className={`w-full py-3.5 rounded-full font-black text-[13px] uppercase tracking-[0.1em] flex items-center justify-center gap-2 transition-all active:scale-[0.98]
                            ${cState === 'saved'
                              ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200'
                              : cState === 'saving'
                              ? 'bg-gray-200 text-muted cursor-wait'
                              : 'bg-primary text-white shadow-primary-glow hover:brightness-110'

                          <Icon
                            name={cState === 'saved' ? 'check_circle' : cState === 'saving' ? 'hourglass_empty' : 'cloud_upload'}
                            fill={cState === 'saved'}
                            className="text-xl"
                          />
                          {cState === 'saved' ? 'Checklist Saved!' : cState === 'saving' ? 'Saving…' : `Confirm & Save ${tab} Checklist`}
                        </button>
                        {cState === 'saved' && (
                          <p className="text-[10px] text-emerald-600 text-center font-medium">
                            All {checks.length} items saved · visible to admin

                      </div>
                    )}
                  </div>
                );
              })()}
              {tab === 'MAINT' && (
                <div className="space-y-2">
                  {v.stockMaint.length === 0 ? (
                    <div className="flex flex-col items-center justify-center py-20 text-center">
                      <Icon name="build_circle" fill className="text-muted text-[52px] mb-3 opacity-40" />
                      <div className="text-[13px] font-bold text-muted">{t('noMaintenance')}</div>
                      <div className="text-[11px] text-muted/60 mt-1">{t('maintHint')}</div>
                    </div>
                  ) : v.stockMaint.map((m, idx) => {
                    const overDays = daysAgo(m.nextDue);
                    const isOverdue = overDays >= 0;
                    const isDueSoon = overDays >= -7 && overDays < 0;
                    return (
                      <div key={m.id} className={`bg-white rounded-[16px] p-3 shadow-card border-l-4 ${isOverdue ? 'border-red-400' : isDueSoon ? 'border-amber-400' : 'border-emerald-400'}`}>
                        <div className="flex items-start justify-between mb-1">
                          <div className="flex-1 min-w-0">
                            <div className="text-[12px] font-bold text-navy leading-snug">{m.name}</div>
                            <div className="flex items-center gap-2 mt-1">
                              <StatusBadge status={m.priority} />

                          </div>
                          <div className="text-right flex-shrink-0 ml-2">
                            {isOverdue ? (
                              <span className="text-[10px] font-black text-red-600">{t('overdueD', {days:overDays})}</span>

                              <span className="text-[10px] font-black text-amber-600">{t('dueIn', {days:Math.abs(overDays)})}</span>

                              <span className="text-[10px] font-bold text-emerald-600">{t('next')} {m.nextDue}</span>

                            <Icon name="check" className="text-sm" /> {t('done')}
                          </button>

              {tab === 'NOTES' && (

                  <textarea

                    onChange={e => { const val = e.target.value; updateVehicle(v.id, car => ({ ...car, notes: val })); }}

              {tab === 'HISTORY' && (
                <div>
                  {v.history.length === 0 ? (
                    <div className="flex flex-col items-center justify-center py-20 text-center">
                      <Icon name="history" fill className="text-muted text-[52px] mb-3 opacity-40" />
                      <div className="text-[13px] font-bold text-muted">{t('noHistory')}</div>
                    </div>
                  ) : (
                    <div className="relative pl-8">
                      <div className="absolute left-3.5 top-2 bottom-2 w-0.5 bg-gray-200 rounded-full" />
                      {v.history.map((entry, i) => {

                          <div key={i} className="relative mb-4">

                            <div className="bg-white rounded-[14px] p-3 shadow-card">

                                <span className="text-[10px] text-muted font-medium flex-shrink-0">{date}</span>

    }

    /* ─── AdminDashboard ─── */
    function AdminDashboard({ navigate, vehicles, technicians, onNotificationClick, onAddVehicle, unreadCount, onOpenDetail, t }) {
      const all = vehicles;
      const pipeline = [
        { label:'PORT',     count:all.filter(v => v.stage==='port').length,     color:'bg-orange-500' },
        { label:'PDI',      count:all.filter(v => v.stage==='pdi').length,      color:'bg-green-500'  },
        { label:'HOLD',     count:all.filter(v => v.stage==='hold').length,     color:'bg-red-500'    },
        { label:'STOCK',    count:all.filter(v => v.stage==='stock').length,    color:'bg-blue-500'   },
        { label:'READY',    count:all.filter(v => v.stage==='ready').length,    color:'bg-purple-500' },
        { label:'RELEASED', count:all.filter(v => v.stage==='released').length, color:'bg-emerald-500'},
      ];
      const holdVehicles = all.filter(v => v.stage === 'hold').map(v => {
        const issues = [
          ...(v.pdiChecks  || []).filter(c => c.state === 'issue').map(c => ({ ...c, _src: 'PDI'   })),
          ...(v.finalChecks || []).filter(c => c.state === 'issue').map(c => ({ ...c, _src: 'Final' })),
        ];
        const holdEntry = (v.historyRaw || []).find(h => h.stage_to === 'hold');
        const daysHeld  = holdEntry
          ? Math.floor((Date.now() - new Date(holdEntry.created_at).getTime()) / 86400000)
          : null;
        return { ...v, issues, daysHeld };
      });
      const recent = [];
      all.forEach(v => v.history.slice(0, 2).forEach(h => recent.push({ vid: v.label || v.model, text:h })));
      recent.sort((a, b) => b.text.localeCompare(a.text));

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">

    /* ─── ReportsScreen ─── */
    /* ─── Export helpers ─── */
    const exportToCSV = (rows, filename) => {
      const headers = ['Label','VIN','Model','Color','Engine','Fuel','Lot','Stage','Arrival Date','Dealer','Notes'];
      const lines = [headers, ...rows.map(v => [
        v.label||v.model, v.vin||'', v.model||'', v.color||'', v.engine||'', v.fuel||'',
        v.lot||'', v.stage||'', v.arrivalDate||v.arrival_date||'', v.dealer||'', v.notes||'',
      ])];
      const csv = lines.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    };
    const exportToXLSX = (rows, filename) => {
      if (typeof XLSX === 'undefined') { alert('Excel library not loaded yet. Try again.'); return; }
      const ws = XLSX.utils.json_to_sheet(rows.map(v => ({
        'Vehicle':      v.label||v.model,
        'VIN':          v.vin||'',
        'Model':        v.model||'',
        'Color':        v.color||'',
        'Engine':       v.engine||'',
        'Fuel':         v.fuel||'',
        'Lot':          v.lot||'',
        'Stage':        v.stage||'',
        'Arrival Date': v.arrivalDate||v.arrival_date||'',
        'Dealer':       v.dealer||'',
        'Notes':        v.notes||'',
      })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Fleet');
      XLSX.writeFile(wb, filename);

              {/* ── Export Panel ── */}
              <div className="bg-white rounded-[20px] p-4 shadow-card">
                <div className="flex items-center gap-2 mb-4">
                  <Icon name="download" fill className="text-primary text-[22px]" />

                {/* Stage filter pills */}
                <p className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Stage</p>

                  <button

                      <button key={s} onClick={() => toggleStage(s)}

    /* ─── HoldTrackerScreen ─── */
    function HoldTrackerScreen({ navigate, vehicles, updateVehicle, onNotificationClick, unreadCount, t, db, session }) {
      const heldVehicles = useMemo(() =>
        [...vehicles.filter(v => v.stage === 'hold')].sort((a, b) => {
          // Sort by longest time on hold — find the most recent hold history entry (raw objects)
          const holdTime = v => {
            const raw = v.historyRaw || [];
            const entry = [...raw].reverse().find(h => h.stage_to === 'hold');
            return entry ? new Date(entry.created_at || 0).getTime() : 0;
          };
          return holdTime(a) - holdTime(b); // oldest hold first
        }),
        [vehicles]
      );

      const [notes, setNotes] = useState({}); // vehicleId → draft note text
      const [saving, setSaving] = useState({}); // vehicleId → bool

      const daysSince = (dateStr) => {
        if (!dateStr) return null;
        const diff = Date.now() - new Date(dateStr).getTime();
        return Math.floor(diff / 86400000);
      };

      const addRepairNote = async (vehicleId, noteText) => {
        if (!noteText?.trim() || !db) return;
        setSaving(p => ({ ...p, [vehicleId]: true }));
        try {
          await db.insertHistory(vehicleId, noteText.trim(), 'hold', 'hold');
          const newEntry = {
            id: Date.now().toString(),
            action: noteText.trim(),
            stage_from: 'hold',
            stage_to: 'hold',
            created_at: new Date().toISOString(),
          };
          // Optimistic update — prepend to historyRaw (objects) and rebuild history (strings)
          updateVehicle(vehicleId, car => {
            const historyRaw = [newEntry, ...(car.historyRaw || [])];
            const history    = historyRaw.map(h => `${(h.created_at || '').slice(0, 10)}: ${h.action || ''}`);
            return { ...car, historyRaw, history };
          });
          setNotes(p => ({ ...p, [vehicleId]: '' }));
        } catch(err) { console.error(err); }
        setSaving(p => ({ ...p, [vehicleId]: false }));
      };

      const resolveVehicle = async (vehicleId, targetStage) => {
        if (!db) return;
        const v = vehicles.find(x => x.id === vehicleId);
        if (!v) return;
        const label = targetStage === 'pdi' ? 'Sent back for re-inspection' : 'Cleared to stock';
        try {
          await db.updateStage(vehicleId, targetStage);
          await db.insertHistory(vehicleId, label, 'hold', targetStage);
          updateVehicle(vehicleId, car => ({ ...car, stage: targetStage }));
        } catch(err) { console.error(err); }
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 pb-4 shadow-card">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-primary rounded-xl flex items-center justify-center shadow-md shadow-primary/30">
                  <Icon name="build_circle" fill className="text-white text-lg" />
                </div>
                <div>
                  <div className="font-black text-navy text-[15px] leading-tight">Hold / Repair Tracker</div>
                  <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{heldVehicles.length} unit{heldVehicles.length !== 1 ? 's' : ''} on hold</div>
                </div>
              </div>
              <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full">
                <Icon name="notifications" className="text-navy" />
                {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
              </button>
            </div>
          </header>
          <main className="flex-1 overflow-y-auto pb-24">
            {heldVehicles.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 gap-4 text-center px-8">
                <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center">
                  <Icon name="check_circle" fill className="text-green-500 text-[36px]" />
                </div>
                <div className="font-black text-navy text-[18px]">No vehicles on hold</div>
                <div className="text-muted text-[13px]">All units are progressing through the pipeline normally.</div>
              </div>
            ) : (
              <div className="p-4 space-y-4">
                {heldVehicles.map(v => {
                  const raw       = v.historyRaw || [];
                  // Find earliest hold entry (raw is sorted newest-first, so last hold entry)
                  const holdEntry = [...raw].find(h => h.stage_to === 'hold');
                  const daysHeld  = holdEntry ? daysSince(holdEntry.created_at) : null;
                  const pdiIssues   = (v.pdiChecks   || []).filter(c => c.state === 'issue');
                  const finalIssues = (v.finalChecks  || []).filter(c => c.state === 'issue');
                  const allIssues   = [...pdiIssues, ...finalIssues];
                  // Repair log: history entries where vehicle stayed on hold (stage_from=hold, stage_to=hold)
                  const repairLog = raw.filter(h => h.stage_from === 'hold' && h.stage_to === 'hold')
                                       .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                  return (
                    <div key={v.id} className="bg-white rounded-[20px] shadow-card overflow-hidden">
                      {/* Header row */}
                      <div className="flex items-center gap-3 p-4 border-b border-gray-100">
                        <div className="w-16 h-12 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0">
                          <img src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-black text-navy text-[14px]">{v.label || v.model}</span>
                            <span className="px-2 py-0.5 bg-red-100 text-red-700 text-[9px] font-black uppercase tracking-wider rounded-full border border-red-200">ON HOLD</span>
                            {daysHeld !== null && <span className="text-[10px] text-muted font-bold">{daysHeld}d</span>}
                          </div>
                          <div className="text-[11px] text-muted mt-0.5">{[v.color, v.lot ? `Lot ${v.lot}` : null].filter(Boolean).join(' · ')}</div>
                        </div>
                      </div>

                      {/* Issues */}
                      {allIssues.length > 0 && (
                        <div className="px-4 py-3 border-b border-gray-100">
                          <div className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Issues ({allIssues.length})</div>
                          <div className="space-y-1.5">
                            {allIssues.map((c, i) => (
                              <div key={i} className="flex items-start gap-2">
                                <div className="w-1.5 h-1.5 bg-red-400 rounded-full mt-2 flex-shrink-0" />
                                <div className="flex-1 min-w-0">
                                  <span className="text-[12px] text-navy font-semibold">{c.name}</span>
                                  {c.priority && <span className="ml-2 text-[9px] font-bold uppercase text-muted">{c.priority}</span>}
                                  {c.note && <div className="text-[11px] text-muted italic mt-0.5">{c.note}</div>}
                                  {c.image_url && <img src={c.image_url} alt="Issue" className="mt-1 w-full max-h-28 object-cover rounded-lg border border-red-200" />}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Repair Log */}
                      <div className="px-4 py-3 border-b border-gray-100">
                        <div className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Repair Log</div>
                        {repairLog.length === 0 && <div className="text-[11px] text-muted italic mb-2">No repair notes yet.</div>}
                        <div className="space-y-1 mb-3">
                          {repairLog.map((h, i) => {
                            const d = h.created_at || h.timestamp;
                            const dateStr = d ? new Date(d).toLocaleDateString() : '';
                            return (
                              <div key={i} className="text-[11px] text-navy bg-gray-50 rounded-lg px-3 py-2">
                                {dateStr && <span className="text-muted font-bold mr-1.5">{dateStr}:</span>}
                                {h.action}
                              </div>
                            );
                          })}
                        </div>
                        {/* Add note input */}
                        <div className="flex gap-2">
                          <input
                            type="text"
                            value={notes[v.id] || ''}
                            onChange={e => setNotes(p => ({ ...p, [v.id]: e.target.value }))}
                            onKeyDown={e => { if (e.key === 'Enter') addRepairNote(v.id, notes[v.id]); }}
                            placeholder="Add repair note…"
                            className="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-[12px] text-navy outline-none focus:border-primary" />
                          <button
                            onClick={() => addRepairNote(v.id, notes[v.id])}
                            disabled={!notes[v.id]?.trim() || saving[v.id]}
                            className="px-4 py-2 bg-navy text-white font-bold text-[12px] rounded-xl disabled:opacity-40 hover:bg-navy/80 transition-colors flex items-center gap-1">
                            {saving[v.id] ? <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin" /> : <Icon name="send" className="text-sm" />}
                          </button>
                        </div>
                      </div>

                      {/* Resolution buttons */}
                      <div className="flex gap-3 p-4">
                        <button
                          onClick={() => resolveVehicle(v.id, 'pdi')}
                          className="flex-1 py-2.5 border-2 border-primary text-primary font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/5 transition-colors active:scale-95">
                          <Icon name="restart_alt" className="text-base" /> Re-inspect
                        </button>
                        <button
                          onClick={() => resolveVehicle(v.id, 'stock')}
                          className="flex-1 py-2.5 bg-primary text-white font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/80 transition-colors active:scale-95">
                          <Icon name="check_circle" className="text-base" /> Clear to Stock
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>
          <AdminBottomNav navigate={navigate} currentView="hold-tracker" vehicles={vehicles} t={t} />
        </div>
      );
    }
