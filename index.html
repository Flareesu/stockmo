    /* ─── PipelineManagerScreen ─── */
    function PipelineManagerScreen({ navigate, t }) {
      const [stages, setStages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editId, setEditId] = useState(null);
      const [editName, setEditName] = useState('');
      const [editColor, setEditColor] = useState('#6b7280');
      const [newName, setNewName] = useState('');
      const [newColor, setNewColor] = useState('#6b7280');
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        sb.from('pipeline_stages').select('*').order('ord').then(({ data }) => {
          setStages(data || []); setLoading(false);
        });
      }, []);

      const startEdit = (s) => { setEditId(s.id); setEditName(s.name); setEditColor(s.color || '#6b7280'); };
      const cancelEdit = () => setEditId(null);

      const saveEdit = async () => {
        if (!editName.trim()) return;
        setSaving(true);
        await sb.from('pipeline_stages').update({ name: editName.trim(), color: editColor }).eq('id', editId);
        setStages(prev => prev.map(s => s.id === editId ? { ...s, name: editName.trim(), color: editColor } : s));
        setEditId(null); setSaving(false);
      };

      const addStage = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const maxOrder = stages.reduce((m, s) => Math.max(m, s.ord || 0), 0);
        const { data } = await sb.from('pipeline_stages').insert({ name: newName.trim(), color: newColor, ord: maxOrder + 1 }).select().single();
        if (data) setStages(prev => [...prev, data]);
        setNewName(''); setSaving(false);
      };

      const deleteStage = async (id) => {
        if (!confirm('Delete this stage? Vehicles in this stage will need reassignment.')) return;
        await sb.from('pipeline_stages').delete().eq('id', id);
        setStages(prev => prev.filter(s => s.id !== id));
      };

      const moveStage = async (idx, dir) => {
        const next = [...stages];
        const swap = idx + dir;
        if (swap < 0 || swap >= next.length) return;
        [next[idx], next[swap]] = [next[swap], next[idx]];
        next.forEach((s, i) => { s.ord = i + 1; });
        setStages(next);
        await Promise.all(next.map(s => sb.from('pipeline_stages').update({ ord: s.ord }).eq('id', s.id)));
      };

      const inputCls = "w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-[13px] text-navy outline-none focus:border-primary transition-colors";

      return (
        <div className="min-h-screen bg-[#F5F5F5]">
          <div className="bg-white px-5 pt-12 pb-4 flex items-center gap-3">
            <button onClick={() => navigate('admin-dashboard')} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <Icon name="arrow_back" className="text-navy" />
            </button>
            <div>
              <h1 className="text-[20px] font-black text-navy">Pipeline Stages</h1>
              <p className="text-[11px] text-muted">Reorder or rename stages. Changes apply immediately.</p>
            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="pipeline-manager" />
          <div className="p-4 space-y-3">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : stages.map((s, idx) => (
              <div key={s.id} className="bg-white rounded-[16px] p-3 shadow-card flex items-center gap-3">
                <div className="w-3 h-10 rounded-full flex-shrink-0" style={{ background: s.color || '#6b7280' }} />
                {editId === s.id ? (
                  <div className="flex-1 space-y-2">
                    <input value={editName} onChange={e => setEditName(e.target.value)} className={inputCls} />
                    <div className="flex items-center gap-2">
                      <label className="text-[11px] text-muted font-bold">Color</label>
                      <input type="color" value={editColor} onChange={e => setEditColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0" />
                      <button onClick={saveEdit} disabled={saving} className="flex-1 py-1.5 bg-primary text-white font-bold text-[11px] rounded-lg">{saving ? 'Saving…' : 'Save'}</button>
                      <button onClick={cancelEdit} className="px-3 py-1.5 bg-gray-100 text-muted font-bold text-[11px] rounded-lg">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex-1">
                    <div className="text-[13px] font-bold text-navy">{s.name}</div>
                    <div className="text-[10px] text-muted">Order {s.ord}</div>
                  </div>
                )}
                {editId !== s.id && (
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <button onClick={() => moveStage(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-gray-100 rounded-lg disabled:opacity-30 transition-colors"><Icon name="arrow_upward" className="text-muted text-sm" /></button>
                    <button onClick={() => moveStage(idx, 1)} disabled={idx === stages.length - 1} className="p-1.5 hover:bg-gray-100 rounded-lg disabled:opacity-30 transition-colors"><Icon name="arrow_downward" className="text-muted text-sm" /></button>
                    <button onClick={() => startEdit(s)} className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors"><Icon name="edit" className="text-navy text-sm" /></button>
                    <button onClick={() => deleteStage(s.id)} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors"><Icon name="delete" className="text-red-400 text-sm" /></button>
                  </div>
                )}
              </div>
            ))}
            {/* Add new stage */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add New Stage</div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Stage name…" className={inputCls} />
              <div className="flex items-center gap-3">
                <label className="text-[11px] text-muted font-bold">Color</label>
                <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0" />
                <button onClick={addStage} disabled={!newName.trim() || saving}
                  className="flex-1 py-2 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 disabled:opacity-40 hover:brightness-110 active:scale-[0.98] transition-all">
                  <Icon name="add" className="text-sm" /> Add Stage
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── ChecklistEditorScreen ─── */
    function ChecklistEditorScreen({ navigate, t }) {
      const [tab,         setTab]         = useState('pdi');
      const [items,       setItems]       = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [saving,      setSaving]      = useState(false);
      const [editId,      setEditId]      = useState(null);
      const [editFields,  setEditFields]  = useState({});
      const [newName,     setNewName]     = useState('');
      const [newSection,  setNewSection]  = useState('Exterior');
      const [newPriority, setNewPriority] = useState('med');
      const [newFreq,     setNewFreq]     = useState(30);

      const TABLE_MAP = { pdi: 'pdi_item_templates', maint: 'maint_task_templates', final: 'final_check_templates' };
      const table = TABLE_MAP[tab];
      const SECTIONS = ['Exterior', 'Interior', 'Mechanical', 'Electrical', 'Documents'];
      const inputCls = "bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[13px] text-navy outline-none focus:border-primary transition-colors";

      const load = async () => {
        setLoading(true); setEditId(null);
        const { data } = await sb.from(table).select('*').order('ord');
        setItems(data || []); setLoading(false);
      };
      useEffect(() => { load(); }, [tab]);

      const toggleActive = async (item) => {
        await sb.from(table).update({ active: !item.active }).eq('id', item.id);
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, active: !i.active } : i));
      };

      const startEdit = (item) => {
        setEditId(item.id);
        setEditFields({ name: item.name, section: item.section || 'Exterior', priority: item.priority || 'med', frequency_days: item.frequency_days || 30 });
      };

      const saveEdit = async (item) => {
        if (!editFields.name.trim()) return;
        setSaving(true);
        const update = tab === 'maint'
          ? { name: editFields.name.trim(), frequency_days: Number(editFields.frequency_days) || 30, priority: editFields.priority }
          : { name: editFields.name.trim(), section: editFields.section, priority: editFields.priority };
        await sb.from(table).update(update).eq('id', item.id);
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, ...update } : i));
        setEditId(null); setSaving(false);
      };

      const deleteItem = async (item) => {
        if (!confirm(`Delete "${item.name}"?`)) return;
        await sb.from(table).delete().eq('id', item.id);
        setItems(prev => prev.filter(i => i.id !== item.id));
      };

      const addItem = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const maxOrd = items.reduce((m, i) => Math.max(m, i.ord || 0), 0);
        const row = tab === 'maint'
          ? { name: newName.trim(), frequency_days: Number(newFreq) || 30, priority: newPriority, ord: maxOrd + 1, active: true }
          : { name: newName.trim(), section: newSection, priority: newPriority, ord: maxOrd + 1, active: true };
        const { data } = await sb.from(table).insert(row).select().single();
        if (data) setItems(prev => [...prev, data]);
        setNewName(''); setSaving(false);
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5]">
          <div className="bg-white px-5 pt-12 pb-4 flex items-center gap-3">
            <button onClick={() => navigate('admin-dashboard')} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <Icon name="arrow_back" className="text-navy" />
            </button>
            <div>
              <h1 className="text-[20px] font-black text-navy">Checklist Editor</h1>
              <p className="text-[11px] text-muted">Manage PDI, Maintenance &amp; Final Check templates.</p>
            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="checklist-editor" />
          <nav className="bg-white border-b border-gray-100 flex px-2">
            {[['pdi','PDI'],['maint','Maintenance'],['final','Final']].map(([key, label]) => (
              <button key={key} onClick={() => setTab(key)}
                className={`flex-1 py-3 text-[10px] font-bold tracking-widest transition-colors ${tab === key ? 'text-primary border-b-2 border-primary' : 'text-muted border-b-2 border-transparent'}`}>
                {label}
              </button>
            ))}
          </nav>
          <div className="p-4 space-y-2">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : items.map(item => (
              <div key={item.id} className={`bg-white rounded-[14px] shadow-card overflow-hidden transition-opacity ${!item.active && editId !== item.id ? 'opacity-55' : ''}`}>
                {editId === item.id ? (
                  /* ── inline edit form ── */
                  <div className="p-3 space-y-2.5">
                    <input
                      value={editFields.name}
                      onChange={e => setEditFields(f => ({ ...f, name: e.target.value }))}
                      className={inputCls + ' w-full'}
                      placeholder="Item description…"
                      autoFocus
                    />
                    <div className="flex gap-2">
                      {tab !== 'maint' && (
                        <select value={editFields.section} onChange={e => setEditFields(f => ({ ...f, section: e.target.value }))}
                          className={inputCls + ' flex-1 appearance-none'}>
                          {SECTIONS.map(s => <option key={s}>{s}</option>)}
                        </select>
                      )}
                      {tab === 'maint' && (
                        <div className="flex-1 flex items-center gap-1.5">
                          <input type="number" min="1" max="365" value={editFields.frequency_days}
                            onChange={e => setEditFields(f => ({ ...f, frequency_days: e.target.value }))}
                            className={inputCls + ' w-full'} placeholder="Days" />
                          <span className="text-[11px] text-muted whitespace-nowrap">days</span>
                        </div>
                      )}
                      <select value={editFields.priority} onChange={e => setEditFields(f => ({ ...f, priority: e.target.value }))}
                        className={inputCls + ' flex-1 appearance-none'}>
                        <option value="high">High</option>
                        <option value="med">Med</option>
                        <option value="low">Low</option>
                      </select>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setEditId(null)}
                        className="flex-1 py-1.5 rounded-full bg-gray-100 text-muted text-[11px] font-bold hover:bg-gray-200 transition-all">
                        Cancel
                      </button>
                      <button onClick={() => saveEdit(item)} disabled={!editFields.name.trim() || saving}
                        className="flex-1 py-1.5 rounded-full bg-primary text-white text-[11px] font-bold hover:brightness-110 transition-all disabled:opacity-40">
                        {saving ? 'Saving…' : 'Save'}
                      </button>
                    </div>
                  </div>
                ) : (
                  /* ── normal display row ── */
                  <div className="flex items-center gap-2 p-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-[12px] font-bold text-navy leading-snug">{item.name}</div>
                      <div className="flex items-center gap-2 mt-0.5">
                        {item.section && <span className="text-[9px] font-bold uppercase text-muted tracking-wider">{item.section}</span>}
                        {item.frequency_days && <span className="text-[9px] font-bold uppercase text-muted tracking-wider">Every {item.frequency_days}d</span>}
                        <StatusBadge status={item.priority} />
                      </div>
                    </div>
                    <div className="flex items-center gap-1 flex-shrink-0">
                      <button onClick={() => startEdit(item)} className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors" title="Edit">
                        <Icon name="edit" className="text-muted text-[16px]" />
                      </button>
                      <button onClick={() => toggleActive(item)}
                        className={`px-2.5 py-1 rounded-full text-[10px] font-bold transition-all ${item.active ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-muted'}`}>
                        {item.active ? 'On' : 'Off'}
                      </button>
                      <button onClick={() => deleteItem(item)} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors" title="Delete">
                        <Icon name="delete" className="text-red-400 text-[16px]" />
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}

            {/* ── Add new item ── */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200 mt-4">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add Item</div>
              <input value={newName} onChange={e => setNewName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addItem()}
                placeholder="Item description…" className={inputCls + ' w-full'} />
              <div className="flex gap-2">
                {tab !== 'maint' && (
                  <select value={newSection} onChange={e => setNewSection(e.target.value)} className={inputCls + ' flex-1 appearance-none'}>
                    {SECTIONS.map(s => <option key={s}>{s}</option>)}
                  </select>
                )}
                {tab === 'maint' && (
                  <input type="number" min="1" value={newFreq} onChange={e => setNewFreq(e.target.value)}
                    placeholder="Days" className={inputCls + ' flex-1'} />
                )}
                <select value={newPriority} onChange={e => setNewPriority(e.target.value)} className={inputCls + ' flex-1 appearance-none'}>
                  <option value="high">High</option>
                  <option value="med">Med</option>
                  <option value="low">Low</option>
                </select>
              </div>
              <button onClick={addItem} disabled={!newName.trim() || saving}
                className="w-full py-2 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 disabled:opacity-40 hover:brightness-110 active:scale-[0.98] transition-all">
                <Icon name="add" className="text-sm" /> {saving ? 'Saving…' : 'Add Item'}
              </button>
            </div>
          </div>
        </div>
      );
    }

        sb.from('vehicle_models').select('*').order('name').then(({ data }) => {

          }));

        });

              <Icon name="arrow_back" className="text-navy" />
            </button>

            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="model-manager" />
          <div className="p-4 space-y-3">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : models.map(m => (
              <div key={m.id} className="bg-white rounded-[16px] shadow-card overflow-hidden">
                <button onClick={() => setExpanded(expanded === m.id ? null : m.id)}
                  className="w-full flex items-center gap-3 p-3 text-left hover:bg-gray-50 transition-colors">
                  <div className="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                    <Icon name="directions_car" className="text-primary text-lg" />
                  </div>
                  <div className="flex-1">
                    <div className="text-[13px] font-black text-navy">{m.name}</div>
                    <div className="text-[10px] text-muted">{m.engine} · {m.fuel_type || ''}</div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={e => { e.stopPropagation(); deleteModel(m.id); }} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors">
                      <Icon name="delete" className="text-red-400 text-sm" />
                    </button>
                    <Icon name={expanded === m.id ? 'expand_less' : 'expand_more'} className="text-muted" />
                  </div>
                </button>
                {expanded === m.id && (
                  <div className="px-4 pb-3 border-t border-gray-100">
                    <div className="py-2 text-[11px] font-bold uppercase tracking-widest text-muted mb-2">Color Options</div>
                    <div className="flex flex-wrap gap-1.5">
                      {(m.color_options || []).map(c => (
                        <span key={c} className="px-2.5 py-1 bg-gray-100 text-navy text-[11px] font-semibold rounded-full">{c}</span>
                      ))}
                      {!(m.color_options?.length) && <span className="text-[12px] text-muted italic">No colors configured</span>}
                    </div>
                  </div>
                )}

            ))}
            {/* Add new model */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add Model</div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Model name (e.g. GS3 Emzoom)" className={inputCls + ' w-full'} />
              <input value={newEngine} onChange={e => setNewEngine(e.target.value)} placeholder="Engine (e.g. 1.5T 174hp 7-DCT)" className={inputCls + ' w-full'} />
              <select value={newFuel} onChange={e => setNewFuel(e.target.value)} className={inputCls + ' w-full appearance-none'}>
                <option>Gasolina</option>
                <option>Diesel</option>
                <option>Hybrid</option>
                <option>Electric</option>
              </select>
              <button onClick={addModel} disabled={!newName.trim() || !newEngine.trim() || saving}
                className="w-full py-2 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 disabled:opacity-40 hover:brightness-110 active:scale-[0.98] transition-all">
                <Icon name="add" className="text-sm" /> {saving ? 'Saving…' : 'Add Model'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─── AddVehicleModal ─── */
    function AddVehicleModal({ onClose, onAdd, t }) {
      const [selModel, setSelModel] = useState(0);
      const [color, setColor] = useState(GAC_MODELS[0].colors[0]);
      const [vin, setVin] = useState('');
      const [lot, setLot] = useState('');
      const [saving, setSaving] = useState(false);
      const gm = GAC_MODELS[selModel];
      const isValid = vin.trim().length >= 10 && lot.trim();
      const handleAdd = async () => {
        if (!isValid || saving) return;
        setSaving(true);
        await onAdd({ vin: vin.trim(), model: gm.model, type: gm.type, color, engine: gm.engine, fuel: gm.fuel, lot: lot.trim() });
        setSaving(false);
      };
      const inputCls = "w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-[13px] text-navy outline-none focus:border-primary transition-colors";
      return (
        <div className="fixed inset-0 bg-black/50 z-50 anim-fade-in flex items-end justify-center" onClick={onClose}>
          <div className="w-full max-w-[430px] bg-white rounded-t-[32px] shadow-2xl anim-slide-up" onClick={e => e.stopPropagation()}>
            <div className="w-12 h-1 bg-gray-200 rounded-full mx-auto mt-3" />
            <div className="flex items-center justify-between px-5 pt-3 pb-4 border-b border-gray-100">
              <h2 className="font-black text-navy text-[18px]">{t('addVehicleTitle')}</h2>
              <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><Icon name="close" className="text-navy" /></button>
            </div>
            <div className="overflow-y-auto p-5 space-y-4" style={{ maxHeight:'70vh' }}>
              <Field label={t('modelLabel')} required>
                <div className="relative">
                  <select value={selModel} onChange={e => { setSelModel(Number(e.target.value)); setColor(GAC_MODELS[Number(e.target.value)].colors[0]); }} className={inputCls + ' appearance-none'}>
                    {GAC_MODELS.map((m, i) => <option key={m.model} value={i}>{m.model} ({m.type.toUpperCase()})</option>)}
                  </select>
                  <Icon name="expand_more" className="absolute right-3 top-2.5 text-muted pointer-events-none" />
                </div>
              </Field>
              <Field label={t('colorLabel')} required>
                <div className="flex flex-wrap gap-2">
                  {gm.colors.map(c => (
                    <button key={c} onClick={() => setColor(c)}
                      className={`px-3 py-1.5 rounded-full text-[11px] font-bold transition-all ${color === c ? 'bg-primary text-white shadow-md' : 'bg-gray-100 text-muted hover:bg-gray-200'}`}>
                      {c}
                    </button>
                  ))}
                </div>
              </Field>
              <div className="grid grid-cols-2 gap-4">
                <Field label={t('engineLabel')}><div className="text-[13px] font-bold text-navy bg-gray-50 rounded-xl px-3 py-2.5">{gm.engine}</div></Field>
                <Field label={t('fuelLabel')}><div className="text-[13px] font-bold text-navy bg-gray-50 rounded-xl px-3 py-2.5">{gm.fuel}</div></Field>
              </div>
              <Field label={t('vinLabel')} required>
                <input value={vin} onChange={e => setVin(e.target.value)} placeholder="e.g. LFVAA11G5KA000008" className={inputCls} />
              </Field>
              <Field label={t('lotLabel')} required>
                <input value={lot} onChange={e => setLot(e.target.value)} placeholder="e.g. B-10" className={inputCls} />
              </Field>
              <div className="pb-2">
                <button onClick={handleAdd} disabled={!isValid || saving}
                  className="w-full py-[14px] rounded-full bg-primary text-white font-black text-[13px] uppercase tracking-[0.12em] flex items-center justify-center gap-2 shadow-primary-glow hover:brightness-110 active:scale-[0.98] transition-all disabled:opacity-40 disabled:shadow-none">
                  {saving
                    ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                    : <Icon name="add" fill className="text-xl" />}
                  {saving ? 'Saving…' : t('addToFleet')}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── APP ROOT ─── */
    function App() {
      /* ── auth / session ── */
      const [session,        setSession]         = useState(null);
      const [userProfile,    setUserProfile]      = useState(null); // {id, name, role, color}
      const [authLoading,    setAuthLoading]      = useState(true);
      const lastUidRef = useRef(null);  // tracks UID across sign-out for online = false

      /* ── app state ── */
      const [view,           setView]             = useState('login');
      const [showNotifs,     setShowNotifs]       = useState(false);
      const [showAddVehicle, setShowAddVehicle]   = useState(false);
      const [vehicles,       setVehicles]         = useState([]);
      const [technicians,    setTechnicians]       = useState([]);
      const [notifications,  setNotifications]    = useState([]);
      const [detailVehicleId,setDetailVehicleId]  = useState(null);
      const [toast,          setToast]            = useState('');
      const [lang,           setLang]             = useState('en');
      const [dataReady,      setDataReady]        = useState(false);

      const t = (key, vars) => {
        const dict = translations[lang] || translations.en;
        let str = dict[key] || translations.en[key] || key;
        if (vars) Object.entries(vars).forEach(([k,v]) => { str = str.replace(`{${k}}`, v); });
        return str;
      };

      const navigate = (target) => { setView(target); window.scrollTo(0, 0); };
      const showToastMsg = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

      /* ── load user profile ── */
      const loadUserProfile = async (uid) => {
        const { data } = await sb.from('user_profiles').select('*').eq('id', uid).single();
        if (data) {
          setUserProfile(data);
          return data;
        }
        return null;
      };

      /* ── load all vehicles from Supabase ── */
      // profile_id stored directly on vehicle_assignments — no nested join needed
      const VEHICLE_Q = `*, pdi_checks(*), stock_maintenance(*), final_checks(*), vehicle_history(*), vehicle_assignments(profile_id)`;
      const loadVehicles = async () => {
        const { data, error } = await sb.from('vehicles')
          .select(VEHICLE_Q)
          .order('created_at', { ascending: false });
        if (error) { console.error('loadVehicles', error); return; }
        const transformed = (data || []).map(transformVehicle);
        setVehicles(transformed);
      };

      /* ── load technicians from technicians table (has online column) ── */
      const loadTechnicians = async () => {
        const { data } = await sb.from('technicians').select('*').not('profile_id', 'is', null);
        if (!data) return;
        const list = data.map(t => ({
          id:     t.profile_id,   // auth UUID — used to match v.assignedTech
          techId: t.id,           // technicians PK — used for vehicle_assignments.tech_id
          name:   t.name    || 'Unknown',
          ini:    t.initials || (t.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
          role:   t.role    || 'technician',
          color:  t.color   || '#8A8FA3',
          online: t.online  || false,
        }));
        setTechnicians(list);
        _techsRef.current = list;
      };

      /* ── load notifications ── */
      const loadNotifications = async (uid) => {
        const { data } = await sb.from('notifications').select('*').eq('user_id', uid).order('created_at', { ascending: false }).limit(30);
        const notifColor = icon => icon === 'error' ? 'text-red-500' : icon === 'check_circle' ? 'text-emerald-500' : icon === 'warning' ? 'text-amber-500' : 'text-primary';
        setNotifications((data || []).map(n => ({
          ...n,
          time:  n.created_at ? n.created_at.slice(0, 10) : '',
          color: notifColor(n.icon),
        })));
      };

      /* ── full data bootstrap ── */
      const loadAllData = async (uid) => {
        await Promise.all([loadVehicles(), loadTechnicians(), loadNotifications(uid)]);
        setDataReady(true);
      };

      /* ── auth state listener (runs once on mount) ── */
      useEffect(() => {
        const setOnline = (uid, online) => {
          sb.from('technicians').update({ online }).eq('profile_id', uid).then(() => {});
        };

        sb.auth.getSession().then(({ data: { session: s } }) => {
          setSession(s);
          if (s) {
            lastUidRef.current = s.user.id;
            loadUserProfile(s.user.id).then(profile => {
              if (profile) {
                if (profile.role === 'tech') setOnline(s.user.id, true);
                loadAllData(s.user.id);
                navigate(profile.role === 'admin' ? 'admin-dashboard' : 'tech-home');
              }
            });
          }
          setAuthLoading(false);
        });

        const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
          setSession(s);
          if (s && event === 'SIGNED_IN') {
            lastUidRef.current = s.user.id;
            loadUserProfile(s.user.id).then(profile => {
              if (profile) {
                if (profile.role === 'tech') setOnline(s.user.id, true);
                loadAllData(s.user.id);
                navigate(profile.role === 'admin' ? 'admin-dashboard' : 'tech-home');
              }
            });
          } else if (!s) {
            if (lastUidRef.current) { setOnline(lastUidRef.current, false); lastUidRef.current = null; }
            setUserProfile(null);
            setVehicles([]);
            setTechnicians([]);
            setNotifications([]);
            setDataReady(false);
            navigate('login');
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      /* ── realtime: vehicles table ── */
      useEffect(() => {
        if (!session) return;
        const chan = sb.channel('vehicles-live')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'vehicles' }, payload => {
            if (payload.eventType === 'DELETE') {
              setVehicles(prev => prev.filter(v => v.id !== payload.old.id));
            } else {
              sb.from('vehicles').select(VEHICLE_Q).eq('id', payload.new.id).single()
                .then(({ data }) => {
                  if (!data) return;
                  const tv = transformVehicle(data);
                  setVehicles(prev => {
                    const exists = prev.some(v => v.id === tv.id);
                    return exists ? prev.map(v => v.id === tv.id ? tv : v) : [tv, ...prev];
                  });
                });
            }
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── realtime: pdi_checks — full vehicle refetch so admin sees state + note + image ── */
      useEffect(() => {
        if (!session) return;
        const chan = sb.channel('pdi-checks-live')
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pdi_checks' }, payload => {
            const vehicleId = payload.new?.vehicle_id;
            if (!vehicleId) return;
            sb.from('vehicles').select(VEHICLE_Q).eq('id', vehicleId).single()
              .then(({ data }) => {
                if (!data) return;
                const tv = transformVehicle(data);
                setVehicles(prev => prev.map(v => v.id === tv.id ? tv : v));
              });
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── realtime: final_checks — full vehicle refetch so admin sees state + note + image ── */
      useEffect(() => {
        if (!session) return;
        const chan = sb.channel('final-checks-live')
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'final_checks' }, payload => {
            const vehicleId = payload.new?.vehicle_id;
            if (!vehicleId) return;
            sb.from('vehicles').select(VEHICLE_Q).eq('id', vehicleId).single()
              .then(({ data }) => {
                if (!data) return;
                const tv = transformVehicle(data);
                setVehicles(prev => prev.map(v => v.id === tv.id ? tv : v));
              });
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── realtime: vehicle_history — repair notes show up live ── */
      useEffect(() => {
        if (!session) return;
        const chan = sb.channel('history-live')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'vehicle_history' }, payload => {
            const h = payload.new;
            setVehicles(prev => prev.map(v => {
              if (v.id !== h.vehicle_id) return v;
              const newRaw = [h, ...v.historyRaw];
              const newStr = newRaw.map(x => `${(x.created_at || '').slice(0, 10)}: ${x.action || ''}`);
              return { ...v, historyRaw: newRaw, history: newStr };
            }));
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── realtime: notifications ── */
      useEffect(() => {
        if (!session) return;
        const notifColor = icon => icon === 'error' ? 'text-red-500' : icon === 'check_circle' ? 'text-emerald-500' : icon === 'warning' ? 'text-amber-500' : 'text-primary';
        const chan = sb.channel('notifs-live')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications',
              filter: `user_id=eq.${session.user.id}` }, payload => {
            const n = payload.new;
            setNotifications(prev => [{
              ...n,
              time:  n.created_at ? n.created_at.slice(0, 10) : '',
              color: notifColor(n.icon),
            }, ...prev]);
            showToastMsg(n.title);
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── realtime: technicians online status ── */
      useEffect(() => {
        if (!session) return;
        const chan = sb.channel('techs-live')
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'technicians' }, payload => {
            const u = payload.new;
            const patch = t => t.techId === u.id ? { ...t, online: u.online } : t;
            setTechnicians(prev => prev.map(patch));
            _techsRef.current = _techsRef.current.map(patch);
          })
          .subscribe();
        return () => sb.removeChannel(chan);
      }, [session]);

      /* ── local optimistic update ── */
      const updateVehicle = (id, fn) => {
        setVehicles(prev => prev.map(v => v.id === id ? fn(v) : v));
      };

      /* ── assign / unassign vehicle to technician ── */
      const assignVehicle = async (vehicleId, techProfileId) => {
        // Optimistic local update
        setVehicles(prev => prev.map(v => v.id === vehicleId ? { ...v, assignedTech: techProfileId || null } : v));
        // Remove any existing assignment for this vehicle
        await sb.from('vehicle_assignments').delete().eq('vehicle_id', vehicleId);
        if (techProfileId) {
          const tech = _techsRef.current.find(t => t.id === techProfileId);
          if (tech?.techId) {
            await sb.from('vehicle_assignments').insert({
              vehicle_id: vehicleId,
              tech_id: tech.techId,
              profile_id: techProfileId,
            });
          }
        }
      };

      /* ── db helpers passed to VehicleDetailOverlay ── */
      const db = session ? {
        updateStage: async (vehicleId, newStage, extra = {}) => {
          await sb.from('vehicles').update({ stage: newStage, ...extra }).eq('id', vehicleId);
        },
        insertHistory: async (vehicleId, action, fromStage, toStage) => {
          await sb.from('vehicle_history').insert({
            vehicle_id: vehicleId, actor_id: session.user.id,
            action, stage_from: fromStage, stage_to: toStage,
          });
        },
        reportIssue: async (vehicleId, vehicleLabel, checkType, itemName, note, techName) => {
          // 1. Log into vehicle_history so admin sees it in the repair log
          await sb.from('vehicle_history').insert({
            vehicle_id: vehicleId, actor_id: session.user.id,
            action: `Issue reported by ${techName} — [${checkType.toUpperCase()}] ${itemName}${note ? ': ' + note : ''}`,
            stage_from: 'hold', stage_to: 'hold',
          });
          // 2. Send a notification to every admin
          const { data: admins } = await sb.from('user_profiles').select('id').eq('role', 'admin');
          if (!admins?.length) return;
          const notifRows = admins.map(a => ({
            user_id: a.id,
            title:   `Issue: ${itemName}`,
            detail:  `${vehicleLabel} — ${note || 'No description'} — reported by ${techName}`,
            icon:    'error',
            read:    false,
          }));
          await sb.from('notifications').insert(notifRows);
        },
        insertMaintTasks: async (vehicleId, today) => {
          const { data: templates } = await sb.from('maint_task_templates').select('*').eq('active', true);
          if (!templates?.length) return;
          const rows = templates.map(tmpl => ({
            vehicle_id: vehicleId,
            task_id:    String(tmpl.id),         // task_id is text in DB
            name:       tmpl.name,
            freq_days:  tmpl.frequency_days,
            priority:   tmpl.priority || 'med',
            last_done:  today,
            next_due:   addDays(today, tmpl.frequency_days),
          }));
          await sb.from('stock_maintenance').insert(rows);
        },
        upsertPdiCheck: async (vehicleId, rowId, state, note) => {
          if (!rowId) return;
          await sb.from('pdi_checks')
            .update({ state, note: note || '', checked_at: new Date().toISOString(), checked_by: session.user.id })
            .eq('id', rowId);
        },
        upsertFinalCheck: async (vehicleId, rowId, state, note) => {
          if (!rowId) return;
          await sb.from('final_checks')
            .update({ state, note: note || '', checked_at: new Date().toISOString(), checked_by: session.user.id })
            .eq('id', rowId);
        },
        bulkSaveChecks: async (vehicleId, type, checks) => {
          // UPDATE each row by its UUID id — techs have UPDATE but not INSERT on these tables
          const table = type === 'pdi' ? 'pdi_checks' : 'final_checks';
          const now   = new Date().toISOString();
          const results = await Promise.all(
            checks
              .filter(c => c.id)          // skip any row with no id (shouldn't happen)
              .map(c =>
                sb.from(table)
                  .update({ state: c.state, note: c.note || '', checked_at: now, checked_by: session.user.id })
                  .eq('id', c.id)
              )
          );
          const failed = results.find(r => r.error);
          if (failed) throw failed.error;
        },
        completeMaint: async (vehicleId, taskId, freq) => {
          const today = todayStr();
          await sb.from('stock_maintenance')
            .update({ last_done: today, next_due: addDays(today, freq) })
            .eq('vehicle_id', vehicleId).eq('task_id', taskId);
        },
        uploadVehicleImage: async (vehicleId, file) => {
          const ext  = file.name.split('.').pop();
          const path = `${vehicleId}/primary.${ext}`;
          const { error } = await sb.storage.from('vehicle-images').upload(path, file, { upsert: true });
          if (error) throw error;
          const { data } = sb.storage.from('vehicle-images').getPublicUrl(path);
          await sb.from('vehicles').update({ cover_photo_url: data.publicUrl }).eq('id', vehicleId);
          return data.publicUrl;
        },
        uploadIssueImage: async (vehicleId, checkType, itemId, file) => {
          const ext  = file.name.split('.').pop();
          const ts   = Date.now();
          const path = `${vehicleId}/${itemId}/${ts}.${ext}`;
          const { error } = await sb.storage.from('issue-images').upload(path, file);
          if (error) throw error;
          const { data } = sb.storage.from('issue-images').getPublicUrl(path);
          const table = checkType === 'pdi' ? 'pdi_checks' : 'final_checks';
          await sb.from(table).update({ image_url: data.publicUrl })
            .eq('id', itemId);         // itemId is the row PK
          return data.publicUrl;
        },
      } : null;

      /* ── add vehicle (persisted) ── */
      const handleAddVehicle = async (formData) => {
        const { vin, model, color, engine, fuel, lot } = formData;
        // Compute per-model sequence number
        const { count: modelCount } = await sb.from('vehicles').select('*', { count: 'exact', head: true }).eq('model', model);
        const vehicle_number = (modelCount || 0) + 1;
        const { data, error } = await sb.from('vehicles').insert({
          vin, model, color, engine, fuel, lot,
          make: 'GAC', year: 2025, stage: 'port',
          arrival_date: todayStr(),
          notes: '', vehicle_number,
        }).select().single();
        if (error) { console.error(error); showToastMsg('Error: ' + error.message); return; }

        const today = todayStr();
        const addDays = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0,10); };

        // seed pdi_checks — store section/name/priority inline (schema is denormalised)
        const { data: pdiTemplates } = await sb.from('pdi_item_templates').select('*').eq('active', true);
        if (pdiTemplates?.length) {
          const { error: e1 } = await sb.from('pdi_checks').insert(pdiTemplates.map(tmpl => ({
            vehicle_id: data.id, item_id: String(tmpl.id),
            section: tmpl.section || 'General', name: tmpl.name, priority: tmpl.priority || 'med',
            state: 'pending', note: '',
          })));
          if (e1) console.error('pdi_checks seed:', e1);
        }

        // seed stock_maintenance
        const { data: maintTemplates } = await sb.from('maint_task_templates').select('*').eq('active', true);
        if (maintTemplates?.length) {
          const { error: e2 } = await sb.from('stock_maintenance').insert(maintTemplates.map(tmpl => ({
            vehicle_id: data.id, task_id: String(tmpl.id),
            name: tmpl.name, freq_days: tmpl.frequency_days || 30, priority: tmpl.priority || 'med',
            state: 'pending', last_done: today, next_due: addDays(today, tmpl.frequency_days || 30),
          })));
          if (e2) console.error('stock_maintenance seed:', e2);
        }

        // seed final_checks
        const { data: finalTemplates } = await sb.from('final_check_templates').select('*').eq('active', true);
        if (finalTemplates?.length) {
          const { error: e3 } = await sb.from('final_checks').insert(finalTemplates.map(tmpl => ({
            vehicle_id: data.id, item_id: String(tmpl.id),
            section: tmpl.section || 'General', name: tmpl.name, priority: tmpl.priority || 'med',
            state: 'pending', note: '',
          })));
          if (e3) console.error('final_checks seed:', e3);
        }

        await sb.from('vehicle_history').insert({
          vehicle_id: data.id, actor_id: session.user.id,
          action: 'Arrived from port', stage_to: 'port',
        });
        await loadVehicles();
        setShowAddVehicle(false);
        showToastMsg('Vehicle added to fleet ✓');
      };

      const openDetail  = (id) => setDetailVehicleId(id);
      const closeDetail = () => setDetailVehicleId(null);

      const isAdminView = view.startsWith('admin') || view === 'fleet-list' || view === 'team' || view === 'reports' || view === 'settings';
      const detailVehicle = vehicles.find(v => v.id === detailVehicleId);

      const shared = {
        navigate, vehicles, updateVehicle, technicians, assignVehicle,
        onNotificationClick: () => setShowNotifs(true),
        onAddVehicle: () => setShowAddVehicle(true),
        unreadCount: notifications.filter(n => !n.read).length,
        currentTechId: userProfile?.id || '',
        userProfile,
        onOpenDetail: openDetail,
        t, lang, setLang,
      };

      /* ── global loading screen ── */
      if (authLoading) {
        return (
          <div className="max-w-[430px] mx-auto min-h-screen flex items-center justify-center bg-[#F5F5F5]">
            <div className="flex flex-col items-center gap-4">
              <div className="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center shadow-primary-glow">
                <Icon name="garage" fill className="text-white text-3xl" />
              </div>
              <div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          </div>
        );
      }

      const screens = {
        'login':             <LoginScreen           onLogin={loadAllData} />,
        'tech-home':         <TechDashboardScreen   {...shared} />,
        'tech-inspect':      <TechInspectScreen     {...shared} />,
        'tech-stockyard':    <TechStockyardScreen   {...shared} />,
        'tech-delivery':     <TechDeliveryScreen    {...shared} />,
        'tech-settings':     <TechSettingsScreen    {...shared} />,
        'admin-dashboard':   <AdminDashboard        {...shared} />,
        'fleet-list':        <FleetListScreen       {...shared} />,
        'team':              <TeamScreen            {...shared} technicians={technicians} />,
        'hold-tracker':      <HoldTrackerScreen     {...shared} db={db} session={session} />,
        'reports':           <ReportsScreen         {...shared} />,
        'settings':          <SettingsScreen        {...shared} />,
        'pipeline-manager':  <PipelineManagerScreen  navigate={navigate} t={t} />,
        'checklist-editor':  <ChecklistEditorScreen  navigate={navigate} t={t} />,
        'model-manager':     <ModelManagerScreen     navigate={navigate} t={t} />,
      };

      return (
        <div className="max-w-[430px] mx-auto min-h-screen relative">
          {screens[view] || screens['login']}
          {detailVehicle && (
            <VehicleDetailOverlay
              vehicle={detailVehicle}
              onClose={closeDetail}
              updateVehicle={updateVehicle}
              db={db}
              isAdmin={isAdminView}
              t={t}
            />
          )}
          {showNotifs && (
            <NotificationsPanel
              onClose={() => setShowNotifs(false)}
              notifications={notifications}
              onMarkAllRead={async () => {
                setNotifications(prev => prev.map(n => ({ ...n, read: true })));
                if (session) await sb.from('notifications').update({ read: true }).eq('user_id', session.user.id).eq('read', false);
              }}
              t={t}
            />
          )}
          {showAddVehicle && (
            <AddVehicleModal
              onClose={() => setShowAddVehicle(false)}
              onAdd={handleAddVehicle}
              t={t}
            />
          )}
          {toast && (
            <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-navy text-white px-5 py-2.5 rounded-full text-[12px] font-bold shadow-lg z-[60] anim-slide-up whitespace-nowrap">
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
