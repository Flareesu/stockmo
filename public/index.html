    // ── Date utilities ──────────────────────────────────────────────────────────
    const fmtDate = (d) => {
      if (!d) return '—';
      const s = String(d);
      const dt = new Date(s.includes('T') ? s : s + 'T00:00:00');
      return isNaN(dt) ? s : dt.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
    };

    const excelDateToISO = (v) => {
      if (v === null || v === undefined || v === '') return null;
      if (typeof v === 'number') {
        const d = new Date((v - 25569) * 86400 * 1000);
        return isNaN(d) ? null : d.toISOString().split('T')[0];
      }
      const d = new Date(v);
      return isNaN(d) ? null : d.toISOString().split('T')[0];
    };

    // Detect fuel type from variant string AND model name
    const detectFuel = (variant = '', model = '') => {
      const v = (variant + ' ' + model).toUpperCase();
      if (v.includes('PHEV'))  return 'PHEV';
      if (v.includes('HEV'))   return 'HEV';
      if (v.includes(' EV') || v.startsWith('EV') || v.includes('BEV') || v.includes('ELECTRIC')) return 'Electric';
      if (v.includes('DIESEL')) return 'Diesel';
      if (/\bAION\b/.test(v))  return 'Electric';
      return 'Gasoline';
    };

    // Transforms a Supabase vehicle row (with nested join data) into the shape
    // the existing screen components expect.
    const transformVehicle = (row) => {
      const type = getModelType(row.model || '');
      // pdi_checks / final_checks already store section/name/priority inline
      const pdiChecks = (row.pdi_checks || []).map(c => ({
        id:        c.id       || '',   // actual row PK — reliable for updates
        itemId:    c.item_id  || '',   // template FK — kept for reference
        section:   c.section  || 'General',
        name:      c.name     || '',
        priority:  c.priority || 'med',
        state:     c.state    || 'pending',
        note:      c.note     || '',
        image_url: c.image_url || null,
      }));
      // stock_maintenance uses task_id as the FK and stores freq_days inline
      const stockMaint = (row.stock_maintenance || []).map(m => ({
        id:       m.task_id  || '',
        name:     m.name     || '',
        freq:     m.freq_days || 30,
        priority: m.priority  || 'med',
        lastDone: m.last_done || todayStr(),
        nextDue:  m.next_due  || todayStr(),
      }));
      const finalChecks = (row.final_checks || []).map(f => ({
        id:        f.id       || '',   // actual row PK — reliable for updates
        itemId:    f.item_id  || '',   // template FK — kept for reference
        section:   f.section  || 'General',
        name:      f.name     || '',
        priority:  f.priority || 'med',
        state:     f.state    || 'pending',
        note:      f.note     || '',
        image_url: f.image_url || null,
      }));
      const historyRaw = (row.vehicle_history || [])
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const history = historyRaw.map(h => `${(h.created_at || '').slice(0, 10)}: ${h.action || ''}`);
      // vehicle_assignments stores profile_id directly — simple flat lookup
      const assignedTech = (row.vehicle_assignments || [])[0]?.profile_id || null;
      const num = row.vehicle_number;
      const label = num ? `${row.model || ''} #${num}` : (row.model || '');
      return {
        id:          row.id,
        label,
        vin:         row.vin          || '',
        make:        row.make         || 'GAC',
        model:       row.model        || '',
        type,
        year:        row.year         || 2025,
        color:       row.color        || '',
        engine:      row.engine       || '',
        fuel:          row.fuel || detectFuel(row.variant || '', row.model || ''),
        variant:       row.variant        || '',
        exteriorColor: row.exterior_color || row.color || '',
        interiorColor: row.interior_color || '',
        csNumber:      row.cs_number      || '',
        engineNumber:  row.engine_number  || '',
        invoiceNumber: row.invoice_number || '',
        blNumber:      row.bl_number      || '',
        contractNo:    row.contract_no    || '',
        salesStatus:   row.sales_status   || '',
        dealerGroup:   row.dealer_group   || '',
        region:        row.region         || '',
        lot:         row.lot          || '',
        stage:       row.stage        || '',

        stockDate:   row.stock_date,
        finalDate:   row.final_date,
        releaseDate: row.release_date,
        dealer:      row.dealer,
        notes:       row.notes        || '',
        assignedTech,
        pdiChecks,
        stockMaint,
        finalChecks,
        history,
        historyRaw,
        extraFields: row.extra_fields || {},

    // Base Modal: fixed backdrop, Esc-to-close, click-outside-to-close, body scroll lock.
    // z-50 backdrop / z-60 panel / z-80 toast — keep this ladder consistent.
    const Modal = ({ open, onClose, children, panelClassName = '', closeOnBackdrop = true, dismissable = true }) => {
      React.useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (dismissable && e.key === 'Escape') onClose?.(); };
        document.addEventListener('keydown', onKey);
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
      }, [open, onClose, dismissable]);
      if (!open) return null;
      return (
        <div
          className="fixed inset-0 z-50 bg-black/50 flex items-end lg:items-center justify-center anim-fade-in"
          role="dialog" aria-modal="true"
          onClick={(e) => { if (closeOnBackdrop && dismissable && e.target === e.currentTarget) onClose?.(); }}
        >
          <div className={`relative bg-white w-full lg:max-w-md rounded-t-[20px] lg:rounded-[20px] shadow-card z-[60] ${panelClassName}`}>
            {children}
          </div>
        </div>
      );
    };

    // Imperative dialog API — replaces native alert()/confirm() which are unstyled on mobile
    // and break the design system. Call pattern:
    //   const ok = await stockmoDialog.confirm({ title, message, danger: true });
    //   await stockmoDialog.alert({ title, message });
    const stockmoDialog = (() => {
      let nextId = 1;
      const listeners = new Set();
      const emit = (dialog) => listeners.forEach(fn => fn(dialog));
      return {
        _subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
        confirm({ title = 'Confirm', message = '', confirmLabel = 'OK', cancelLabel = 'Cancel', danger = false } = {}) {
          return new Promise(resolve => {
            emit({ id: nextId++, kind: 'confirm', title, message, confirmLabel, cancelLabel, danger, resolve });
          });
        },
        alert({ title = 'Notice', message = '', confirmLabel = 'OK' } = {}) {
          return new Promise(resolve => {
            emit({ id: nextId++, kind: 'alert', title, message, confirmLabel, resolve });
          });
        },
      };
    })();
    // Expose globally so any render path (including inline handlers in screens defined
    // before App) can reach it without prop-drilling.
    window.stockmoDialog = stockmoDialog;

    const DialogHost = () => {
      const [dialog, setDialog] = React.useState(null);
      React.useEffect(() => stockmoDialog._subscribe(setDialog), []);
      if (!dialog) return null;
      const close = (value) => { dialog.resolve(value); setDialog(null); };
      const isConfirm = dialog.kind === 'confirm';
      return (
        <Modal open onClose={() => close(false)}>
          <div className="p-5">
            <div className="text-[15px] font-black text-navy mb-1">{dialog.title}</div>
            {dialog.message && <div className="text-[13px] text-muted leading-relaxed whitespace-pre-line">{dialog.message}</div>}
            <div className="mt-5 flex gap-2 justify-end">
              {isConfirm && (

                  onClick={() => close(false)}
                  className="px-4 py-2 rounded-full text-[13px] font-bold text-navy hover:bg-gray-100 transition-colors">

                </button>

                onClick={() => close(true)}
                className={`px-4 py-2 rounded-full text-[13px] font-bold text-white transition-colors ${dialog.danger ? 'bg-primary hover:bg-primary/90' : 'bg-navy hover:bg-navy/90'}`}>

      const [error,    setError]    = useState('');
      const [showPw,   setShowPw]   = useState(false);

      const handleLogin = async () => {
        if (!email.trim() || !password) return;
        setLoading(true); setError('');
        const { error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (err) { setError(err.message); setLoading(false); }
        // On success, App's onAuthStateChange fires → no need to navigate manually
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <div className="flex-1 flex flex-col items-center justify-center px-6">
            <div className="w-full max-w-[360px]">
              <div className="flex flex-col items-center mb-10">
                <div className="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-primary-glow mb-4">
                  <Icon name="garage" fill className="text-white text-3xl" />
                </div>
                <h1 className="text-[2rem] font-black text-navy leading-tight text-center">StockMo</h1>
                <p className="text-[12px] text-muted font-bold uppercase tracking-[0.14em] mt-1">Automotive Intelligence</p>
              </div>

              <div className="bg-white rounded-[24px] shadow-card p-6 space-y-4">
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-widest text-muted mb-1.5">Email</label>
                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 focus-within:border-primary transition-colors">
                    <Icon name="email" className="text-muted text-[18px]" />
                    <input
                      type="email" value={email} onChange={e => setEmail(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleLogin()}
                      placeholder="you@stockmo.com"
                      className="flex-1 bg-transparent text-[13px] text-navy placeholder:text-muted outline-none"
                    />
                  </div>
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-widest text-muted mb-1.5">Password</label>
                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 focus-within:border-primary transition-colors">
                    <Icon name="lock" className="text-muted text-[18px]" />
                    <input
                      type={showPw ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleLogin()}
                      placeholder="••••••••"
                      className="flex-1 bg-transparent text-[13px] text-navy placeholder:text-muted outline-none"
                    />
                    <button onClick={() => setShowPw(p => !p)} className="text-muted hover:text-navy transition-colors">
                      <Icon name={showPw ? 'visibility_off' : 'visibility'} className="text-[18px]" />
                    </button>
                  </div>
                </div>
                {error && (
                  <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded-xl px-3 py-2.5">
                    <Icon name="error" fill className="text-red-500 text-[18px] flex-shrink-0" />
                    <p className="text-[12px] text-red-700">{error}</p>
                  </div>
                )}
                <button onClick={handleLogin} disabled={loading || !email || !password}
                  className="w-full py-[14px] rounded-full bg-primary text-white font-black text-[13px] uppercase tracking-[0.14em] flex items-center justify-center gap-2 shadow-primary-glow hover:brightness-110 active:scale-[0.98] transition-all disabled:opacity-50 disabled:shadow-none">
                  {loading
                    ? <><span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin" /> Signing in…</>
                    : <><Icon name="login" fill className="text-lg" /> Sign In</>}
                </button>
              </div>

              <p className="text-center text-[11px] text-muted mt-4 flex items-center justify-center gap-1">
                <Icon name="lock" className="text-sm" /> Secure enterprise connection
              </p>
            </div>
          </div>
          <footer className="px-6 pb-8 pt-2 text-center">
            <div className="text-[10px] text-muted">© 2025 StockMo Global Operations</div>
          </footer>
        </div>
      );
    }

    /* ─── TechDashboardScreen ─── */
    function TechDashboardScreen({ navigate, vehicles, currentTechId, onNotificationClick, unreadCount, onOpenDetail, t }) {
      const tech = techById(currentTechId);
      const myCars = vehicles.filter(v => v.assignedTech === currentTechId && v.stage !== 'released');
      const activePdi = myCars.filter(v => v.stage === 'pdi').length;
      const overdue   = myCars.filter(v => v.stage === 'stock' && hasMaintDue(v)).length;
      const holds     = myCars.filter(v => v.stage === 'hold').length;
      const hour = new Date().getHours();
      const greeting = hour < 12 ? t('goodMorning') : hour < 18 ? t('goodAfternoon') : t('goodEvening');

      // Stage config for "my fleet" list
      const stageInfo = {
        port:     { icon:'anchor',        color:'text-orange-500', bg:'bg-orange-50',  label:'At Port'      },
        pdi:      { icon:'checklist',     color:'text-blue-500',   bg:'bg-blue-50',    label:'PDI'          },
        hold:     { icon:'error',         color:'text-red-500',    bg:'bg-red-50',     label:'On Hold'      },
        stock:    { icon:'warehouse',     color:'text-indigo-500', bg:'bg-indigo-50',  label:'In Stock'     },
        ready:    { icon:'local_shipping',color:'text-purple-500', bg:'bg-purple-50',  label:'Ready'        },
        released: { icon:'check_circle',  color:'text-emerald-500',bg:'bg-emerald-50', label:'Released'     },
      };

      const priority = useMemo(() => {
        const items = [];
        myCars.filter(v => v.stage === 'hold').forEach(v => items.push({ v, type:'HOLD', desc:t('issuesFound', {count:countIssues(v)}), icon:'error', color:'text-red-500' }));
        myCars.filter(v => v.stage === 'stock' && hasMaintDue(v)).forEach(v => items.push({ v, type:'OVERDUE', desc:t('tasksOverdue', {count:countMaintDue(v)}), icon:'schedule', color:'text-amber-500' }));
        myCars.filter(v => v.stage === 'pdi').forEach(v => { const p = pdiProgress(v); items.push({ v, type:'PDI', desc:t('complete', {pct:p.pct}), icon:'checklist', color:'text-blue-500' }); });
        myCars.filter(v => v.stage === 'ready').forEach(v => { const p = finalProgress(v); items.push({ v, type:'FINAL', desc:t('complete', {pct:p.pct}), icon:'local_shipping', color:'text-purple-500' }); });
        return items.slice(0, 5);
      }, [vehicles, currentTechId]);

      const recentActivity = useMemo(() => {
        const all = [];
        myCars.forEach(v => v.history.forEach(h => all.push({ text: `${v.label || v.model}: ${h.split(': ').slice(1).join(': ')}`, date: h.split(':')[0] })));
        return all.sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
      }, [vehicles, currentTechId]);

      // Stage sort order for "my fleet"
      const stageOrder = { hold:0, pdi:1, port:2, stock:3, ready:4 };
      const sortedCars = [...myCars].sort((a,b) => (stageOrder[a.stage]??9) - (stageOrder[b.stage]??9));

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white text-[13px] font-black shadow-md" style={{backgroundColor:tech.color}}>{tech.ini}</div>
                <div>
                  <h1 className="text-[15px] font-bold text-navy">{greeting}, {tech.name.split(' ')[0]}</h1>
                  <p className="text-[11px] text-muted">{tech.role}</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onNotificationClick} className="relative p-2 hover:bg-gray-100 rounded-full transition-colors">
                  <Icon name="notifications" className="text-navy" />
                  {unreadCount > 0 && <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
                </button>
                <button onClick={() => sb.auth.signOut()} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                  <Icon name="logout" className="text-muted text-xl" />
                </button>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-4">
            {/* Stats */}
            <div className="grid grid-cols-3 gap-3">
              {[
                { label:t('assigned'), value:myCars.length, icon:'directions_car', color:'text-navy' },
                { label:t('activePdi'), value:activePdi, icon:'checklist', color:'text-blue-500' },
                { label:t('overdue'), value:overdue, icon:'schedule', color: overdue > 0 ? 'text-red-500' : 'text-emerald-500' },
              ].map(s => (
                <div key={s.label} className="bg-white rounded-[16px] p-3 shadow-card text-center">
                  <Icon name={s.icon} fill className={`${s.color} text-[22px] mb-1`} />
                  <div className="text-xl font-black text-navy">{s.value}</div>
                  <div className="text-[10px] text-muted font-medium leading-tight mt-0.5">{s.label}</div>
                </div>
              ))}
            </div>

            {/* Priority alerts */}
            {priority.length > 0 && (
              <div>
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('priorityQueue')}</h2>
                <div className="space-y-2">
                  {priority.map(p => (
                    <button key={p.v.id + p.type} onClick={() => onOpenDetail(p.v.id)} className="w-full bg-white rounded-[16px] p-3 shadow-card flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                      <div className="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0">
                        <Icon name={p.icon} fill className={`${p.color} text-xl`} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-black text-primary uppercase tracking-wider">{p.v.label || p.v.model}</span>
                          <StatusBadge status={p.v.stage} t={t} />
                        </div>
                        <div className="font-bold text-navy text-[13px] leading-tight">{p.v.model}</div>
                        <div className="text-[11px] text-muted">{p.desc}</div>
                      </div>
                      <Icon name="chevron_right" className="text-muted" />
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* My Fleet — ALL assigned vehicles, every stage */}
            <div>
              <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">My Fleet</h2>
              {sortedCars.length === 0 ? (
                <div className="bg-white rounded-[20px] p-8 shadow-card text-center">
                  <Icon name="directions_car" fill className="text-[40px] text-muted/40 mb-2" />
                  <div className="text-[13px] font-bold text-muted">No vehicles assigned yet</div>
                  <div className="text-[11px] text-muted mt-1">Ask your admin to assign vehicles to you</div>
                </div>
              ) : (
                <div className="space-y-2">
                  {sortedCars.map(v => {
                    const si = stageInfo[v.stage] || stageInfo.port;
                    return (
                      <button key={v.id} onClick={() => onOpenDetail(v.id)}
                        className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                        <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                          <img loading="lazy" src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-0.5">
                            <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                            <StatusBadge status={v.stage} t={t} />
                          </div>
                          <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                          <div className="text-[11px] text-muted">{v.color} · {t('lot')} {v.lot}</div>
                        </div>
                        <div className={`w-8 h-8 rounded-full ${si.bg} flex items-center justify-center flex-shrink-0`}>
                          <Icon name={si.icon} fill className={`${si.color} text-[16px]`} />
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Recent activity */}
            {recentActivity.length > 0 && (
              <div>
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('recentActivity')}</h2>
                <div className="bg-white rounded-[20px] overflow-hidden shadow-card">
                  {recentActivity.map((a, i) => (
                    <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i < recentActivity.length - 1 ? 'border-b border-gray-50' : ''}`}>
                      <Icon name="history" fill className="text-muted text-[18px] flex-shrink-0" />
                      <div className="flex-1 min-w-0 text-[12px] font-medium text-navy truncate">{a.text}</div>
                      <div className="text-[10px] text-muted font-medium flex-shrink-0">{a.date}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-home" holdCount={holds} overdueCount={overdue} t={t} />
        </div>
      );
    }

    /* ─── TechInspectScreen ─── */
    function TechInspectScreen({ navigate, vehicles, currentTechId, onOpenDetail, t }) {
      // port = awaiting PDI start; pdi = in progress; hold = issues found
      const myCars = vehicles.filter(v => v.assignedTech === currentTechId && (v.stage === 'port' || v.stage === 'pdi' || v.stage === 'hold'));
      const holds = vehicles.filter(v => v.assignedTech === currentTechId && v.stage === 'hold').length;
      const overdueCount = vehicles.filter(v => v.assignedTech === currentTechId && v.stage === 'stock' && hasMaintDue(v)).length;
      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card">
            <h1 className="text-[22px] font-black text-navy leading-tight">{t('navInspect')}</h1>
            <p className="text-xs text-muted">Port arrivals, PDI in progress &amp; on hold</p>
          </header>
          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-3">
            {myCars.length === 0 && (
              <div className="text-center py-20 text-muted">
                <Icon name="search" fill className="text-[52px] mb-2 opacity-40" />
                <div className="text-[13px] font-bold">{t('noInspections')}</div>
              </div>
            )}
            {myCars.map(v => {
              const p = pdiProgress(v);
              const issues = countIssues(v);
              const isPort = v.stage === 'port';
              return (
                <button key={v.id} onClick={() => onOpenDetail(v.id)}
                  className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                  <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                    <img loading="lazy" src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                      <StatusBadge status={v.stage} t={t} />
                      {issues > 0 && <span className="bg-red-100 text-red-700 text-[9px] font-black px-1.5 py-0.5 rounded">{issues} {t('issues')}</span>}
                    </div>
                    <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                    {isPort ? (
                      <div className="text-[11px] text-orange-500 font-bold mt-0.5">Tap to start PDI →</div>
                    ) : (
                      <div className="flex items-center gap-2 mt-1">
                        <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                          <div className="h-full bg-primary rounded-full" style={{ width: `${p.pct}%` }} />
                        </div>
                        <span className="text-[10px] font-bold text-muted">{p.pct}%</span>
                      </div>
                    )}
                  </div>
                  <Icon name="chevron_right" className="text-muted text-xl flex-shrink-0" />
                </button>
              );
            })}
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-inspect" holdCount={holds} overdueCount={overdueCount} t={t} />
        </div>
      );
    }

    /* ─── TechStockyardScreen ─── */
    function TechStockyardScreen({ navigate, vehicles, currentTechId, onOpenDetail, t }) {
      const [filter, setFilter] = useState('all');
      const [sort, setSort] = useState('overdue');
      const stockCars = vehicles.filter(v => v.stage === 'stock');
      const filtered = useMemo(() => {
        let list = [...stockCars];
        if (filter === 'overdue') list = list.filter(v => hasMaintDue(v));
        else if (filter === 'due_soon') list = list.filter(v => v.stockMaint.some(m => { const d = daysAgo(m.nextDue); return d < 0 && d >= -7; }));
        else if (filter === 'ok') list = list.filter(v => !hasMaintDue(v));
        if (sort === 'overdue') list.sort((a, b) => countMaintDue(b) - countMaintDue(a));
        else if (sort === 'days') list.sort((a, b) => daysAgo(b.stockDate) - daysAgo(a.stockDate));
        else list.sort((a, b) => a.model.localeCompare(b.model));
        return list;
      }, [vehicles, filter, sort]);
      const holds = vehicles.filter(v => v.assignedTech === currentTechId && v.stage === 'hold').length;
      const overdueCount = stockCars.filter(v => hasMaintDue(v)).length;
      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card">
            <h1 className="text-[22px] font-black text-navy leading-tight">{t('stockyard')}</h1>
            <p className="text-xs text-muted">{t('vehiclesInStock', {count:stockCars.length})}</p>
          </header>
          <div className="bg-white px-4 pb-3 pt-3 flex items-center gap-2 overflow-x-auto no-scroll border-b border-gray-100">
            {[['all',t('filterAll')],['overdue',t('filterOverdue')],['due_soon',t('filterDueSoon')],['ok',t('filterOk')]].map(([val, label]) => (
              <button key={val} onClick={() => setFilter(val)}
                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all ${filter === val ? 'bg-primary text-white shadow-md' : 'bg-gray-100 text-muted hover:bg-gray-200'}`}>
                {label}
              </button>
            ))}
            <select value={sort} onChange={e => setSort(e.target.value)} className="ml-auto flex-shrink-0 text-[11px] font-bold text-muted bg-gray-100 rounded-full px-3 py-1.5 outline-none">
              <option value="overdue">{t('sortOverdueFirst')}</option>
              <option value="days">{t('sortDaysInStock')}</option>
              <option value="alpha">{t('sortAZ')}</option>
            </select>
          </div>
          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-3">
            {filtered.length === 0 && (
              <div className="text-center py-20 text-muted">
                <Icon name="warehouse" fill className="text-[52px] mb-2 opacity-40" />
                <div className="text-[13px] font-bold">{t('noVehiclesMatch')}</div>
              </div>
            )}
            {filtered.map(v => {
              const od = countMaintDue(v);
              const dis = daysAgo(v.stockDate);
              return (
                <button key={v.id} onClick={() => onOpenDetail(v.id)}
                  className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                  <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                    <img loading="lazy" src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                      {od > 0 && <span className="bg-red-100 text-red-700 text-[9px] font-black px-1.5 py-0.5 rounded">{t('overdueLabel', {count:od})}</span>}
                    </div>
                    <div className="font-bold text-navy text-[13px] leading-tight truncate">{v.model}</div>
                    <div className="text-[11px] text-muted">{t('lot')} {v.lot} · {t('dInStock', {days:dis})}</div>
                  </div>
                  <Icon name="chevron_right" className="text-muted text-xl flex-shrink-0" />
                </button>
              );
            })}
          </main>
          <TechBottomNav navigate={navigate} currentView="tech-stockyard" holdCount={holds} overdueCount={overdueCount} t={t} />
        </div>
      );
    }

    /* ─── TechDeliveryScreen ─── */
    function TechDeliveryScreen({ navigate, vehicles, currentTechId, onOpenDetail, updateVehicle, t }) {
      const readyCars = vehicles.filter(v => v.stage === 'ready');
      const pdiComplete = vehicles.filter(v => v.stage === 'pdi' && pdiProgress(v).pct === 100 && countIssues(v) === 0);
      const holds = vehicles.filter(v => v.assignedTech === currentTechId && v.stage === 'hold').length;
      const overdueCount = vehicles.filter(v => v.stage === 'stock' && hasMaintDue(v)).length;

      const moveToStock = (id) => {
        updateVehicle(id, car => ({
          ...car, stage:'stock', pdiDate:todayStr(), stockDate:todayStr(),
          stockMaint: makeMaint(todayStr()),
          history:[`${todayStr()}: PDI passed — moved to stockyard — ${techById(car.assignedTech).name}`, ...car.history]
        }));
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card">
            <h1 className="text-[22px] font-black text-navy leading-tight">{t('delivery')}</h1>
            <p className="text-xs text-muted">{t('readyFinalVehicles')}</p>
          </header>
          <main className="flex-1 overflow-y-auto p-4 pb-20 space-y-4">
            {pdiComplete.length > 0 && (
              <div>
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-muted mb-2">{t('readyForStockyard')}</h2>
                <div className="space-y-2">
                  {pdiComplete.map(v => (
                    <div key={v.id} className="bg-white rounded-[16px] shadow-card p-3">
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-16 h-11 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                          <img loading="lazy" src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1">
                          <span className="text-[10px] font-black text-primary uppercase tracking-wider">{v.label || v.model}</span>
                          <div className="font-bold text-navy text-[13px]">{v.model}</div>
                        </div>
                        <StatusBadge status="pdi" t={t} />
                      </div>
                      <button onClick={() => moveToStock(v.id)}
                        className="w-full py-2.5 bg-emerald-500 text-white font-bold text-[11px] uppercase tracking-widest rounded-full flex items-center justify-center gap-1.5 hover:bg-emerald-600 active:scale-95 transition-all">
                        <Icon name="check" className="text-sm" /> {t('moveToStockyard')}
                      </button>
                    </div>
                  ))}
                </div>
              </div>

    /* ─── CameraModal (desktop getUserMedia live preview) ─── */
    function CameraModal({ onCapture, onClose, onFallback }) {
      const videoRef  = useRef(null);
      const streamRef = useRef(null);
      const [ready, setReady] = useState(false);
      const [error, setError] = useState(false);

      useEffect(() => {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(stream => {
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.onloadedmetadata = () => setReady(true);
            }
          })
          .catch(() => { setError(true); });
        return () => {
          streamRef.current?.getTracks().forEach(t => t.stop());
        };
      }, []);

      const snap = () => {
        const video = videoRef.current;
        if (!video) return;
        const canvas = document.createElement('canvas');
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
          if (blob) onCapture(new File([blob], `snap_${Date.now()}.jpg`, { type: 'image/jpeg' }));
        }, 'image/jpeg', 0.85);
        onClose();
      };

      if (error) {
        return (
          <div className="fixed inset-0 z-[70] bg-black/60 flex items-end lg:items-center justify-center lg:p-6 anim-fade-in" onClick={onClose}>
            <div className="w-full max-w-[430px] lg:max-w-[400px] bg-white rounded-t-[28px] lg:rounded-[24px] p-6 text-center anim-slide-up" onClick={e => e.stopPropagation()}>
              <Icon name="no_photography" className="text-muted text-[40px] mb-3" />
              <p className="text-navy font-bold mb-1">Camera not available</p>
              <p className="text-muted text-[12px] mb-4">Permission denied or no camera found.</p>
              <div className="flex gap-3">
                <button onClick={onFallback} className="flex-1 py-3 bg-primary text-white font-bold rounded-full text-[13px]">Browse Files</button>
                <button onClick={onClose}   className="flex-1 py-3 border-2 border-gray-200 text-navy font-bold rounded-full text-[13px]">Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 z-[70] bg-black flex flex-col anim-fade-in" onClick={onClose}>
          <div className="flex items-center justify-between px-4 pt-12 pb-3" onClick={e => e.stopPropagation()}>
            <span className="text-white font-bold text-[15px]">Take Photo</span>
            <button onClick={onClose} className="p-2 text-white"><Icon name="close" /></button>
          </div>
          <div className="flex-1 relative overflow-hidden" onClick={e => e.stopPropagation()}>
            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
            {!ready && (
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="w-8 h-8 border-[3px] border-white border-t-transparent rounded-full animate-spin" />
              </div>
            )}
          </div>
          <div className="flex items-center justify-center gap-6 px-6 py-8 bg-black" onClick={e => e.stopPropagation()}>
            <button onClick={onFallback} className="w-12 h-12 rounded-full border-2 border-white/40 flex items-center justify-center">
              <Icon name="photo_library" className="text-white text-[22px]" />
            </button>
            <button onClick={snap} disabled={!ready}
              className="w-18 h-18 rounded-full bg-white border-4 border-white shadow-lg flex items-center justify-center disabled:opacity-40 active:scale-95 transition-transform"
              style={{ width:72, height:72 }}>
              <div className="w-14 h-14 rounded-full bg-white border-4 border-navy/20" />
            </button>
            <div className="w-12 h-12" />
          </div>
        </div>
      );
    }

    /* ─── VehicleDetailOverlay ─── */
    function VehicleDetailOverlay({ vehicle: v, onClose, updateVehicle, db, isAdmin, canEdit: canEditProp, t, onDeleteVehicle }) {
      const canEditVehicle = canEditProp !== undefined ? canEditProp : isAdmin;
      const [tab,          setTab]          = useState('VEHICLE');
      const [dealerName,   setDealerName]   = useState('');
      const [uploading,    setUploading]    = useState(false);
      const [imgCheckInfo, setImgCheckInfo] = useState(null); // {type, idx, itemId}
      const [showCamera,   setShowCamera]   = useState(false);
      const [reportedItems, setReportedItems] = useState({}); // {`${type}-${id}`: 'sending'|'done'}
      const [confirmState, setConfirmState] = useState({}); // {pdi:'idle'|'saving'|'saved', final:'idle'|...}
      const vehicleImgRef  = useRef(null);
      const issueImgRef    = useRef(null);
      const noteDebounceRef = useRef({});  // keyed by `${type}-${idx}`, holds timer IDs
      const tech   = techById(v.assignedTech);
      const pp     = pdiProgress(v);
      const fp     = finalProgress(v);
      const issues = countIssues(v);

      const [editMode,   setEditMode]   = useState(false);
      const [editFields, setEditFields] = useState({});

      // ── Reports tab state ──────────────────────────────────────────────────
      const [reports,          setReports]          = useState([]);
      const [reportText,       setReportText]       = useState('');
      const [loadingReports,   setLoadingReports]   = useState(false);
      const [submittingReport, setSubmittingReport] = useState(false);

      useEffect(() => {
        if (tab !== 'REPORTS') return;
        setLoadingReports(true);
        sb.from('vehicle_reports')
          .select('id, content, created_at, created_by')
          .eq('vehicle_id', v.id)
          .order('created_at', { ascending: false })
          .then(({ data }) => { setReports(data || []); setLoadingReports(false); });
      }, [tab, v.id]);

      const submitReport = async () => {
        const txt = reportText.trim();
        if (!txt) return;
        setSubmittingReport(true);
        const { data } = await sb.from('vehicle_reports')
          .insert({ vehicle_id: v.id, content: txt })
          .select('id, content, created_at, created_by')
          .single();
        if (data) setReports(prev => [data, ...prev]);
        setReportText('');
        setSubmittingReport(false);
      };

      const startEdit = () => {
        setEditFields({
          model:          v.model          || '',
          variant:        v.variant        || '',
          exterior_color: v.exteriorColor  || v.color || '',
          interior_color: v.interiorColor  || '',
          fuel:           v.fuel           || 'Gasoline',
          vin:            v.vin            || '',
          engine_number:  v.engineNumber   || '',
          cs_number:      v.csNumber       || '',
          lot:            v.lot            || '',
          year:           String(v.year    || 2025),
          _extra: { ...(v.extraFields || {}) },
        });
        setEditMode(true);
      };
      const saveEdit = async () => {
        const u = {
          model:          editFields.model.trim(),
          variant:        editFields.variant.trim(),
          exterior_color: editFields.exterior_color.trim(),
          interior_color: editFields.interior_color.trim(),
          color:          editFields.exterior_color.trim(), // backward compat
          engine:         editFields.variant.trim(),        // backward compat
          fuel:           editFields.fuel || 'Gasoline',
          vin:            editFields.vin.trim(),
          engine_number:  editFields.engine_number.trim(),
          cs_number:      editFields.cs_number.trim(),
          lot:            editFields.lot.trim(),
          year:           parseInt(editFields.year) || 2025,
          extra_fields:   editFields._extra || {},
        };
        await sb.from('vehicles').update(u).eq('id', v.id);
        const { extra_fields, color, engine, ...rest } = u;
        updateVehicle(v.id, car => ({
          ...car, ...rest,
          exteriorColor: u.exterior_color,
          interiorColor: u.interior_color,
          engineNumber:  u.engine_number,
          csNumber:      u.cs_number,
          extraFields:   extra_fields,
        }));
        setEditMode(false);
      };
      const handleDelete = async () => {
        const ok = await stockmoDialog.confirm({
          title: 'Delete vehicle?',
          message: `${v.label || v.model} — this cannot be undone.`,
          confirmLabel: 'Delete',
          danger: true,
        });
        if (!ok) return;
        await sb.from('vehicles').delete().eq('id', v.id);
        if (onDeleteVehicle) onDeleteVehicle(v.id);
        onClose();
      };

      /* ── check toggle ── */
      const toggleCheck = async (type, idx) => {
        if (isAdmin) return;
        const field     = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
        const order     = ['pending', 'done', 'issue', 'na'];
        const curCheck  = v[field]?.[idx];
        const curState  = curCheck?.state || 'pending';
        const nextState = order[(order.indexOf(curState) + 1) % order.length];

        // Optimistic local update immediately (snappy UI feedback)
        updateVehicle(v.id, car => {
          const checks = [...car[field]];
          checks[idx] = { ...checks[idx], state: nextState };
          return { ...car, [field]: checks };
        });

        // ① AWAIT the check-state write to DB first — critical order
        // This ensures pdi_checks/final_checks row has state='issue' BEFORE
        // updateStage fires the vehicles realtime subscription + refetch.
        // Without await, the refetch races and overwrites with stale 'done' state.
        if (db) {
          const fn = type === 'pdi' ? db.upsertPdiCheck : db.upsertFinalCheck;
          await fn(v.id, curCheck?.id, nextState, curCheck?.note || '').catch(console.error);
        }

        // ② Only after check is committed, trigger hold + auto-notify admin
        if (nextState === 'issue') {
          // Auto-notify admin immediately — no manual "Report to Admin" needed
          if (db) {
            db.reportIssue(v.id, v.label || v.model, type, curCheck?.name || '', curCheck?.note || '', tech?.name || 'Tech')
              .catch(console.error);
          }
          // Move to hold if in an active stage
          if (['port', 'pdi', 'ready'].includes(v.stage)) {
            const action = `On hold — issue flagged on ${type.toUpperCase()} checklist — ${tech?.name || 'Tech'}`;
            updateVehicle(v.id, car => ({ ...car, stage: 'hold' }));
            if (db) {
              db.updateStage(v.id, 'hold').catch(console.error);
              db.insertHistory(v.id, action, v.stage, 'hold').catch(console.error);
            }
          }
        }
      };

      /* ── check note (debounced DB write — instant local update) ── */
      const setCheckNote = (type, idx, note) => {
        const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
        // Immediate optimistic update so typing feels instant
        updateVehicle(v.id, car => {
          const checks = [...car[field]];
          checks[idx] = { ...checks[idx], note };
          return { ...car, [field]: checks };
        });
        if (!db) return;
        // Debounce DB write — only fire 600ms after user stops typing
        const key = `${type}-${idx}`;
        clearTimeout(noteDebounceRef.current[key]);
        noteDebounceRef.current[key] = setTimeout(() => {
          const fn  = type === 'pdi' ? db.upsertPdiCheck : db.upsertFinalCheck;
          const arr = type === 'pdi' ? v.pdiChecks : v.finalChecks;
          fn(v.id, arr[idx]?.id, arr[idx]?.state || 'issue', note).catch(console.error);
        }, 600);
      };

      /* ── confirm / bulk-save checklist ── */
      const handleConfirmSave = async (type) => {
        const checks = type === 'pdi' ? v.pdiChecks : v.finalChecks;
        setConfirmState(prev => ({ ...prev, [type]: 'saving' }));
        try {
          if (db) {
            // Flush any pending debounced note write immediately
            Object.keys(noteDebounceRef.current).forEach(k => {
              if (k.startsWith(type + '-')) clearTimeout(noteDebounceRef.current[k]);
            });
            await db.bulkSaveChecks(v.id, type, checks);
          }
          setConfirmState(prev => ({ ...prev, [type]: 'saved' }));
          setTimeout(() => setConfirmState(prev => ({ ...prev, [type]: 'idle' })), 3000);
        } catch (err) {
          console.error('bulkSaveChecks', err);
          setConfirmState(prev => ({ ...prev, [type]: 'idle' }));
        }
      };

      /* ── report issue to admin ── */
      const handleReportIssue = async (type, item) => {
        const key = `${type}-${item.id}`;
        if (reportedItems[key]) return;                    // already reported
        setReportedItems(prev => ({ ...prev, [key]: 'sending' }));
        try {
          if (db) {
            await db.reportIssue(v.id, v.label || v.model, type, item.name, item.note, tech?.name || 'Tech');
          }
          setReportedItems(prev => ({ ...prev, [key]: 'done' }));
        } catch (err) {
          console.error('reportIssue', err);
          setReportedItems(prev => ({ ...prev, [key]: null })); // reset on error
        }
      };

      /* ── stage mutations ── */
      const startPdi = () => {
        const action = `PDI started — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'pdi', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'pdi').catch(console.error); db.insertHistory(v.id, action, v.stage, 'pdi').catch(console.error); }
      };
      const putOnHold = () => {
        const action = `HOLD — PDI failed (${issues} issues) — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'hold', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'hold').catch(console.error); db.insertHistory(v.id, action, v.stage, 'hold').catch(console.error); }
      };
      const resumePdi = () => {
        const action = `PDI resumed after repair — ${tech.name}`;
        updateVehicle(v.id, car => ({ ...car, stage:'pdi', history:[`${todayStr()}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'pdi').catch(console.error); db.insertHistory(v.id, action, v.stage, 'pdi').catch(console.error); }
      };
      const pdiPassToStock = () => {
        const action = `PDI passed — moved to stockyard — ${tech.name}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'stock', pdiDate:today, stockDate:today, stockMaint:makeMaint(today), history:[`${today}: ${action}`, ...car.history] }));
        if (db) {
          db.updateStage(v.id, 'stock', { pdi_date: today, stock_date: today }).catch(console.error);
          db.insertHistory(v.id, action, v.stage, 'stock').catch(console.error);
          db.insertMaintTasks(v.id, today).catch(console.error);
        }
      };
      const passToFinal = () => {
        const action = `Passed to final inspection — ${tech.name}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'ready', finalDate:today, history:[`${today}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'ready', { final_date: today }).catch(console.error); db.insertHistory(v.id, action, v.stage, 'ready').catch(console.error); }
      };
      const releaseCar = () => {
        if (!dealerName.trim()) return;
        const dealer = dealerName.trim();
        const action = `Released to ${dealer}`;
        const today  = todayStr();
        updateVehicle(v.id, car => ({ ...car, stage:'released', releaseDate:today, dealer, history:[`${today}: ${action}`, ...car.history] }));
        if (db) { db.updateStage(v.id, 'released', { release_date: today, dealer }).catch(console.error); db.insertHistory(v.id, action, v.stage, 'released').catch(console.error); }
      };
      const completeMaint = (idx) => {
        const today = todayStr();
        const m     = v.stockMaint[idx];
        const action = `${m.name} — completed — ${tech.name}`;
        updateVehicle(v.id, car => {
          const maint = [...car.stockMaint];
          maint[idx] = { ...maint[idx], lastDone: today, nextDue: addDays(today, maint[idx].freq) };
          return { ...car, stockMaint: maint, history: [`${today}: ${action}`, ...car.history] };
        });
        if (db) { db.completeMaint(v.id, m.id, m.freq).catch(console.error); db.insertHistory(v.id, action, v.stage, v.stage).catch(console.error); }
      };

      /* ── image uploads ── */
      const handleVehicleImgUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !db) return;
        setUploading(true);
        try {
          const url = await db.uploadVehicleImage(v.id, file);
          updateVehicle(v.id, car => ({ ...car, img: url }));
        } catch (err) { console.error(err); }
        setUploading(false);
        e.target.value = '';
      };
      const handleIssueImgUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !imgCheckInfo || !db) return;
        const { type, idx, itemId } = imgCheckInfo;
        try {
          const url = await db.uploadIssueImage(v.id, type, itemId, file);
          const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
          updateVehicle(v.id, car => {
            const checks = [...car[field]];
            checks[idx] = { ...checks[idx], image_url: url };
            return { ...car, [field]: checks };
          });
        } catch (err) { console.error(err); stockmoDialog.alert({ title: 'Photo upload failed', message: err.message || String(err) }); }
        e.target.value = '';
        setImgCheckInfo(null);
      };

      /* ── camera opener: mobile → file input, desktop → CameraModal ── */
      const openCameraForCheck = (type, item) => {
        setImgCheckInfo({ type, idx: item._i, itemId: item.id });
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        if (isMobile || !navigator.mediaDevices?.getUserMedia) {
          issueImgRef.current?.click();
        } else {
          setShowCamera(true);
        }
      };

      /* ── CameraModal capture handler ── */
      const handleCameraCapture = async (file) => {
        if (!imgCheckInfo || !db) return;
        const { type, idx, itemId } = imgCheckInfo;
        try {
          const url = await db.uploadIssueImage(v.id, type, itemId, file);
          const field = type === 'pdi' ? 'pdiChecks' : 'finalChecks';
          updateVehicle(v.id, car => {
            const checks = [...car[field]];
            checks[idx] = { ...checks[idx], image_url: url };
            return { ...car, [field]: checks };
          });
        } catch (err) { console.error(err); stockmoDialog.alert({ title: 'Photo upload failed', message: err.message || String(err) }); }
        setImgCheckInfo(null);
      };

      const ChecklistTab = ({ type, checks }) => {
        const sections = [...new Set(checks.map(c => c.section))];
        return (
          <div className="space-y-6">
            {sections.map(sec => {
              const items = checks.map((c, i) => ({ ...c, _i: i })).filter(c => c.section === sec);
              const done = items.filter(c => c.state === 'done' || c.state === 'na').length;
              const pct  = items.length ? Math.round((done / items.length) * 100) : 0;
              return (
                <div key={sec}>
                  {/* Section header */}
                  <div className="flex items-center gap-3 mb-3">
                    <h3 className="text-[10px] font-black uppercase tracking-widest text-muted whitespace-nowrap">{sec}</h3>
                    <div className="flex-1 h-1.5 bg-primary/10 rounded-full overflow-hidden">
                      <div className="h-full bg-primary rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
                    </div>
                    <span className="text-[10px] font-black text-primary whitespace-nowrap">{done}/{items.length}</span>
                  </div>
                  {/* Items — 1 col mobile, 2 col desktop */}
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
                    {items.map(item => {
                      const st = item.state;
                      const stIcon = st === 'done' ? 'check_circle' : st === 'issue' ? 'error' : st === 'na' ? 'remove_circle' : null;
                      const stBg = st === 'done' ? 'bg-emerald-50 border-emerald-200' : st === 'issue' ? 'bg-red-50 border-red-200' : st === 'na' ? 'bg-gray-100 border-gray-300' : 'bg-white border-gray-200';
                      const stColor = st === 'done' ? 'bg-emerald-500' : st === 'issue' ? 'bg-red-500' : st === 'na' ? 'bg-gray-400' : '';
                      return (
                        <div key={item.id} className="flex flex-col">
                          <button onClick={() => toggleCheck(type, item._i)} disabled={isAdmin}
                            className={`flex items-start gap-2.5 p-2.5 rounded-xl text-left w-full border transition-all duration-150 ${stBg} ${!isAdmin ? 'cursor-pointer active:scale-[0.98]' : 'cursor-default'}`}>
                            {stIcon ? (
                              <div className={`w-5 h-5 ${stColor} rounded-md flex items-center justify-center flex-shrink-0 mt-0.5`}>
                                <Icon name={stIcon} fill className="text-white text-xs" />
                              </div>
                            ) : (
                              <div className="w-5 h-5 border-2 border-gray-300 rounded-md flex-shrink-0 mt-0.5" />
                            )}
                            <div className="flex-1 min-w-0">
                              <p className="text-[12px] font-semibold text-navy leading-snug">{item.name}</p>
                              <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                                <StatusBadge status={item.priority} />
                                <span className="text-[9px] font-bold uppercase text-muted tracking-wider">{st}</span>
                              </div>
                            </div>
                          </button>
                          {/* Camera + Report buttons — tech only */}
                          {!isAdmin && (
                            <div className="mt-1 space-y-1">
                              {st === 'issue' && (
                                <input type="text" value={item.note} onChange={e => setCheckNote(type, item._i, e.target.value)}
                                  placeholder={t('describeIssue')}
                                  className="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-[12px] text-navy outline-none focus:border-primary" />
                              )}
                              <div className="flex items-center gap-1.5 flex-wrap">
                                {/* Photo button — always visible */}
                                <button onClick={() => openCameraForCheck(type, item)}
                                  className={`flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-[11px] font-semibold transition-colors ${item.image_url ? 'bg-green-50 border border-green-200 text-green-700 hover:bg-green-100' : st === 'issue' ? 'bg-red-50 border border-red-200 text-red-500 hover:bg-red-100' : 'bg-gray-50 border border-gray-200 text-muted hover:bg-gray-100'}`}
                                  title="Take photo">
                                  <Icon name="photo_camera" className="text-sm" />
                                  {item.image_url ? 'Retake' : 'Photo'}
                                </button>
                                {/* Report button — only when item is flagged as issue */}
                                {st === 'issue' && (() => {
                                  const rKey   = `${type}-${item.id}`;
                                  const rState = reportedItems[rKey];
                                  return (
                                    <button
                                      onClick={() => handleReportIssue(type, item)}
                                      disabled={!!rState}
                                      className={`flex-1 flex items-center justify-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[11px] font-bold transition-all
                                        ${rState === 'done'
                                          ? 'bg-emerald-50 border border-emerald-200 text-emerald-700 cursor-default'
                                          : rState === 'sending'
                                          ? 'bg-gray-50 border border-gray-200 text-muted cursor-wait'
                                          : 'bg-primary/10 border border-primary/30 text-primary hover:bg-primary/20 active:scale-95'
                                        }`}>
                                      <Icon name={rState === 'done' ? 'check_circle' : rState === 'sending' ? 'hourglass_empty' : 'send'} fill={rState === 'done'} className="text-sm" />
                                      {rState === 'done' ? 'Reported' : rState === 'sending' ? 'Sending…' : 'Report to Admin'}
                                    </button>
                                  );
                                })()}
                              </div>
                              {item.image_url && (
                                <img loading="lazy" src={item.image_url} alt="Evidence photo" className={`w-full max-h-36 object-cover rounded-lg border ${st === 'issue' ? 'border-red-200' : 'border-gray-200'}`} />
                              )}
                            </div>
                          )}
                          {isAdmin && st === 'issue' && (
                            <div className="mt-1 space-y-1">
                              {item.note
                                ? <div className="px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-[11px] text-red-700 italic">{item.note}</div>
                                : <div className="flex items-center gap-1.5 px-2 py-1 text-[10px] text-red-500 font-bold"><Icon name="warning" fill className="text-[14px]" /> Issue flagged — no note added</div>
                              }
                              {item.image_url && <img loading="lazy" src={item.image_url} alt="Issue photo" className="w-full max-h-36 object-cover rounded-lg border border-red-200" />}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      const eFld = (label, field, type='text') => (
        <div key={field}>
          <div className="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">{label}</div>
          <input type={type} value={editFields[field] ?? ''} onChange={e => setEditFields(f => ({...f, [field]: e.target.value}))}
            className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[12px] text-navy outline-none focus:border-primary transition-colors" />
        </div>
      );
      const EditForm = () => (
        <div className="space-y-3">
          {eFld('Model',          'model')}
          {eFld('Variant',        'variant')}
          {eFld('Exterior Color', 'exterior_color')}
          {eFld('Interior Color', 'interior_color')}
          {eFld('VIN',            'vin')}
          {eFld('Engine No.',     'engine_number')}
          {eFld('CS No.',         'cs_number')}
          {eFld('Lot',            'lot')}
          {eFld('Year',           'year', 'number')}
          <div>
            <div className="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Fuel</div>
            <select value={editFields.fuel||'Gasoline'} onChange={e => setEditFields(f => ({...f, fuel: e.target.value}))}
              className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[12px] text-navy outline-none focus:border-primary transition-colors appearance-none">
              <option>Gasoline</option><option>Diesel</option><option>HEV</option><option>PHEV</option><option>Electric</option>
            </select>
          </div>
          {Object.keys(editFields._extra || {}).length > 0 && (
            <div className="pt-2 border-t border-gray-100">
              <div className="text-[9px] font-black uppercase tracking-widest text-muted mb-2">Additional Fields</div>
              {Object.entries(editFields._extra).map(([key, val]) => (
                <div key={key} className="mb-2">
                  <div className="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">{key}</div>
                  <input value={String(val)} onChange={e => setEditFields(f => ({...f, _extra: {...f._extra, [key]: e.target.value}}))}
                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[12px] text-navy outline-none focus:border-primary transition-colors" />
                </div>
              ))}
            </div>
          )}
          <button onClick={saveEdit} className="w-full py-2.5 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 shadow-primary-glow hover:brightness-110 transition-all">
            <Icon name="save" className="text-sm" /> Save Changes
          </button>
          <button onClick={handleDelete} className="w-full py-2.5 bg-red-50 border border-red-200 text-red-600 font-bold text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-red-100 transition-all">
            <Icon name="delete_forever" className="text-sm" /> Delete Vehicle
          </button>
        </div>
      );

      /* stage-action buttons — used in both left col (desktop) and VEHICLE tab (mobile) */
      const StageActions = () => (<>
        {!isAdmin && v.stage === 'port' && (
          <button onClick={startPdi} className="w-full py-[14px] bg-primary text-white font-black text-[13px] uppercase tracking-[0.12em] rounded-full shadow-primary-glow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <Icon name="play_arrow" fill className="text-xl" /> {t('startPdi')}
          </button>
        )}
        {!isAdmin && v.stage === 'pdi' && (
          <div className="space-y-2">
            <div className="bg-white rounded-[16px] p-3 shadow-card">
              <div className="flex justify-between text-[11px] mb-1.5"><span className="text-muted font-medium">{t('pdiProgress')}</span><span className="font-black text-navy">{pp.done}/{pp.total}</span></div>
              <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-primary rounded-full" style={{width:`${pp.pct}%`}} /></div>
            </div>
            {issues > 0 && <button onClick={putOnHold} className="w-full py-3 bg-red-500 text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-2 hover:bg-red-600 active:scale-[0.98] transition-all"><Icon name="pause_circle" fill className="text-lg" /> {t('putOnHold', {count:issues})}</button>}
            {pp.pct === 100 && issues === 0 && <button onClick={pdiPassToStock} className="w-full py-3 bg-emerald-500 text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-2 hover:bg-emerald-600 active:scale-[0.98] transition-all shadow-lg"><Icon name="check_circle" fill className="text-lg" /> {t('pdiPassed')}</button>}
          </div>
        )}
        {!isAdmin && v.stage === 'hold' && (
          <button onClick={resumePdi} className="w-full py-[14px] bg-primary text-white font-black text-[13px] uppercase tracking-[0.12em] rounded-full shadow-primary-glow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <Icon name="play_arrow" fill className="text-xl" /> {t('resumePdi')}
          </button>
        )}
        {isAdmin && v.stage === 'hold' && (() => {
          const raw = v.historyRaw || [];
          const holdEntry = raw.find(h => h.stage_to === 'hold');
          const daysHeld = holdEntry ? Math.floor((Date.now() - new Date(holdEntry.created_at).getTime()) / 86400000) : null;
          const allIssues = [...(v.pdiChecks||[]).filter(c=>c.state==='issue').map(c=>({...c,_src:'PDI'})),...(v.finalChecks||[]).filter(c=>c.state==='issue').map(c=>({...c,_src:'Final'}))];
          const repairLog = raw.filter(h=>h.stage_from==='hold'&&h.stage_to==='hold').sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
          return (
            <div className="space-y-3">
              <div className="bg-red-50 border border-red-200 rounded-[14px] p-3 flex items-center gap-2">
                <Icon name="error" fill className="text-red-500 text-[20px] flex-shrink-0" />
                <div><div className="font-black text-red-700 text-[13px]">Vehicle On Hold</div><div className="text-[10px] text-red-500">{daysHeld !== null ? `${daysHeld}d on hold` : ''} · {allIssues.length} issue{allIssues.length!==1?'s':''}</div></div>
              </div>
              {allIssues.length > 0 && (
                <div className="bg-white rounded-[14px] p-3 shadow-card space-y-2">
                  <div className="text-[10px] font-bold uppercase tracking-wider text-muted">Flagged Issues</div>
                  {allIssues.map((c,i) => (
                    <div key={i} className="flex items-start gap-2 pb-2 border-b border-gray-50 last:border-0">
                      <div className="w-4 h-4 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"><div className="w-1.5 h-1.5 bg-red-500 rounded-full"/></div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[11px] font-semibold text-navy">{c.name} <span className="text-[9px] font-bold bg-gray-100 text-muted px-1 rounded">{c._src}</span></div>
                        {c.note && <div className="text-[10px] text-red-600 italic mt-0.5">{c.note}</div>}
                        {c.image_url && <img loading="lazy" src={c.image_url} alt="" className="mt-1 w-full max-h-24 object-cover rounded-lg border border-red-200"/>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {repairLog.length > 0 && (
                <div className="bg-white rounded-[14px] p-3 shadow-card space-y-1">
                  <div className="text-[10px] font-bold uppercase tracking-wider text-muted mb-1">Repair Log</div>
                  {repairLog.map((h,i) => <div key={i} className="text-[10px] bg-gray-50 rounded px-2 py-1"><span className="font-bold text-muted">{h.created_at?new Date(h.created_at).toLocaleDateString():''}:</span> {h.action}</div>)}
                </div>
              )}
              <div className="flex gap-2">
                <button onClick={() => { updateVehicle(v.id,car=>({...car,stage:'pdi'})); if(db){db.updateStage(v.id,'pdi').catch(console.error);db.insertHistory(v.id,'Sent back for re-inspection','hold','pdi').catch(console.error);} }} className="flex-1 py-2.5 border-2 border-primary text-primary font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1 hover:bg-primary/5 transition-colors active:scale-95"><Icon name="restart_alt" className="text-sm"/> Re-inspect</button>
                <button onClick={() => { const today=todayStr(); updateVehicle(v.id,car=>({...car,stage:'stock'})); if(db){db.updateStage(v.id,'stock',{pdi_date:today,stock_date:today}).catch(console.error);db.insertHistory(v.id,'Cleared to stock','hold','stock').catch(console.error);} }} className="flex-1 py-2.5 bg-primary text-white font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1 hover:brightness-110 transition-all active:scale-95"><Icon name="check_circle" className="text-sm"/> Clear to Stock</button>
              </div>
            </div>
          );
        })()}
        {!isAdmin && v.stage === 'stock' && (
          <button onClick={passToFinal} className="w-full py-[14px] bg-purple-600 text-white font-black text-[13px] uppercase tracking-[0.12em] rounded-full shadow-lg hover:bg-purple-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <Icon name="local_shipping" fill className="text-xl" /> {t('passToFinal')}
          </button>
        )}
        {!isAdmin && v.stage === 'ready' && (
          <div className="space-y-2">
            <div className="bg-white rounded-[16px] p-3 shadow-card">
              <div className="flex justify-between text-[11px] mb-1.5"><span className="text-muted font-medium">{t('finalProgress')}</span><span className="font-black text-navy">{fp.done}/{fp.total}</span></div>
              <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-purple-500 rounded-full" style={{width:`${fp.pct}%`}}/></div>
            </div>
            {fp.pct === 100 && (
              <div className="space-y-2">
                <input value={dealerName} onChange={e=>setDealerName(e.target.value)} placeholder={t('dealerPlaceholder')} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-navy placeholder:text-muted outline-none focus:border-primary focus:ring-2 focus:ring-primary/20"/>
                <button onClick={releaseCar} disabled={!dealerName.trim()} className="w-full py-3 bg-emerald-500 text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-2 hover:bg-emerald-600 active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed"><Icon name="verified" fill className="text-lg"/> {t('releaseToDealer')}</button>
              </div>
            )}
          </div>
        )}
      </>);

      return (
        <div className="fixed inset-0 bg-black/50 z-50 anim-fade-in flex items-end lg:items-center justify-center" onClick={onClose}>
          <input ref={vehicleImgRef} type="file" accept="image/*" className="hidden" onChange={handleVehicleImgUpload} />
          <input ref={issueImgRef}   type="file" accept="image/*" capture="environment" className="hidden" onChange={handleIssueImgUpload} />
          {showCamera && (
            <CameraModal
              onCapture={handleCameraCapture}
              onClose={() => { setShowCamera(false); setImgCheckInfo(null); }}
              onFallback={() => { setShowCamera(false); issueImgRef.current?.click(); }}
            />
          )}

          {/* Panel — mobile: bottom sheet · desktop: centered dialog */}
          <div className="w-full max-w-[430px] lg:max-w-[960px] bg-[#F5F5F5] rounded-t-[32px] lg:rounded-[24px] shadow-2xl anim-slide-up flex flex-col lg:flex-row overflow-hidden" style={{ maxHeight:'94vh' }} onClick={e => e.stopPropagation()}>

            {/* ═══ LEFT COLUMN ═══ */}
            <div className="flex-shrink-0 lg:w-[300px] flex flex-col lg:bg-white lg:border-r lg:border-gray-100">

              {/* Mobile drag handle */}
              <div className="w-12 h-1 bg-gray-300 rounded-full mx-auto mt-3 flex-shrink-0 lg:hidden" />

              {/* Header */}
              <div className="flex items-center justify-between px-5 pt-3 pb-3 flex-shrink-0">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="text-[17px] font-black text-navy truncate">{v.label || v.model}</span>
                  <StatusBadge status={v.stage} t={t} />
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">

            {/* ═══ RIGHT COLUMN ═══ */}

              <nav className="bg-white border-b border-gray-100 flex px-2 flex-shrink-0">
                {[['VEHICLE','tabVehicle','lg:hidden'],['PDI','tabPdi',''],['MAINT','tabMaint',''],['FINAL','tabFinal',''],['NOTES','tabNotes',''],['REPORTS','tabReports',''],['HISTORY','tabHistory','']].map(([key,tKey,extra]) => (
                  <button key={key} onClick={() => setTab(key)}
                    className={`flex-1 py-3 text-[9px] font-bold tracking-widest transition-colors ${extra} ${tab === key ? 'text-primary border-b-2 border-primary' : 'text-muted border-b-2 border-transparent'}`}>

              <div className="flex-1 overflow-y-auto p-4 pb-8">

                {/* VEHICLE tab — mobile only */}
                {tab === 'VEHICLE' && (

                      {[
                        ['Invoice #',      v.invoiceNumber],
                        ['CS No.',         v.csNumber],
                        ['Contract No.',   v.contractNo],
                        ['Model',          v.model],
                        ['Variant',        v.variant],
                        ['Year',           String(v.year)],
                        ['Exterior Color', v.exteriorColor],
                        ['Interior Color', v.interiorColor],
                        ['Fuel',           v.fuel],
                        ['VIN',            v.vin],
                        ['Engine No.',     v.engineNumber],
                        ['BL No.',         v.blNumber],
                        ['Lot',            v.lot],
                        ['Region',         v.region],
                        ['Dealer Group',   v.dealerGroup],
                        ['Dealer',         v.dealer],
                        ['Port Arrival',   fmtDate(v.arrivalDate)],
                        ['Assigned To',    tech.name],
                      ].filter(([,val]) => val && val !== '—').map(([k,val]) => (
                        <div key={k} className="flex justify-between gap-2 py-2 border-b border-gray-50 last:border-0">

                {/* PDI + FINAL tabs */}

                    {v.stockMaint.length === 0 ? (

                      const overDays  = daysAgo(m.nextDue);
