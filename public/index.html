                      return (
                        <div key={m.id} className={`bg-white rounded-[16px] p-3 shadow-card border-l-4 ${isOverdue?'border-red-400':isDueSoon?'border-amber-400':'border-emerald-400'}`}>
                          <div className="flex items-start justify-between mb-1">
                            <div className="flex-1 min-w-0">
                              <div className="text-[12px] font-bold text-navy leading-snug">{m.name}</div>
                              <div className="flex items-center gap-2 mt-1"><StatusBadge status={m.priority} /><span className="text-[10px] text-muted">{t('every',{freq:m.freq})}</span></div>
                            </div>
                            <div className="text-right flex-shrink-0 ml-2">
                              {isOverdue?<span className="text-[10px] font-black text-red-600">{t('overdueD',{days:overDays})}</span>:isDueSoon?<span className="text-[10px] font-black text-amber-600">{t('dueIn',{days:Math.abs(overDays)})}</span>:<span className="text-[10px] font-bold text-emerald-600">{t('next')} {m.nextDue}</span>}
                              <div className="text-[9px] text-muted mt-0.5">{t('last')} {m.lastDone}</div>
                            </div>
                          </div>
                          {!isAdmin && (
                            <button onClick={() => completeMaint(idx)} className="mt-2 w-full py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold text-[11px] uppercase tracking-wider rounded-lg flex items-center justify-center gap-1.5 hover:bg-emerald-100 active:scale-95 transition-all">
                              <Icon name="check" className="text-sm" /> {t('done')}
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* NOTES tab */}
                {tab === 'NOTES' && (
                  <div className="space-y-3">
                    <textarea value={v.notes}
                      onChange={e => { const val=e.target.value; updateVehicle(v.id, car=>({...car, notes:val})); }}
                      onBlur={e => { if(db) sb.from('vehicles').update({notes:e.target.value}).eq('id',v.id).catch(console.error); }}
                      rows={6} placeholder={t('addNotes')}
                      className="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-navy placeholder:text-muted outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 resize-none shadow-card"
                      disabled={isAdmin} />
                  </div>
                )}

                {/* REPORTS tab — issue log */}
                {tab === 'REPORTS' && (
                  <div className="space-y-4">
                    {/* Submit new issue */}
                    <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3">
                      <div className="text-[10px] font-black uppercase tracking-widest text-muted">Report an Issue</div>
                      <textarea
                        value={reportText}
                        onChange={e => setReportText(e.target.value)}
                        rows={3}
                        placeholder="Describe the issue with this vehicle…"
                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-[13px] text-navy placeholder:text-muted outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 resize-none transition-colors"
                      />
                      <button
                        onClick={submitReport}
                        disabled={!reportText.trim() || submittingReport}
                        className="w-full py-2.5 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 shadow-primary-glow hover:brightness-110 transition-all disabled:opacity-40 active:scale-[0.98]">
                        <Icon name="flag" fill className="text-sm" />
                        {submittingReport ? 'Submitting…' : 'Report Issue'}
                      </button>
                    </div>
                    {/* Issue list */}
                    {loadingReports ? (
                      <div className="flex justify-center py-8"><div className="w-5 h-5 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
                    ) : reports.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-16 text-center">
                        <Icon name="report_off" fill className="text-muted text-[48px] mb-3 opacity-40" />

                    ) : (
                      <div className="space-y-3">
                        {reports.map(r => (

    /* ─── AdminDashboard ─── */
    function AdminDashboard({ navigate, vehicles, technicians, onNotificationClick, onAddVehicle, unreadCount, onOpenDetail, t, canEdit: canEditProp = true, role, pipelineStages = [] }) {
      const all = vehicles;
      const [showModelsModal, setShowModelsModal] = useState(false);
      const [modelSearch, setModelSearch]         = useState('');

      // Default stage config used when pipeline_stages not yet loaded
      const DEFAULT_STAGE_META = {
        port:     { name: 'Port / Inbound',     color: '#F59E0B' },
        pdi:      { name: 'PDI',                color: '#10B981' },
        hold:     { name: 'On Hold',            color: '#EF4444' },
        stock:    { name: 'In Stock',           color: '#3B82F6' },
        ready:    { name: 'Ready for Delivery', color: '#8B5CF6' },
        released: { name: 'Released',           color: '#059669' },
      };

      // Build dynamic stage list from DB — fall back to defaults if not loaded
      const stagesActive = pipelineStages.filter(s => s.active).sort((a,b) => a.ord - b.ord);
      const STAGE_KEYS = stagesActive.length
        ? stagesActive.map(s => s.slug)
        : Object.keys(DEFAULT_STAGE_META);
      const STAGE_META = stagesActive.length
        ? Object.fromEntries(stagesActive.map(s => [s.slug, s]))
        : DEFAULT_STAGE_META;

      const { pipeline, holdVehicles, recent, modelsInPipeline } = React.useMemo(() => {
        const counts = {};
        STAGE_KEYS.forEach(k => { counts[k] = 0; });
        const holds = [];
        const recentList = [];
        const NON_RELEASED = STAGE_KEYS.filter(k => k !== 'released');
        const modelMap = {};
        all.forEach(v => {
          if (counts[v.stage] !== undefined) counts[v.stage] += 1;
          if (v.stage === 'hold') {
            const issues = [
              ...(v.pdiChecks  || []).filter(c => c.state === 'issue').map(c => ({ ...c, _src: 'PDI'   })),
              ...(v.finalChecks || []).filter(c => c.state === 'issue').map(c => ({ ...c, _src: 'Final' })),
            ];
            const holdEntry = (v.historyRaw || []).find(h => h.stage_to === 'hold');
            const daysHeld  = holdEntry
              ? Math.floor((Date.now() - new Date(holdEntry.created_at).getTime()) / 86400000)
              : null;
            holds.push({ ...v, issues, daysHeld });
          }
          if (NON_RELEASED.includes(v.stage)) {
            const key = (v.model || 'Unknown') + (v.variant ? ` · ${v.variant}` : '');
            if (!modelMap[key]) modelMap[key] = { name: key, total: 0, byStage: {} };
            modelMap[key].total += 1;
            modelMap[key].byStage[v.stage] = (modelMap[key].byStage[v.stage] || 0) + 1;
          }
          v.history.slice(0, 2).forEach(h => recentList.push({ vid: v.label || v.model, text: h }));
        });
        recentList.sort((a, b) => b.text.localeCompare(a.text));
        const stageColors = Object.fromEntries(STAGE_KEYS.map(k => [k, STAGE_META[k]?.color || '#6b7280']));
        return {
          pipeline: STAGE_KEYS.map(k => ({
            label: (STAGE_META[k]?.name || k).toUpperCase(),
            count: counts[k] || 0,
            color: STAGE_META[k]?.color || '#6b7280',
          })),
          holdVehicles: holds,
          recent: recentList,
          modelsInPipeline: {
            rows: Object.values(modelMap).sort((a,b) => b.total - a.total),
            stages: NON_RELEASED,
            colors: stageColors,
          },
        };
      }, [all, STAGE_KEYS.join(','), JSON.stringify(STAGE_META)]);

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card lg:hidden">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-primary rounded-xl flex items-center justify-center shadow-md shadow-primary/30">
                  <Icon name="garage" fill className="text-white text-lg" />
                </div>
                <div>
                  <div className="font-black text-navy text-[15px] leading-tight">StockMo</div>
                  <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{t('administratorPanel')}</div>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full transition-colors">
                  <Icon name="notifications" className="text-navy" />
                  {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
                </button>
                <div className="w-8 h-8 rounded-full bg-navy flex items-center justify-center text-white text-[11px] font-black">JD</div>
              </div>
            </div>
          </header>
          <main className="flex-1 overflow-y-auto pb-20 lg:pb-8">
            <div className="bg-white px-5 lg:px-8 pb-5 pt-3 lg:pt-7 border-b border-gray-100">
              <div className="lg:max-w-7xl lg:mx-auto">
                <h1 className="text-[22px] lg:text-[28px] font-black text-navy mt-3 lg:mt-0 leading-tight">{t('fleetOperations')}</h1>
                <div className="flex gap-3 mt-3 lg:mt-4 lg:w-fit">
                  <button className="flex-1 lg:flex-none lg:px-6 py-2.5 border-2 border-primary text-primary font-bold text-[11px] uppercase tracking-widest rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/5 transition-colors">
                    <Icon name="upload" className="text-base" /> {t('exportReport')}
                  </button>
                  {canEditProp && (
                    <button onClick={onAddVehicle} className="flex-1 lg:flex-none lg:px-6 py-2.5 bg-primary text-white font-bold text-[11px] uppercase tracking-widest rounded-full flex items-center justify-center gap-1.5 shadow-primary-glow hover:brightness-110 transition-all">
                      <Icon name="add" fill className="text-base" /> {t('addVehicle')}
                    </button>
                  )}
                </div>
              </div>
            </div>
            <div className="p-4 lg:px-8 lg:py-6 space-y-4 lg:max-w-7xl lg:mx-auto">
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
                {[
                  { label:t('totalFleet'), value:all.length,                                      icon:'directions_car', ic:'text-navy'       },
                  { label:t('inbound'),   value:all.filter(v=>v.stage==='port').length,           icon:'local_shipping', ic:'text-amber-500'  },
                  { label:t('processing'),value:all.filter(v=>['pdi','hold'].includes(v.stage)).length, icon:'settings', ic:'text-blue-500'   },
                  { label:t('dispatched'),value:all.filter(v=>v.stage==='released').length,       icon:'verified',       ic:'text-emerald-500'},
                ].map(s => (
                  <div key={s.label} className="bg-white rounded-[16px] p-4 lg:p-5 shadow-card">
                    <div className="flex items-start justify-between mb-2">
                      <div className="text-[11px] text-muted font-medium">{s.label}</div>
                      <Icon name={s.icon} fill className={`${s.ic} text-[22px]`} />
                    </div>
                    <div className="text-[28px] lg:text-[36px] font-black text-navy leading-none">{s.value}</div>
                  </div>
                ))}
              </div>
              <div className="bg-white rounded-[20px] p-4 lg:p-6 shadow-card">
                <div className="flex items-center gap-2 mb-4">
                  <Icon name="bar_chart" fill className="text-primary text-[22px]" />
                  <span className="font-bold text-navy text-[14px] lg:text-[16px]">{t('pipelineProgress')}</span>
                </div>
                <div className="flex items-end justify-between gap-1 lg:gap-3">
                  {pipeline.map(p => (
                    <div key={p.label} className="flex flex-col items-center gap-2 flex-1">
                      <div style={{ background: p.color }}
                        className="w-10 h-10 lg:w-16 lg:h-16 rounded-full flex items-center justify-center text-white text-[11px] lg:text-[18px] font-black shadow-md cursor-pointer hover:scale-110 transition-transform"
                        onClick={() => navigate('fleet-list')}>
                        {p.count < 10 ? `0${p.count}` : p.count}
                      </div>
                      <div className="text-[8px] lg:text-[10px] font-bold uppercase tracking-wider text-muted text-center leading-tight">{p.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Models in Pipeline */}
              {modelsInPipeline.rows.length > 0 && (
                <div className="bg-white rounded-[20px] p-4 lg:p-6 shadow-card">
                  <button className="flex items-center justify-between w-full mb-3" onClick={() => setShowModelsModal(true)}>
                    <div className="flex items-center gap-2">
                      <Icon name="directions_car" fill className="text-primary text-[22px]" />
                      <span className="font-bold text-navy text-[14px] lg:text-[16px]">Models in Pipeline</span>
                    </div>
                    <span className="text-[10px] font-bold text-muted uppercase tracking-wider">
                      {modelsInPipeline.rows.reduce((a,r) => a + r.total, 0)} active units
                    </span>
                  </button>
                  <div className="space-y-1.5">
                    {modelsInPipeline.rows.slice(0, 5).map(row => (
                      <div key={row.name} className="flex items-center gap-3 py-1.5 border-b border-gray-50 last:border-0">
                        <div className="flex-1 min-w-0">
                          <div className="text-[12px] font-bold text-navy truncate">{row.name}</div>
                          <div className="flex gap-0.5 mt-1 h-1.5 rounded-full overflow-hidden w-full">
                            {modelsInPipeline.stages.map(s => {
                              const c = row.byStage[s] || 0;
                              if (!c) return null;
                              return (
                                <div key={s} style={{ width: (c / row.total * 100).toFixed(1) + '%', background: modelsInPipeline.colors[s] }} className="h-full" title={`${c} ${(STAGE_META[s]?.name || s).toUpperCase()}`} />
                              );
                            })}
                          </div>
                        </div>
                        <span className="text-[15px] font-black text-navy flex-shrink-0">{row.total}</span>
                      </div>
                    ))}
                  </div>
                  {modelsInPipeline.rows.length > 0 && (
                    <button onClick={() => setShowModelsModal(true)}
                      className="w-full mt-2.5 py-1.5 text-[11px] font-bold text-primary hover:underline text-center">
                      View all {modelsInPipeline.rows.length} model{modelsInPipeline.rows.length !== 1 ? 's' : ''} →
                    </button>
                  )}
                </div>
              )}

              {/* Models in Pipeline — full modal */}
              {showModelsModal && (
                <div className="fixed inset-0 z-[60] bg-black/50 flex items-end lg:items-center justify-center" onClick={() => setShowModelsModal(false)}>
                  <div className="bg-white rounded-t-[28px] lg:rounded-[28px] w-full lg:max-w-2xl max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                    <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100 flex-shrink-0">
                      <div className="flex items-center gap-2">
                        <Icon name="directions_car" fill className="text-primary text-[22px]" />
                        <span className="font-black text-navy text-[16px]">All Models in Pipeline</span>
                      </div>
                      <button onClick={() => setShowModelsModal(false)} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <Icon name="close" className="text-navy" />
                      </button>
                    </div>
                    <div className="px-5 pt-3 flex-shrink-0">
                      <input
                        value={modelSearch}
                        onChange={e => setModelSearch(e.target.value)}
                        placeholder="Search models…"
                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[13px] text-navy outline-none focus:border-primary transition-colors"
                      />
                      {/* Stage legend */}
                      <div className="flex flex-wrap gap-2 mt-2 mb-1">
                        {modelsInPipeline.stages.map(s => (
                          <span key={s} className="flex items-center gap-1 text-[9px] font-bold text-muted uppercase tracking-wide">
                            <span style={{ background: modelsInPipeline.colors[s] }} className="w-2 h-2 rounded-full flex-shrink-0" />
                            {STAGE_META[s]?.name || s}
                          </span>
                        ))}
                      </div>
                    </div>
                    <div className="overflow-y-auto flex-1 px-5 pb-5 space-y-1.5 mt-1">
                      {modelsInPipeline.rows
                        .filter(r => r.name.toLowerCase().includes(modelSearch.toLowerCase()))
                        .map(row => (
                          <div key={row.name} className="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
                            <div className="flex-1 min-w-0">
                              <div className="text-[12px] font-bold text-navy truncate">{row.name}</div>
                              <div className="flex flex-wrap gap-1.5 mt-1">
                                {modelsInPipeline.stages.map(s => {
                                  const c = row.byStage[s] || 0;
                                  if (!c) return null;
                                  return (
                                    <span key={s} className="flex items-center gap-1 text-[10px] font-bold text-muted">
                                      <span style={{ background: modelsInPipeline.colors[s] }} className="w-1.5 h-1.5 rounded-full" />
                                      {c} {(STAGE_META[s]?.name || s).toUpperCase()}
                                    </span>
                                  );
                                })}
                              </div>
                            </div>
                            <span className="text-[16px] font-black text-navy flex-shrink-0">{row.total}</span>
                          </div>
                        ))}
                    </div>
                  </div>
                </div>
              )}

              {holdVehicles.length > 0 && (
                <div className="bg-white rounded-[20px] p-4 shadow-card">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <Icon name="warning" fill className="text-primary text-[22px]" />
                      <span className="font-bold text-navy text-[14px]">{t('needsAttention')}</span>
                    </div>
                    <span className="text-[11px] font-bold text-primary bg-red-50 px-2.5 py-0.5 rounded-full">{holdVehicles.length} on hold</span>
                  </div>
                  <div className="space-y-3">
                    {holdVehicles.map(hv => (
                      <button key={hv.id} onClick={() => onOpenDetail(hv.id)}
                        className="w-full bg-red-50 border border-red-200 rounded-[16px] p-3 text-left hover:brightness-95 transition-all">
                        <div className="flex items-center gap-3 mb-2">
                          {hv.img
                            ? <img loading="lazy" src={hv.img} className="w-10 h-10 rounded-xl object-cover flex-shrink-0 border border-red-200" />
                            : <div className="w-10 h-10 rounded-xl bg-red-100 flex-shrink-0 flex items-center justify-center">
                                <Icon name="directions_car" fill className="text-red-400 text-[20px]" />
                              </div>
                          }
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2">
                              <span className="text-[12px] font-black text-navy truncate">{hv.label || hv.model}</span>
                              <span className="text-[9px] font-bold bg-red-500 text-white px-1.5 py-0.5 rounded-full uppercase tracking-wide flex-shrink-0">HOLD</span>
                            </div>
                            <div className="text-[10px] text-muted">
                              {hv.issues.length} issue{hv.issues.length !== 1 ? 's' : ''} flagged
                              {hv.daysHeld !== null ? ` · ${hv.daysHeld}d on hold` : ''}
                            </div>
                          </div>
                          <Icon name="chevron_right" className="text-muted flex-shrink-0" />
                        </div>
                        {hv.issues.length > 0 && (
                          <div className="space-y-1">
                            {hv.issues.slice(0, 3).map((iss, i) => (
                              <div key={i} className="flex items-center gap-2 px-2 py-1.5 bg-white rounded-lg border border-red-100">
                                <Icon name="error" fill className="text-red-500 text-[14px] flex-shrink-0" />
                                <span className="text-[10px] font-semibold text-navy flex-1 truncate">{iss.name}</span>
                                <span className="text-[9px] text-muted flex-shrink-0">{iss._src}</span>
                                {iss.image_url && <Icon name="photo_camera" fill className="text-blue-400 text-[12px] flex-shrink-0" />}
                              </div>
                            ))}
                            {hv.issues.length > 3 && (
                              <div className="text-[10px] text-muted text-center pt-0.5">+{hv.issues.length - 3} more issues</div>
                            )}
                          </div>
                        )}
                        {hv.issues.length === 0 && (
                          <div className="text-[10px] text-muted italic px-1">No issues logged yet — inspect vehicle to add details</div>
                        )}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div className="bg-white rounded-[20px] p-4 shadow-card">
                <div className="flex items-center gap-2 mb-3">
                  <Icon name="group" fill className="text-navy text-[22px]" />
                  <span className="font-bold text-navy text-[14px]">{t('technicianStatus')}</span>
                </div>
                <div className="flex items-center gap-2 mb-2">
                  {technicians.slice(0,3).map(tc => (
                    <div key={tc.id} className="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-[10px] font-black text-white shadow-sm" style={{backgroundColor:tc.color}}>{tc.ini}</div>
                  ))}
                  <span className="text-[12px] font-semibold text-navy ml-1">{technicians.filter(tc=>tc.online).length} {t('online')}</span>
                </div>
              </div>
              <div className="bg-white rounded-[20px] p-4 shadow-card">
                <div className="flex items-center gap-2 mb-3">
                  <Icon name="update" fill className="text-navy text-[22px]" />
                  <span className="font-bold text-navy text-[14px]">{t('recentActivity')}</span>
                </div>
                <div className="space-y-2">
                  {recent.slice(0, 5).map((a, i) => (
                    <div key={i} className="flex items-start gap-3">
                      <Icon name="schedule" fill className="text-muted text-[18px] flex-shrink-0 mt-0.5" />
                      <div className="text-[12px] text-navy font-medium">{a.vid}: {a.text.split(': ').slice(1).join(': ')}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </main>
          <AdminBottomNav navigate={navigate} currentView="admin-dashboard" vehicles={vehicles} t={t} role={role} />
        </div>
      );
    }

    /* ─── FleetListScreen ─── */
    const PAGE_SIZE = 50;

    function FleetListScreen({ navigate, vehicles, onAddVehicle, onImportFleet, onNotificationClick, unreadCount, onOpenDetail, t, canEdit: canEditProp = true, role, pipelineStages = [] }) {
      const all = vehicles;
      const [search, setSearch]         = useState('');
      const [stage, setStage]           = useState('all');
      const [page, setPage]             = useState(0);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const searchRef = useRef(null);

      // Build dynamic stage list from pipelineStages prop (fall back to known slugs if not loaded)
      const stagesActive = pipelineStages.filter(s => s.active).sort((a, b) => a.ord - b.ord);
      const stageSlugs   = ['all', ...stagesActive.map(s => s.slug)];
      const stageMeta    = Object.fromEntries(stagesActive.map(s => [s.slug, s]));

      const counts = useMemo(() => {
        const acc = { all: all.length };
        stagesActive.forEach(s => { acc[s.slug] = all.filter(v => v.stage === s.slug).length; });
        return acc;
      }, [all, stageSlugs.join(',')]);

      // Full filtered list (no pagination)
      const filtered = useMemo(() => {
        const q = search.toLowerCase().trim();
        return all.filter(v => {
          const ms = !q
            || (v.label||v.model).toLowerCase().includes(q)
            || (v.vin||'').toLowerCase().includes(q)
            || (v.variant||'').toLowerCase().includes(q)
            || (v.exteriorColor||v.color||'').toLowerCase().includes(q)
            || (v.interiorColor||'').toLowerCase().includes(q)
            || (v.csNumber||'').toLowerCase().includes(q)
            || (v.engineNumber||'').toLowerCase().includes(q)
            || (v.invoiceNumber||'').toLowerCase().includes(q)
            || (v.dealer||'').toLowerCase().includes(q)
            || (v.dealerGroup||'').toLowerCase().includes(q)
            || (v.region||'').toLowerCase().includes(q)
            || (v.lot||'').toLowerCase().includes(q)
            || Object.values(v.extraFields||{}).some(val => String(val).toLowerCase().includes(q));
          return ms && (stage === 'all' || v.stage === stage);
        });
      }, [all, search, stage]);

      // Reset page whenever filter changes
      useEffect(() => { setPage(0); }, [search, stage]);

      // Pagination slice
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      const paged = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
      const showFrom = filtered.length ? page * PAGE_SIZE + 1 : 0;
      const showTo   = Math.min((page + 1) * PAGE_SIZE, filtered.length);

      // Smart search suggestions — model and color attribute counts
      const suggestions = useMemo(() => {
        const q = search.toLowerCase().trim();
        if (q.length < 2) return null;
        const modelMap = {}, colorMap = {};
        all.forEach(v => {
          const m = v.model || '';
          const c = v.color || '';
          if (m.toLowerCase().includes(q)) modelMap[m] = (modelMap[m] || 0) + 1;
          if (c.toLowerCase().includes(q)) colorMap[c] = (colorMap[c] || 0) + 1;
        });
        const models = Object.entries(modelMap).sort((a,b) => b[1]-a[1]);
        const colors = Object.entries(colorMap).sort((a,b) => b[1]-a[1]);
        return (models.length || colors.length) ? { models, colors } : null;
      }, [all, search]);

      const applySuggestion = (val) => { setSearch(val); setShowSuggestions(false); };

      // Model-level aggregation for overview cards
      const modelSummary = useMemo(() => {
        const map = {};
        all.forEach(v => {
          const key = v.model || 'Unknown';
          if (!map[key]) map[key] = {
            model: key,
            total: 0,
            byStage: {},         // dynamic: slug → count
            variantCounts: {},   // variant label → count
            colorCounts: {},     // color label → count
            years: new Set(),
            dealers: new Set(),
          };
          const m = map[key];
          m.total++;
          m.byStage[v.stage] = (m.byStage[v.stage] || 0) + 1;
          const variant = (v.variant || '').trim() || '(Standard)';
          m.variantCounts[variant] = (m.variantCounts[variant] || 0) + 1;
          const color = (v.exteriorColor || v.color || '').trim() || '(Unknown)';
          m.colorCounts[color] = (m.colorCounts[color] || 0) + 1;
          if (v.year) m.years.add(String(v.year));
          if (v.dealer) m.dealers.add(v.dealer);
        });
        return Object.values(map)
          .map(m => ({
            ...m,
            // sorted arrays of [label, count] pairs for display
            variants: Object.entries(m.variantCounts).sort((a, b) => b[1] - a[1]),
            colors:   Object.entries(m.colorCounts).sort((a, b) => b[1] - a[1]),
            years:    [...m.years],
            dealers:  [...m.dealers],
          }))
          .sort((a, b) => b.total - a.total);
      }, [all]);

      const [selectedModel, setSelectedModel] = useState(null);

      // Close suggestions on outside click
      useEffect(() => {
        const handler = (e) => { if (searchRef.current && !searchRef.current.contains(e.target)) setShowSuggestions(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-7 pb-4 shadow-card">
            <div className="lg:max-w-7xl lg:mx-auto">
              <div className="flex items-center gap-3 mb-4">
                <div className="flex items-center gap-3 flex-1">
                  <div className="w-9 h-9 bg-primary rounded-xl items-center justify-center shadow-md shadow-primary/30 hidden lg:flex">
                    <Icon name="garage" fill className="text-white text-lg" />
                  </div>
                  <div>
                    <div className="font-black text-navy text-[15px] lg:text-[22px] leading-tight">{t('fleet')}</div>
                    <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{t('vehicles', {count:all.length})}</div>
                  </div>
                </div>
                <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full lg:hidden">
                  <Icon name="notifications" className="text-navy" />
                  {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
                </button>
                {/* Import button (desktop text, mobile icon) — edit-only */}
                {canEditProp && (<>
                <button onClick={onImportFleet}
                  className="w-9 h-9 lg:w-auto lg:px-4 lg:rounded-full bg-gray-100 text-navy rounded-full flex items-center justify-center gap-2 hover:bg-gray-200 transition-all">
                  <Icon name="upload_file" className="text-navy text-base" />
                  <span className="hidden lg:inline font-bold text-[12px] uppercase tracking-widest">Import</span>
                </button>
                <button onClick={onAddVehicle} className="w-9 h-9 lg:w-auto lg:px-4 lg:rounded-full bg-primary rounded-full flex items-center justify-center gap-2 shadow-primary-glow hover:brightness-110 transition-all">
                  <Icon name="add" fill className="text-white text-base" />
                  <span className="hidden lg:inline text-white font-bold text-[12px] uppercase tracking-widest">{t('addVehicle')}</span>
                </button>
                </>)}
              </div>
              {/* Search bar with suggestions */}
              <div ref={searchRef} className="relative">
                <div className="flex items-center gap-2 bg-gray-100 rounded-xl px-3 py-2.5">
                  <Icon name="search" className="text-muted text-xl" />
                  <input
                    value={search}
                    onChange={e => { setSearch(e.target.value); setShowSuggestions(true); }}
                    onFocus={() => setShowSuggestions(true)}
                    placeholder="Search model, color, VIN, lot…"
                    className="flex-1 bg-transparent text-[13px] text-navy placeholder:text-muted outline-none"
                  />
                  {search && <button onClick={() => { setSearch(''); setShowSuggestions(false); }}><Icon name="close" className="text-muted text-xl" /></button>}
                </div>
                {/* Suggestions dropdown */}
                {showSuggestions && suggestions && (
                  <div className="absolute left-0 right-0 top-full mt-1.5 bg-white rounded-[16px] shadow-card-hover border border-gray-100 z-30 overflow-hidden max-h-[280px] overflow-y-auto">
                    {suggestions.models.length > 0 && (
                      <div>
                        <div className="px-4 pt-3 pb-1 text-[9px] font-black uppercase tracking-[0.15em] text-muted">Models</div>
                        {suggestions.models.map(([name, count]) => (
                          <button key={name} onMouseDown={() => applySuggestion(name)}
                            className="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-50 transition-colors text-left">
                            <span className="text-[13px] font-semibold text-navy">{name}</span>
                            <span className="text-[11px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">{count} unit{count !== 1 ? 's' : ''}</span>
                          </button>
                        ))}
                      </div>
                    )}
                    {suggestions.colors.length > 0 && (
                      <div className={suggestions.models.length ? 'border-t border-gray-50' : ''}>
                        <div className="px-4 pt-3 pb-1 text-[9px] font-black uppercase tracking-[0.15em] text-muted">Colors</div>
                        {suggestions.colors.map(([name, count]) => (
                          <button key={name} onMouseDown={() => applySuggestion(name)}
                            className="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-50 transition-colors text-left">
                            <div className="flex items-center gap-2">
                              <span className="w-3 h-3 rounded-full bg-gray-300 border border-gray-200 flex-shrink-0" />
                              <span className="text-[13px] font-semibold text-navy">{name}</span>
                            </div>
                            <span className="text-[11px] font-bold text-muted bg-gray-100 px-2 py-0.5 rounded-full">{count} unit{count !== 1 ? 's' : ''}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* Stage filter pills — driven by pipeline_stages table */}
          <div className="bg-white px-4 lg:px-8 pb-3 pt-3 flex gap-2 overflow-x-auto no-scroll border-b border-gray-100">
            <div className="lg:max-w-7xl lg:mx-auto flex gap-2 w-full">
              {stageSlugs.map(s => {
                const meta    = stageMeta[s];
                const isActive = stage === s;
                const hexColor = meta?.color;
                return (
                  <button key={s} onClick={() => { setStage(s); setPage(0); }}
                    style={isActive && hexColor ? { background: hexColor, color: '#fff' } : {}}
                    className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all ${
                      isActive
                        ? hexColor ? 'shadow-md' : 'bg-primary text-white shadow-md'
                        : 'bg-gray-100 text-muted hover:bg-gray-200'
                    }`}>
                    {s === 'all' ? 'ALL' : (meta?.name || s.replace(/_/g,' ')).toUpperCase()}
                    <span className={`text-[10px] font-black ${isActive ? 'text-white/70' : 'text-muted/70'}`}>{counts[s] ?? 0}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <main className="flex-1 overflow-y-auto p-4 lg:px-8 lg:py-6 pb-20 lg:pb-8">
            <div className="lg:max-w-7xl lg:mx-auto">
              {/* Model Overview Cards */}
              {modelSummary.length > 0 && (
                <div className="mb-4">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-[11px] font-black uppercase tracking-widest text-muted px-1">
                      Models ({modelSummary.length})
                    </span>
                    <span className="text-[10px] text-muted">{all.length} total units</span>
                  </div>
                  <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 lg:gap-3">
                    {modelSummary.map(m => {
                      const releasedCount = m.byStage['released'] || 0;
                      const active = m.total - releasedCount;
                      const pct = m.total > 0 ? Math.round((releasedCount / m.total) * 100) : 0;
                      return (
                        <button key={m.model} onClick={() => setSelectedModel(m.model)}
                          className="bg-white rounded-[16px] shadow-card p-3 text-left hover:shadow-card-hover active:scale-[0.98] transition-all">
                          <div className="font-black text-navy text-[12px] leading-tight truncate mb-1">{m.model}</div>
                          <div className="text-[22px] font-black text-primary leading-none">{m.total}</div>
                          <div className="text-[9px] font-bold text-muted uppercase tracking-wide mb-2">
                            {active} active · {releasedCount} released
                          </div>
                          <div className="flex flex-wrap gap-1">
                            {stagesActive.map(s => (m.byStage[s.slug] || 0) > 0 && (
                              <span key={s.slug} style={{ background: s.color || '#6b7280' }}
                                className="text-white text-[8px] font-black px-1.5 py-0.5 rounded-full">
                                {(s.name || s.slug).toUpperCase()} {m.byStage[s.slug]}
                              </span>
                            ))}
                          </div>
                          <div className="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden">
                            <div className="h-full bg-emerald-400 rounded-full transition-all" style={{width:`${pct}%`}} />
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Model detail popup */}
              {selectedModel && (() => {
                const m = modelSummary.find(x => x.model === selectedModel);
                if (!m) return null;
                const stagesForPopup = stagesActive.length ? stagesActive : [
                  { slug:'port',     name:'Port',                color:'#f59e0b' },
                  { slug:'pdi',      name:'PDI',                 color:'#22c55e' },
                  { slug:'hold',     name:'On Hold',             color:'#ef4444' },
                  { slug:'stock',    name:'In Stock',            color:'#3b82f6' },
                  { slug:'ready',    name:'Ready for Delivery',  color:'#a855f7' },
                  { slug:'released', name:'Released to Dealer',  color:'#10b981' },
                ];
                return (
                  <div className="fixed inset-0 bg-black/50 z-50 anim-fade-in flex items-end lg:items-center justify-center lg:p-6"
                    onClick={() => setSelectedModel(null)}>
                    <div className="w-full max-w-[430px] lg:max-w-[560px] bg-white rounded-t-[28px] lg:rounded-[24px] shadow-2xl flex flex-col anim-slide-up max-h-[85vh]"
                      onClick={e => e.stopPropagation()}>
                      <div className="w-10 h-1 bg-gray-200 rounded-full mx-auto mt-3 lg:hidden flex-shrink-0" />
                      <div className="px-5 pt-4 pb-3 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                        <div>
                          <h2 className="font-black text-navy text-[18px] leading-tight">{m.model}</h2>
                          <p className="text-[11px] text-muted mt-0.5">{m.total} total unit{m.total !== 1 ? 's' : ''}</p>
                        </div>
                        <button onClick={() => setSelectedModel(null)} className="p-2 hover:bg-gray-100 rounded-full">
                          <Icon name="close" className="text-muted" />
                        </button>
                      </div>
                      <div className="flex-1 overflow-y-auto p-5 space-y-5">
                        <div>
                          <div className="text-[9px] font-black uppercase tracking-widest text-muted mb-2">Pipeline Stage Breakdown</div>
                          <div className="space-y-2">
                            {stagesForPopup.map(s => {
                              const count = m.byStage[s.slug] || 0;
                              const pct = m.total > 0 ? (count / m.total) * 100 : 0;
                              return (
                                <div key={s.slug} className="flex items-center gap-3">
                                  <span className="text-[10px] font-bold text-navy w-32 flex-shrink-0">{s.name || s.slug}</span>
                                  <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full transition-all" style={{width:`${pct}%`, background: s.color || '#6b7280'}} />
                                  </div>
                                  <span className="text-[11px] font-black text-navy w-6 text-right flex-shrink-0">{count}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          {[
                            { label:'Active Units',        value: m.total - (m.byStage['released'] || 0), icon:'directions_car', c:'text-navy'        },
                            { label:'Released to Dealers', value: m.byStage['released'] || 0,  icon:'verified',       c:'text-emerald-500' },
                            { label:'Variants',            value: m.variants.length || 1,       icon:'tune',           c:'text-blue-500'    },
                            { label:'Colors Available',    value: m.colors.length   || '—',     icon:'palette',        c:'text-purple-500'  },
                          ].map(s => (
                            <div key={s.label} className="bg-gray-50 rounded-[14px] p-3">
                              <div className="flex items-center gap-1.5 mb-1">
                                <Icon name={s.icon} fill className={`${s.c} text-[16px]`} />
                                <span className="text-[9px] font-bold text-muted uppercase tracking-wide">{s.label}</span>
                              </div>
                              <div className="text-[20px] font-black text-navy leading-none">{s.value}</div>
                            </div>
                          ))}
                        </div>
                        {m.variants.length > 0 && (
                          <div>
                            <div className="text-[9px] font-black uppercase tracking-widest text-muted mb-2">Variants</div>
                            <div className="flex flex-wrap gap-1.5">
                              {m.variants.map(([name, count]) => (
                                <span key={name} className="inline-flex items-center gap-1 text-[11px] font-semibold text-navy bg-gray-100 px-2.5 py-1 rounded-full">
                                  {name} <span className="font-black text-primary text-[10px]">{count}</span>
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                        {m.colors.length > 0 && (
                          <div>
                            <div className="text-[9px] font-black uppercase tracking-widest text-muted mb-2">Colors</div>
                            <div className="flex flex-wrap gap-1.5">
                              {m.colors.map(([name, count]) => (
                                <span key={name} className="inline-flex items-center gap-1 text-[11px] font-semibold text-navy bg-gray-100 px-2.5 py-1 rounded-full">
                                  {name} <span className="font-black text-primary text-[10px]">{count}</span>
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                        <button onClick={() => { setSelectedModel(null); setSearch(m.model); setStage('all'); }}
                          className="w-full py-3 bg-primary text-white font-black text-[12px] uppercase tracking-widest rounded-full shadow-primary-glow hover:brightness-110 transition-all flex items-center justify-center gap-2">
                          <Icon name="search" className="text-base" />
                          View All {m.model} Units
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Results count + pagination top */}
              {filtered.length > 0 && (
                <div className="flex items-center justify-between mb-3">
                  <span className="text-[11px] text-muted font-medium">
                    {filtered.length <= PAGE_SIZE
                      ? `${filtered.length} vehicle${filtered.length !== 1 ? 's' : ''}`
                      : `Showing ${showFrom}–${showTo} of ${filtered.length}`}
                  </span>
                  {totalPages > 1 && (
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}
                        className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-200 disabled:opacity-30 transition-all">
                        <Icon name="chevron_left" className="text-navy text-base" />
                      </button>
                      <span className="text-[11px] font-bold text-navy px-1">{page+1} / {totalPages}</span>
                      <button onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}
                        className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-200 disabled:opacity-30 transition-all">
                        <Icon name="chevron_right" className="text-navy text-base" />
                      </button>
                    </div>
                  )}
                </div>
              )}

              <div className="space-y-3 lg:space-y-0 lg:grid lg:grid-cols-2 xl:grid-cols-3 lg:gap-4">
                {paged.length === 0 && (
                  <div className="text-center py-20 text-muted col-span-3">
                    <Icon name="directions_car" fill className="text-[52px] mb-2 opacity-40" />
                    <div className="text-[13px] font-bold">{t('noVehiclesFound')}</div>
                  </div>
                )}
                {paged.map(vehicle => (
                  <button key={vehicle.id} onClick={() => onOpenDetail(vehicle.id)}
                    className="w-full bg-white rounded-[16px] shadow-card p-3 flex items-center gap-3 text-left hover:shadow-card-hover active:scale-[0.99] transition-all">
                    <div className="w-20 h-14 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                      <img loading="lazy" src={vehicle.img} alt={vehicle.model} className="w-full h-full object-contain p-1" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5 mb-0.5">
                        <span className="text-[10px] font-black text-primary uppercase tracking-wider">{vehicle.label || vehicle.model}</span>
                        <span className="text-[9px] text-muted">·</span>
                        <span className="text-[10px] text-muted font-medium">{t('lot')} {vehicle.lot}</span>
                      </div>
                      <div className="font-bold text-navy text-[13px] leading-tight truncate">{vehicle.model}</div>
                      <div className="text-[11px] text-muted mt-0.5">{vehicle.type.toUpperCase()} · {vehicle.year} · {vehicle.color}</div>
                      {Object.keys(vehicle.extraFields || {}).length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-1">
                          {Object.entries(vehicle.extraFields).slice(0, 2).map(([k, val]) => (
                            <span key={k} className="text-[9px] font-medium text-muted bg-gray-100 px-1.5 py-0.5 rounded-full truncate max-w-[120px]" title={`${k}: ${val}`}>{k}: {String(val)}</span>
                          ))}
                          {Object.keys(vehicle.extraFields).length > 2 && (
                            <span className="text-[9px] font-medium text-primary bg-primary/5 px-1.5 py-0.5 rounded-full">+{Object.keys(vehicle.extraFields).length - 2} more</span>
                          )}
                        </div>
                      )}
                    </div>
                    <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                      <StatusBadge status={vehicle.stage} t={t} />
                      <Icon name="chevron_right" className="text-muted text-xl" />
                    </div>
                  </button>
                ))}
              </div>

              {/* Bottom pagination */}
              {totalPages > 1 && (
                <div className="flex items-center justify-center gap-3 mt-6">
                  <button onClick={() => setPage(0)} disabled={page === 0}
                    className="px-3 py-1.5 rounded-full text-[11px] font-bold bg-gray-100 text-muted hover:bg-gray-200 disabled:opacity-30 transition-all">First</button>
                  <button onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}
                    className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 disabled:opacity-30 transition-all">
                    <Icon name="chevron_left" className="text-navy" />
                  </button>
                  <span className="text-[12px] font-bold text-navy">Page {page+1} of {totalPages}</span>
                  <button onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}
                    className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 disabled:opacity-30 transition-all">
                    <Icon name="chevron_right" className="text-navy" />
                  </button>
                  <button onClick={() => setPage(totalPages-1)} disabled={page === totalPages-1}
                    className="px-3 py-1.5 rounded-full text-[11px] font-bold bg-gray-100 text-muted hover:bg-gray-200 disabled:opacity-30 transition-all">Last</button>
                </div>
              )}
            </div>
          </main>
          <AdminBottomNav navigate={navigate} currentView="fleet-list" vehicles={vehicles} t={t} role={role} />
        </div>
      );
    }

    /* ─── TeamScreen ─── */
    function TeamScreen({ navigate, vehicles, technicians, assignVehicle, batchAssignVehicles, onNotificationClick, unreadCount, t, role, canEdit: canEditProp = true }) {
      const [assigningId,   setAssigningId]   = useState(null);
      const [assignSearch,  setAssignSearch]  = useState('');
      const [assignFilter,  setAssignFilter]  = useState('all'); // 'all' | 'unassigned' | 'mine'
      const [assignPage,    setAssignPage]    = useState(0);
      const [batchSaving,   setBatchSaving]   = useState(false);
      const [teamTab,       setTeamTab]       = useState('techs'); // 'techs' | 'employees'
      const [employees,     setEmployees]     = useState([]);
      const [loadingEmps,   setLoadingEmps]   = useState(false);
      const isAdmin = role === 'admin';
      const ASSIGN_PAGE_SIZE = 40;

      const PERM_KEYS = [
        { key: 'edit',    label: 'Edit Vehicles' },
        { key: 'reports', label: 'View Reports'  },
        { key: 'notes',   label: 'Add Notes'     },
        { key: 'export',  label: 'Export Data'   },
      ];

      // Load employees when switching to that tab
      React.useEffect(() => {
        if (teamTab !== 'employees') return;
        setLoadingEmps(true);
        sb.from('user_profiles').select('*').eq('role', 'employee')
          .then(({ data, error }) => {
            if (error) console.error('load employees', error);
            setEmployees(data || []);
            setLoadingEmps(false);
          })
          .catch((err) => { console.error('load employees', err); setLoadingEmps(false); });
      }, [teamTab]);

      const togglePerm = async (emp, key) => {
        if (!isAdmin) return;
        const cur = emp.permissions || {};
        const next = { ...cur, [key]: !cur[key] };
        setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, permissions: next } : e));
        const { error } = await sb.from('user_profiles').update({ permissions: next }).eq('id', emp.id);
        if (error) console.error('toggle permission', error);
      };

      const onlineCount    = technicians.filter(tc => tc.online).length;
      const assignedCars   = (tid) => vehicles.filter(v => v.assignedTech === tid && v.stage !== 'released');
      const activeVehicles = vehicles.filter(v => v.stage !== 'released');
      const assigningTech  = technicians.find(tc => tc.id === assigningId);

      // Reset search/filter/page whenever the popup opens/closes
      React.useEffect(() => {
        if (!assigningId) { setAssignSearch(''); setAssignFilter('all'); setAssignPage(0); }
      }, [assigningId]);

      // Reset to page 0 when search or filter changes
      React.useEffect(() => { setAssignPage(0); }, [assignSearch, assignFilter]);

      // Derived filtered list used inside the popup
      const filteredAssign = React.useMemo(() => {
        let list = activeVehicles;
        if (assignFilter === 'unassigned') list = list.filter(v => !v.assignedTech);
        if (assignFilter === 'mine')       list = list.filter(v => v.assignedTech === assigningId);
        if (assignSearch.trim()) {
          const q = assignSearch.toLowerCase();
          list = list.filter(v =>
            (v.label||v.model||'').toLowerCase().includes(q) ||
            (v.vin||'').toLowerCase().includes(q) ||
            (v.color||'').toLowerCase().includes(q) ||
            (v.lot||'').toLowerCase().includes(q)
          );
        }
        return list;
      }, [activeVehicles, assignFilter, assignSearch, assigningId]);

      const handleAssign = (vehicleId) => {
        const isAlreadyAssigned = vehicles.find(v => v.id === vehicleId)?.assignedTech === assigningId;
        assignVehicle(vehicleId, isAlreadyAssigned ? null : assigningId);
      };

      const handleBatchAssign = async () => {
        if (batchSaving) return;
        setBatchSaving(true);
        const toAssign = filteredAssign.filter(v => v.assignedTech !== assigningId).map(v => v.id);
        await batchAssignVehicles(toAssign, assigningId);
        setBatchSaving(false);
      };

      const handleUnassignAll = async () => {
        if (batchSaving) return;
        setBatchSaving(true);
        const mine = activeVehicles.filter(v => v.assignedTech === assigningId).map(v => v.id);
        await batchAssignVehicles(mine, null);
        setBatchSaving(false);
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-7 pb-4 shadow-card">
            <div className="lg:max-w-7xl lg:mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-primary rounded-xl items-center justify-center shadow-md shadow-primary/30 hidden lg:flex">
                  <Icon name="garage" fill className="text-white text-lg" />
                </div>
                <div>
                  <div className="font-black text-navy text-[15px] lg:text-[22px] leading-tight">{t('team')}</div>
                  <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{t('techRoster', {count: technicians.length})}</div>
                </div>
              </div>
              <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full lg:hidden">
                <Icon name="notifications" className="text-navy" />
                {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
              </button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto pb-24 lg:pb-8">
            {/* stats */}
            <div className="bg-white px-5 lg:px-8 pb-5 border-b border-gray-100">
              <div className="lg:max-w-7xl lg:mx-auto">
              <h1 className="text-[22px] font-black text-navy mt-3 leading-tight lg:hidden">{t('team')}</h1>
              <p className="text-xs text-muted mb-4 lg:hidden">{t('techRoster', {count: technicians.length})}</p>
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:pt-4">
                <div className="bg-emerald-50 rounded-[16px] p-3 text-center">
                  <div className="text-[22px] font-black text-emerald-500">{onlineCount}</div>
                  <div className="text-[10px] text-emerald-600 font-bold uppercase tracking-wide mt-0.5">Online</div>
                </div>
                <div className="bg-gray-50 rounded-[16px] p-3 text-center">
                  <div className="text-[22px] font-black text-navy">{technicians.length}</div>
                  <div className="text-[10px] text-muted font-bold uppercase tracking-wide mt-0.5">Total</div>
                </div>
              </div>
              </div>{/* end lg:max-w-7xl */}
            </div>

            {/* Tab switcher: Technicians | Employees */}
            <div className="bg-white px-5 lg:px-8 pt-3 pb-2 border-b border-gray-100">
              <div className="lg:max-w-7xl lg:mx-auto flex gap-2">
                {[
                  { key: 'techs',     label: `Technicians (${technicians.length})` },
                  { key: 'employees', label: 'Employees' },
                ].map(tb => (
                  <button key={tb.key} onClick={() => setTeamTab(tb.key)}
                    className={`px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-wider transition-all
                      ${teamTab === tb.key ? 'bg-primary text-white shadow-sm' : 'bg-gray-100 text-muted hover:bg-gray-200'}`}>
                    {tb.label}
                  </button>
                ))}
              </div>
            </div>

            {teamTab === 'employees' ? (
              <div className="p-4 lg:px-8 lg:py-6 space-y-3 lg:space-y-0 lg:grid lg:grid-cols-2 xl:grid-cols-3 lg:gap-4 lg:max-w-7xl lg:mx-auto">
                {loadingEmps && (
                  <div className="text-center text-muted text-[13px] py-12 lg:col-span-3">Loading employees…</div>
                )}
                {!loadingEmps && employees.length === 0 && (
                  <div className="text-center text-muted text-[13px] py-12 lg:col-span-3">
                    No employees yet. Create one in Supabase with <code className="text-navy">role='employee'</code>.
                  </div>
                )}
                {employees.map(emp => {
                  const initials = (emp.full_name || emp.name || emp.email || '?').split(/\s+/).map(w => w[0]).join('').slice(0,2).toUpperCase();
                  const perms = emp.permissions || {};
                  return (
                    <div key={emp.id} className="bg-white rounded-[20px] p-4 shadow-card">
                      <div className="flex items-start gap-3 mb-3">
                        <div className="w-12 h-12 rounded-full bg-navy flex items-center justify-center text-[14px] font-black text-white shadow-sm flex-shrink-0">{initials}</div>
                        <div className="flex-1 min-w-0">
                          <div className="font-black text-navy text-[14px] leading-tight truncate">{emp.full_name || emp.name || emp.email || 'Employee'}</div>
                          <div className="text-[11px] text-muted truncate">{emp.email || ''}</div>
                          <div className="text-[9px] font-black uppercase tracking-[0.12em] text-muted mt-0.5">Employee</div>
                        </div>
                      </div>
                      <div className="pt-3 border-t border-gray-100 space-y-2">
                        <div className="text-[9px] font-black uppercase tracking-widest text-muted">Permissions</div>
                        {PERM_KEYS.map(p => (
                          <div key={p.key} className="flex items-center justify-between">
                            <span className="text-[12px] text-navy font-semibold">{p.label}</span>
                            <button onClick={() => togglePerm(emp, p.key)} disabled={!isAdmin}
                              className={`relative w-10 h-5.5 rounded-full transition-all ${perms[p.key] ? 'bg-primary' : 'bg-gray-200'} ${!isAdmin ? 'opacity-50 cursor-not-allowed' : ''}`}
                              style={{ width: '40px', height: '22px' }}>
                              <span className="absolute top-[2px] w-[18px] h-[18px] bg-white rounded-full shadow-sm transition-all" style={{ left: perms[p.key] ? '20px' : '2px' }} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
            <div className="p-4 lg:px-8 lg:py-6 space-y-3 lg:space-y-0 lg:grid lg:grid-cols-2 xl:grid-cols-3 lg:gap-4 lg:max-w-7xl lg:mx-auto">
              {technicians.length === 0 && (
                <div className="text-center text-muted text-[13px] py-12 lg:col-span-3">No technicians yet.</div>
              )}
              {technicians.map(tech => {
                const cars = assignedCars(tech.id);
                return (
                  <div key={tech.id} className="bg-white rounded-[20px] p-4 shadow-card">
                    {/* Tech header */}
                    <div className="flex items-start gap-3 mb-3">
                      <div className="relative flex-shrink-0">
                        <div className="w-12 h-12 rounded-full flex items-center justify-center text-[15px] font-black text-white shadow-sm"
                          style={{ backgroundColor: tech.color }}>
                          {tech.ini}
                        </div>
                        {/* Online dot */}
                        <div className={`absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full border-2 border-white shadow-sm ${tech.online ? 'bg-emerald-400' : 'bg-gray-300'}`} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-black text-navy text-[14px] leading-tight">{tech.name}</div>
                        <div className="text-[11px] text-muted capitalize">{tech.role.replace('_',' ')}</div>
                        <div className={`text-[10px] font-bold mt-0.5 ${tech.online ? 'text-emerald-500' : 'text-gray-400'}`}>
                          {tech.online ? '● Online' : '○ Offline'}
                        </div>
                      </div>
                      {/* Assign button — edit-only */}
                      {canEditProp && (
                        <button onClick={() => setAssigningId(tech.id)}
                          className="flex items-center gap-1 px-3 py-1.5 rounded-full bg-primary/10 text-primary text-[11px] font-black hover:bg-primary/20 transition-colors flex-shrink-0">
                          <Icon name="add" className="text-[14px]" /> Assign
                        </button>
                      )}
                    </div>

                    {/* Assigned vehicles */}
                    {cars.length > 0 ? (
                      <div className="flex flex-wrap gap-1.5 pt-1 border-t border-gray-100">
                        {cars.map(c => (
                          <div key={c.id} className="flex items-center gap-1 bg-gray-50 border border-gray-100 px-2 py-1 rounded-lg">
                            <span className="text-[10px] font-black text-navy">{c.label || c.model}</span>
                            <StatusBadge status={c.stage} t={t} />

                              <Icon name="close" className="text-red-400 text-[12px]" />
                            </button>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="pt-2 border-t border-gray-100 text-[11px] text-muted italic">No vehicles assigned</div>

                  </div>
                );
              })}
            </div>
            )}
          </main>

          {/* ── Assign Vehicle — bottom sheet on mobile, centered dialog on desktop ── */}
          {assigningId && (() => {
            const assignedToMe = activeVehicles.filter(v => v.assignedTech === assigningId).length;
            const unassignedInFilter = filteredAssign.filter(v => v.assignedTech !== assigningId).length;
            const filters = [
              { key: 'all',        label: `All (${activeVehicles.length})` },
              { key: 'unassigned', label: `Unassigned (${activeVehicles.filter(v => !v.assignedTech).length})` },

              <div className="fixed inset-0 bg-black/50 z-50 anim-fade-in flex items-end lg:items-center justify-center lg:p-6"
                onClick={() => setAssigningId(null)}>
                <div className="w-full max-w-[430px] lg:max-w-[720px] bg-white rounded-t-[32px] lg:rounded-[24px] shadow-2xl flex flex-col anim-slide-up"
                  style={{ maxHeight: '88vh' }} onClick={e => e.stopPropagation()}>

                  {/* Drag handle — mobile only */}
                  <div className="w-12 h-1 bg-gray-200 rounded-full mx-auto mt-3 lg:hidden" />

                  {/* Header */}
                  <div className="px-5 lg:px-6 pt-3 lg:pt-5 pb-3 border-b border-gray-100 flex-shrink-0">
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-primary/10 rounded-xl items-center justify-center hidden lg:flex">

                        </div>
                        <div>
                          <div className="text-[15px] lg:text-[17px] font-black text-navy">Assign Vehicles</div>
                          <div className="text-[11px] text-muted">to <span className="font-bold text-navy">{assigningTech?.name}</span></div>
                        </div>
                      </div>
                      <button onClick={() => setAssigningId(null)} className="p-2 hover:bg-gray-100 rounded-full transition-colors">

                      </button>
                    </div>

                    {/* Search bar */}
                    <div className="relative mt-3">
                      <Icon name="search" className="absolute left-3 top-2.5 text-muted text-[18px] pointer-events-none" />
                      <input
                        value={assignSearch}
                        onChange={e => setAssignSearch(e.target.value)}
                        placeholder="Search by model, VIN, color, lot…"
                        className="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-3 py-2 text-[13px] text-navy outline-none focus:border-primary transition-colors"
                        autoFocus
                      />
                      {assignSearch && (
                        <button onClick={() => setAssignSearch('')} className="absolute right-2.5 top-2 p-0.5 hover:bg-gray-200 rounded-full">
                          <Icon name="close" className="text-muted text-[14px]" />

                      {filters.map(f => (

                            ${assignFilter === f.key ? 'bg-primary text-white' : 'bg-gray-100 text-muted hover:bg-gray-200'}`}>
                          {f.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Batch action bar — shown when there are unassigned vehicles in current filter */}
                  {unassignedInFilter > 0 && (
                    <div className="px-5 lg:px-6 py-2.5 bg-primary/5 border-b border-primary/10 flex items-center justify-between flex-shrink-0">
                      <span className="text-[12px] text-navy font-medium">
                        <span className="font-black text-primary">{unassignedInFilter}</span> vehicle{unassignedInFilter !== 1 ? 's' : ''} not yet assigned to {assigningTech?.name}
