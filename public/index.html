                        {batchSaving
                          ? <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin" />
                          : <Icon name="select_all" className="text-[14px]" />}
                        {batchSaving ? 'Assigning…' : `Assign All ${unassignedInFilter}`}
                      </button>
                    </div>
                  )}

                  {/* Vehicle list — 2-col grid on desktop */}
                  {(() => {
                    const totalPages = Math.max(1, Math.ceil(filteredAssign.length / ASSIGN_PAGE_SIZE));
                    const safePage   = Math.min(assignPage, totalPages - 1);
                    const pageSlice  = filteredAssign.slice(safePage * ASSIGN_PAGE_SIZE, (safePage + 1) * ASSIGN_PAGE_SIZE);
                    const startIdx   = safePage * ASSIGN_PAGE_SIZE + 1;
                    const endIdx     = Math.min((safePage + 1) * ASSIGN_PAGE_SIZE, filteredAssign.length);
                    return (
                      <div className="flex-1 overflow-y-auto p-4 lg:p-5 flex flex-col">
                        {filteredAssign.length === 0 ? (
                          <div className="flex flex-col items-center justify-center py-12 gap-3 flex-1">
                            <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                              <Icon name="search_off" className="text-muted text-[24px]" />
                            </div>
                            <p className="text-[13px] text-muted">No vehicles match your search.</p>
                          </div>
                        ) : (
                          <>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
                              {pageSlice.map(v => {
                                const isThisTech = v.assignedTech === assigningId;
                                const otherTech  = !isThisTech && v.assignedTech
                                  ? technicians.find(tc => tc.id === v.assignedTech)
                                  : null;
                                return (
                                  <button key={v.id} onClick={() => handleAssign(v.id)}
                                    className={`w-full flex items-center gap-3 p-3 rounded-[14px] text-left transition-all
                                      ${isThisTech
                                        ? 'bg-primary/10 border border-primary/30'
                                        : 'bg-gray-50 hover:bg-gray-100 border border-transparent'}`}>
                                    <img loading="lazy" src={v.img} alt="" className="w-12 h-8 object-cover rounded-lg flex-shrink-0" />
                                    <div className="flex-1 min-w-0">
                                      <div className="text-[12px] font-black text-navy truncate">{v.label || v.model}</div>
                                      <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                                        <StatusBadge status={v.stage} t={t} />
                                        {v.lot && <span className="text-[9px] text-muted font-medium">Lot {v.lot}</span>}
                                        {otherTech && (
                                          <span className="text-[9px] text-amber-600 font-bold">→ {otherTech.name}</span>
                                        )}
                                        {!v.assignedTech && (
                                          <span className="text-[9px] text-muted">Unassigned</span>
                                        )}
                                      </div>
                                    </div>
                                    {isThisTech
                                      ? <Icon name="check_circle" className="text-primary text-xl flex-shrink-0" fill />
                                      : <Icon name="radio_button_unchecked" className="text-gray-300 text-xl flex-shrink-0" />}
                                  </button>
                                );
                              })}
                            </div>

                            {/* Pagination controls */}
                            {totalPages > 1 && (
                              <div className="flex items-center justify-between mt-4 pt-3 border-t border-gray-100 flex-shrink-0">
                                <span className="text-[11px] text-muted">
                                  {startIdx}–{endIdx} of {filteredAssign.length}
                                </span>
                                <div className="flex items-center gap-1">
                                  <button onClick={() => setAssignPage(0)} disabled={safePage === 0}
                                    className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 disabled:opacity-30 transition-colors">
                                    <Icon name="first_page" className="text-navy text-[16px]" />
                                  </button>
                                  <button onClick={() => setAssignPage(p => Math.max(0, p - 1))} disabled={safePage === 0}
                                    className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 disabled:opacity-30 transition-colors">
                                    <Icon name="chevron_left" className="text-navy text-[16px]" />
                                  </button>
                                  {/* Page number pills */}
                                  {Array.from({ length: totalPages }, (_, i) => i)
                                    .filter(i => Math.abs(i - safePage) <= 2)
                                    .map(i => (
                                      <button key={i} onClick={() => setAssignPage(i)}
                                        className={`w-7 h-7 flex items-center justify-center rounded-lg text-[11px] font-bold transition-all
                                          ${i === safePage ? 'bg-primary text-white' : 'hover:bg-gray-100 text-muted'}`}>
                                        {i + 1}
                                      </button>
                                    ))}
                                  <button onClick={() => setAssignPage(p => Math.min(totalPages - 1, p + 1))} disabled={safePage === totalPages - 1}
                                    className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 disabled:opacity-30 transition-colors">
                                    <Icon name="chevron_right" className="text-navy text-[16px]" />
                                  </button>
                                  <button onClick={() => setAssignPage(totalPages - 1)} disabled={safePage === totalPages - 1}
                                    className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 disabled:opacity-30 transition-colors">
                                    <Icon name="last_page" className="text-navy text-[16px]" />
                                  </button>
                                </div>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    );
                  })()}

                  {/* Footer */}
                  <div className="px-5 lg:px-6 py-3 border-t border-gray-100 flex items-center justify-between flex-shrink-0">
                    <div className="flex items-center gap-3">
                      <span className="text-[11px] text-muted">
                        <span className="font-black text-navy">{assignedToMe}</span> assigned to {assigningTech?.name}
                      </span>
                      {assignedToMe > 0 && (
                        <button onClick={handleUnassignAll} disabled={batchSaving}
                          className="text-[10px] font-bold text-red-400 hover:text-red-600 transition-colors disabled:opacity-40">
                          Unassign all
                        </button>
                      )}
                    </div>
                    <button onClick={() => setAssigningId(null)}
                      className="px-5 py-2 rounded-full bg-primary text-white font-black text-[12px] uppercase tracking-wider shadow-primary-glow hover:brightness-110 transition-all">
                      Done
                    </button>
                  </div>

                </div>
              </div>
            );
          })()}

          <AdminBottomNav navigate={navigate} currentView="team" vehicles={vehicles} t={t} role={role} />
        </div>
      );
    }

    /* ─── ReportsScreen ─── */
    /* ─── Export helpers ─── */
    const exportToCSV = (rows, filename) => {
      const headers = ['Label','VIN','Model','Color','Engine','Fuel','Lot','Stage','Arrival Date','Dealer','Notes'];
      const lines = [headers, ...rows.map(v => [
        v.label||v.model, v.vin||'', v.model||'', v.color||'', v.engine||'', v.fuel||'',
        v.lot||'', v.stage||'', v.arrivalDate||v.arrival_date||'', v.dealer||'', v.notes||'',
      ])];
      const csv = lines.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    };
    const exportToXLSX = (rows, filename) => {
      if (typeof XLSX === 'undefined') { stockmoDialog.alert({ title: 'Not ready', message: 'Excel library not loaded yet. Try again.' }); return; }
      const ws = XLSX.utils.json_to_sheet(rows.map(v => ({
        'Vehicle':      v.label||v.model,
        'VIN':          v.vin||'',
        'Model':        v.model||'',
        'Color':        v.color||'',
        'Engine':       v.engine||'',
        'Fuel':         v.fuel||'',
        'Lot':          v.lot||'',
        'Stage':        v.stage||'',
        'Arrival Date': v.arrivalDate||v.arrival_date||'',
        'Dealer':       v.dealer||'',
        'Notes':        v.notes||'',
      })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Fleet');
      XLSX.writeFile(wb, filename);
    };

    function ReportsScreen({ navigate, vehicles, onNotificationClick, unreadCount, t, role }) {
      const all = vehicles;
      const ALL_STAGES = ['port','pdi','hold','stock','ready','released'];
      const [stageFilter, setStageFilter] = useState([]);   // empty = all
      const [arrivalFrom, setArrivalFrom] = useState('');
      const [arrivalTo,   setArrivalTo]   = useState('');
      const [dealerFilter,setDealerFilter]= useState('');

      const today = new Date().toISOString().slice(0,10);

      const filtered = useMemo(() => {
        return all.filter(v => {
          if (stageFilter.length && !stageFilter.includes(v.stage)) return false;
          const arr = v.arrivalDate || v.arrival_date || '';
          if (arrivalFrom && arr && arr < arrivalFrom) return false;
          if (arrivalTo   && arr && arr > arrivalTo)   return false;
          if (dealerFilter && !(v.dealer||'').toLowerCase().includes(dealerFilter.toLowerCase())) return false;
          return true;
        });
      }, [all, stageFilter, arrivalFrom, arrivalTo, dealerFilter]);

      const toggleStage = s => setStageFilter(prev =>
        prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]
      );

      const pipeline = [
        { labelKey:'statusPort',     count:all.filter(v=>v.stage==='port').length,     max:all.length||1, color:'bg-orange-400' },
        { labelKey:'statusPdi',      count:all.filter(v=>v.stage==='pdi').length,      max:all.length||1, color:'bg-green-400'  },
        { labelKey:'statusHold',     count:all.filter(v=>v.stage==='hold').length,     max:all.length||1, color:'bg-red-400'    },
        { labelKey:'statusStock',    count:all.filter(v=>v.stage==='stock').length,    max:all.length||1, color:'bg-blue-400'   },
        { labelKey:'statusReady',    count:all.filter(v=>v.stage==='ready').length,    max:all.length||1, color:'bg-purple-400' },
        { labelKey:'statusReleased', count:all.filter(v=>v.stage==='released').length, max:all.length||1, color:'bg-emerald-400'},
      ];
      const maintOverdue  = all.filter(v => v.stage === 'stock' && hasMaintDue(v)).length;
      const pdiInProgress = all.filter(v => v.stage === 'pdi').length;
      const holdsCount    = all.filter(v => v.stage === 'hold').length;

      const STAGE_COLORS = { port:'bg-orange-100 text-orange-700 border-orange-300', pdi:'bg-green-100 text-green-700 border-green-300', hold:'bg-red-100 text-red-700 border-red-300', stock:'bg-blue-100 text-blue-700 border-blue-300', ready:'bg-purple-100 text-purple-700 border-purple-300', released:'bg-emerald-100 text-emerald-700 border-emerald-300' };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 lg:px-8 pt-12 lg:pt-7 pb-4 shadow-card">
            <div className="lg:max-w-7xl lg:mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-primary rounded-xl items-center justify-center shadow-md shadow-primary/30 hidden lg:flex">
                  <Icon name="garage" fill className="text-white text-lg" />
                </div>
                <div>
                  <div className="font-black text-navy text-[15px] lg:text-[22px] leading-tight">{t('reports')}</div>
                  <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{t('reportsAnalytics')}</div>
                </div>
              </div>
              <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full lg:hidden">
                <Icon name="notifications" className="text-navy" />
                {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
              </button>
            </div>
          </header>
          <main className="flex-1 overflow-y-auto pb-20 lg:pb-8">
            <div className="bg-white px-5 pb-5 border-b border-gray-100">
              <h1 className="text-[22px] font-black text-navy mt-3 leading-tight">{t('reports')}</h1>
              <p className="text-xs text-muted mb-4">{t('fleetPerformance')}</p>
            </div>
            <div className="p-4 lg:px-8 lg:py-6 space-y-4 lg:max-w-7xl lg:mx-auto">
              {/* KPI cards */}
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
                {[
                  { labelKey:'activePdi',    value:pdiInProgress, icon:'checklist',      color:'text-blue-500',  bg:'bg-blue-50'  },
                  { labelKey:'onHoldLabel',  value:holdsCount,    icon:'error',          color:'text-red-500',   bg:'bg-red-50'   },
                  { labelKey:'maintOverdue', value:maintOverdue,  icon:'schedule',       color:'text-amber-500', bg:'bg-amber-50' },
                  { labelKey:'totalFleet',   value:all.length,    icon:'directions_car', color:'text-navy',      bg:'bg-gray-50'  },
                ].map(kpi => (
                  <div key={kpi.labelKey} className="bg-white rounded-[16px] p-4 shadow-card">
                    <div className={`w-10 h-10 ${kpi.bg} rounded-full flex items-center justify-center mb-2`}>
                      <Icon name={kpi.icon} fill className={`${kpi.color} text-[22px]`} />
                    </div>
                    <div className="text-[26px] font-black text-navy leading-none mb-1">{kpi.value}</div>
                    <div className="text-[11px] text-muted font-medium">{t(kpi.labelKey)}</div>
                  </div>
                ))}
              </div>
              {/* Pipeline chart */}
              <div className="bg-white rounded-[20px] p-4 shadow-card">
                <div className="flex items-center gap-2 mb-4">
                  <Icon name="bar_chart" fill className="text-primary text-[22px]" />
                  <span className="font-bold text-navy text-[14px]">{t('fleetPipeline')}</span>
                </div>
                {pipeline.map(p => {
                  const pct = Math.round((p.count / p.max) * 100);
                  return (
                    <div key={p.labelKey} className="flex items-center gap-3 mb-2.5">
                      <div className="w-20 text-[10px] font-bold uppercase tracking-wider text-muted">{t(p.labelKey)}</div>
                      <div className="flex-1 h-6 bg-gray-100 rounded-full overflow-hidden">
                        <div className={`h-full ${p.color} rounded-full flex items-center pl-3`} style={{ width: `${Math.max(pct, 10)}%` }}>
                          <span className="text-[10px] font-black text-white">{p.count}</span>
                        </div>
                      </div>
                      <div className="w-9 text-[10px] font-bold text-muted text-right">{pct}%</div>
                    </div>
                  );
                })}
              </div>

              {/* ── Export Panel ── */}
              <div className="bg-white rounded-[20px] p-4 shadow-card">
                <div className="flex items-center gap-2 mb-4">
                  <Icon name="download" fill className="text-primary text-[22px]" />
                  <span className="font-bold text-navy text-[14px]">Export Data</span>
                </div>

                {/* Stage filter pills */}
                <p className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Stage</p>
                <div className="flex flex-wrap gap-1.5 mb-4">
                  <button
                    onClick={() => setStageFilter([])}
                    className={`px-3 py-1 rounded-full border text-[11px] font-bold transition-colors ${stageFilter.length === 0 ? 'bg-navy text-white border-navy' : 'bg-gray-50 text-muted border-gray-200 hover:border-navy hover:text-navy'}`}>
                    All
                  </button>
                  {ALL_STAGES.map(s => {
                    const on = stageFilter.includes(s);
                    return (
                      <button key={s} onClick={() => toggleStage(s)}
                        className={`px-3 py-1 rounded-full border text-[11px] font-bold capitalize transition-colors ${on ? STAGE_COLORS[s] + ' font-extrabold' : 'bg-gray-50 text-muted border-gray-200 hover:border-gray-400'}`}>
                        {s}
                      </button>
                    );
                  })}
                </div>

                {/* Date range */}
                <p className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Arrival Date Range</p>
                <div className="flex gap-2 mb-4">
                  <div className="flex-1">
                    <label className="text-[10px] text-muted block mb-1">From</label>
                    <input type="date" value={arrivalFrom} onChange={e => setArrivalFrom(e.target.value)}
                      className="w-full px-3 py-2 border border-gray-200 rounded-xl text-[12px] text-navy outline-none focus:border-primary" />
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] text-muted block mb-1">To</label>
                    <input type="date" value={arrivalTo} onChange={e => setArrivalTo(e.target.value)}
                      className="w-full px-3 py-2 border border-gray-200 rounded-xl text-[12px] text-navy outline-none focus:border-primary" />
                  </div>
                </div>

                {/* Dealer filter */}
                <p className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Dealer</p>
                <input type="text" value={dealerFilter} onChange={e => setDealerFilter(e.target.value)}
                  placeholder="Filter by dealer name…"
                  className="w-full px-3 py-2 border border-gray-200 rounded-xl text-[12px] text-navy outline-none focus:border-primary mb-4" />

                {/* Match count + clear */}
                <div className="flex items-center justify-between mb-4">
                  <span className="text-[12px] font-bold text-navy">{filtered.length} vehicle{filtered.length !== 1 ? 's' : ''} match</span>
                  {(stageFilter.length || arrivalFrom || arrivalTo || dealerFilter) ? (
                    <button onClick={() => { setStageFilter([]); setArrivalFrom(''); setArrivalTo(''); setDealerFilter(''); }}
                      className="text-[11px] text-primary font-bold hover:underline">Clear filters</button>
                  ) : null}
                </div>

                {/* Export buttons */}
                <div className="flex gap-3">
                  <button
                    onClick={() => exportToCSV(filtered, `StockMo_Fleet_${today}.csv`)}
                    disabled={filtered.length === 0}
                    className="flex-1 py-3 bg-navy text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-2 hover:bg-navy/80 transition-colors disabled:opacity-40">
                    <Icon name="download" className="text-base" /> CSV
                  </button>
                  <button
                    onClick={() => exportToXLSX(filtered, `StockMo_Fleet_${today}.xlsx`)}
                    disabled={filtered.length === 0}
                    className="flex-1 py-3 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-2 hover:bg-primary/80 transition-colors disabled:opacity-40">
                    <Icon name="table_chart" className="text-base" /> Excel
                  </button>
                </div>
              </div>
            </div>
          </main>
          <AdminBottomNav navigate={navigate} currentView="reports" vehicles={vehicles} t={t} role={role} />
        </div>
      );
    }

    /* ─── HoldTrackerScreen ─── */
    function HoldTrackerScreen({ navigate, vehicles, updateVehicle, onNotificationClick, unreadCount, t, db, session, role }) {
      const heldVehicles = useMemo(() =>
        [...vehicles.filter(v => v.stage === 'hold')].sort((a, b) => {
          // Sort by longest time on hold — find the most recent hold history entry (raw objects)
          const holdTime = v => {
            const raw = v.historyRaw || [];
            const entry = [...raw].reverse().find(h => h.stage_to === 'hold');
            return entry ? new Date(entry.created_at || 0).getTime() : 0;
          };
          return holdTime(a) - holdTime(b); // oldest hold first
        }),
        [vehicles]
      );

      const [notes, setNotes] = useState({}); // vehicleId → draft note text
      const [saving, setSaving] = useState({}); // vehicleId → bool

      const daysSince = (dateStr) => {
        if (!dateStr) return null;
        const diff = Date.now() - new Date(dateStr).getTime();
        return Math.floor(diff / 86400000);
      };

      const addRepairNote = async (vehicleId, noteText) => {
        if (!noteText?.trim() || !db) return;
        setSaving(p => ({ ...p, [vehicleId]: true }));
        try {
          await db.insertHistory(vehicleId, noteText.trim(), 'hold', 'hold');
          const newEntry = {
            id: Date.now().toString(),
            action: noteText.trim(),
            stage_from: 'hold',
            stage_to: 'hold',
            created_at: new Date().toISOString(),
          };
          // Optimistic update — prepend to historyRaw (objects) and rebuild history (strings)
          updateVehicle(vehicleId, car => {
            const historyRaw = [newEntry, ...(car.historyRaw || [])];
            const history    = historyRaw.map(h => `${(h.created_at || '').slice(0, 10)}: ${h.action || ''}`);
            return { ...car, historyRaw, history };
          });
          setNotes(p => ({ ...p, [vehicleId]: '' }));
        } catch(err) { console.error(err); }
        setSaving(p => ({ ...p, [vehicleId]: false }));
      };

      const resolveVehicle = async (vehicleId, targetStage) => {
        if (!db) return;
        const v = vehicles.find(x => x.id === vehicleId);
        if (!v) return;
        const label = targetStage === 'pdi' ? 'Sent back for re-inspection' : 'Cleared to stock';
        try {
          await db.updateStage(vehicleId, targetStage);
          await db.insertHistory(vehicleId, label, 'hold', targetStage);
          updateVehicle(vehicleId, car => ({ ...car, stage: targetStage }));
        } catch(err) { console.error(err); }
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5] flex flex-col">
          <header className="bg-white px-5 pt-12 lg:pt-6 pb-4 shadow-card">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-primary rounded-xl flex items-center justify-center shadow-md shadow-primary/30">
                  <Icon name="build_circle" fill className="text-white text-lg" />
                </div>
                <div>
                  <div className="font-black text-navy text-[15px] leading-tight">Hold / Repair Tracker</div>
                  <div className="text-[9px] font-bold uppercase tracking-[0.12em] text-muted">{heldVehicles.length} unit{heldVehicles.length !== 1 ? 's' : ''} on hold</div>
                </div>
              </div>
              <button onClick={onNotificationClick} className="relative p-1.5 hover:bg-gray-100 rounded-full">
                <Icon name="notifications" className="text-navy" />
                {unreadCount > 0 && <span className="absolute top-0.5 right-0.5 w-2 h-2 bg-primary rounded-full ring-2 ring-white" />}
              </button>
            </div>
          </header>
          <main className="flex-1 overflow-y-auto pb-24 lg:pb-8">
            {heldVehicles.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 gap-4 text-center px-8">
                <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center">
                  <Icon name="check_circle" fill className="text-green-500 text-[36px]" />
                </div>
                <div className="font-black text-navy text-[18px]">No vehicles on hold</div>
                <div className="text-muted text-[13px]">All units are progressing through the pipeline normally.</div>
              </div>
            ) : (
              <div className="p-4 lg:px-8 lg:py-6 space-y-4 lg:grid lg:grid-cols-2 lg:gap-4 lg:items-start lg:max-w-7xl lg:mx-auto">
                {heldVehicles.map(v => {
                  const raw       = v.historyRaw || [];
                  // Find earliest hold entry (raw is sorted newest-first, so last hold entry)
                  const holdEntry = [...raw].find(h => h.stage_to === 'hold');
                  const daysHeld  = holdEntry ? daysSince(holdEntry.created_at) : null;
                  const pdiIssues   = (v.pdiChecks   || []).filter(c => c.state === 'issue');
                  const finalIssues = (v.finalChecks  || []).filter(c => c.state === 'issue');
                  const allIssues   = [...pdiIssues, ...finalIssues];
                  // Repair log: history entries where vehicle stayed on hold (stage_from=hold, stage_to=hold)
                  const repairLog = raw.filter(h => h.stage_from === 'hold' && h.stage_to === 'hold')
                                       .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                  return (
                    <div key={v.id} className="bg-white rounded-[20px] shadow-card overflow-hidden">
                      {/* Header row */}
                      <div className="flex items-center gap-3 p-4 border-b border-gray-100">
                        <div className="w-16 h-12 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0">
                          <img loading="lazy" src={v.img} alt={v.model} className="w-full h-full object-contain p-1" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-black text-navy text-[14px]">{v.label || v.model}</span>
                            <span className="px-2 py-0.5 bg-red-100 text-red-700 text-[9px] font-black uppercase tracking-wider rounded-full border border-red-200">ON HOLD</span>
                            {daysHeld !== null && <span className="text-[10px] text-muted font-bold">{daysHeld}d</span>}
                          </div>
                          <div className="text-[11px] text-muted mt-0.5">{[v.color, v.lot ? `Lot ${v.lot}` : null].filter(Boolean).join(' · ')}</div>
                        </div>
                      </div>

                      {/* Issues */}
                      {allIssues.length > 0 && (
                        <div className="px-4 py-3 border-b border-gray-100">
                          <div className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Issues ({allIssues.length})</div>
                          <div className="space-y-1.5">
                            {allIssues.map((c, i) => (
                              <div key={i} className="flex items-start gap-2">
                                <div className="w-1.5 h-1.5 bg-red-400 rounded-full mt-2 flex-shrink-0" />
                                <div className="flex-1 min-w-0">
                                  <span className="text-[12px] text-navy font-semibold">{c.name}</span>
                                  {c.priority && <span className="ml-2 text-[9px] font-bold uppercase text-muted">{c.priority}</span>}
                                  {c.note && <div className="text-[11px] text-muted italic mt-0.5">{c.note}</div>}
                                  {c.image_url && <img loading="lazy" src={c.image_url} alt="Issue" className="mt-1 w-full max-h-28 object-cover rounded-lg border border-red-200" />}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Repair Log */}
                      <div className="px-4 py-3 border-b border-gray-100">
                        <div className="text-[10px] font-bold uppercase tracking-wider text-muted mb-2">Repair Log</div>
                        {repairLog.length === 0 && <div className="text-[11px] text-muted italic mb-2">No repair notes yet.</div>}
                        <div className="space-y-1 mb-3">
                          {repairLog.map((h, i) => {
                            const d = h.created_at || h.timestamp;
                            const dateStr = d ? new Date(d).toLocaleDateString() : '';
                            return (
                              <div key={i} className="text-[11px] text-navy bg-gray-50 rounded-lg px-3 py-2">
                                {dateStr && <span className="text-muted font-bold mr-1.5">{dateStr}:</span>}
                                {h.action}
                              </div>
                            );
                          })}
                        </div>
                        {/* Add note input */}
                        <div className="flex gap-2">
                          <input
                            type="text"
                            value={notes[v.id] || ''}
                            onChange={e => setNotes(p => ({ ...p, [v.id]: e.target.value }))}
                            onKeyDown={e => { if (e.key === 'Enter') addRepairNote(v.id, notes[v.id]); }}
                            placeholder="Add repair note…"
                            className="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-[12px] text-navy outline-none focus:border-primary" />
                          <button
                            onClick={() => addRepairNote(v.id, notes[v.id])}
                            disabled={!notes[v.id]?.trim() || saving[v.id]}
                            className="px-4 py-2 bg-navy text-white font-bold text-[12px] rounded-xl disabled:opacity-40 hover:bg-navy/80 transition-colors flex items-center gap-1">
                            {saving[v.id] ? <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin" /> : <Icon name="send" className="text-sm" />}
                          </button>
                        </div>
                      </div>

                      {/* Resolution buttons */}
                      <div className="flex gap-3 p-4">
                        <button
                          onClick={() => resolveVehicle(v.id, 'pdi')}
                          className="flex-1 py-2.5 border-2 border-primary text-primary font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/5 transition-colors active:scale-95">
                          <Icon name="restart_alt" className="text-base" /> Re-inspect
                        </button>
                        <button
                          onClick={() => resolveVehicle(v.id, 'stock')}
                          className="flex-1 py-2.5 bg-primary text-white font-black text-[11px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 hover:bg-primary/80 transition-colors active:scale-95">
                          <Icon name="check_circle" className="text-base" /> Clear to Stock
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>
          <AdminBottomNav navigate={navigate} currentView="hold-tracker" vehicles={vehicles} t={t} role={role} />
        </div>
      );
    }

                <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><Icon name="close" className="text-navy" /></button>
              </div>
            </div>
            <div className="overflow-y-auto flex-1">
              {notifications.length === 0 && (
                <div className="flex flex-col items-center justify-center py-16 gap-3">
                  <div className="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center">
                    <Icon name="notifications_none" className="text-muted text-[28px]" />
                  </div>
                  <p className="text-[13px] text-muted font-medium">{t('allCaughtUp')}</p>
                </div>
              )}
              {notifications.map(n => (
                <div key={n.id} className={`flex items-start gap-3 px-5 py-4 border-b border-gray-50 ${!n.read ? 'bg-primary/[0.02]' : ''}`}>
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${!n.read ? 'bg-primary/10' : 'bg-gray-100'}`}>
                    <Icon name={n.icon} fill className={`${n.color} text-[20px]`} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-start justify-between gap-2">
                      <span className={`text-[13px] text-navy ${!n.read ? 'font-bold' : 'font-medium'}`}>{n.title}</span>
                      <span className="text-[10px] text-muted flex-shrink-0 mt-0.5">{n.time}</span>
                    </div>
                    <p className="text-[11px] text-muted mt-0.5 leading-relaxed">{n.detail}</p>

                  {!n.read && <div className="w-2 h-2 bg-primary rounded-full flex-shrink-0 mt-1.5" />}

    /* ─── PipelineManagerScreen ─── */
    function PipelineManagerScreen({ navigate, t }) {
      const [stages, setStages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editId, setEditId] = useState(null);
      const [editName, setEditName] = useState('');
      const [editColor, setEditColor] = useState('#6b7280');
      const [newName, setNewName] = useState('');
      const [newColor, setNewColor] = useState('#6b7280');
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        sb.from('pipeline_stages').select('*').order('ord')
          .then(({ data, error }) => {
            if (error) console.error('load pipeline_stages', error);
            setStages(data || []); setLoading(false);
          })
          .catch((err) => { console.error('load pipeline_stages', err); setLoading(false); });
      }, []);

      const startEdit = (s) => { setEditId(s.id); setEditName(s.name); setEditColor(s.color || '#6b7280'); };
      const cancelEdit = () => setEditId(null);

      const saveEdit = async () => {
        if (!editName.trim()) return;
        setSaving(true);
        const { error } = await sb.from('pipeline_stages').update({ name: editName.trim(), color: editColor }).eq('id', editId);
        if (error) { console.error('pipeline update', error); await stockmoDialog.alert({ title: 'Save failed', message: error.message }); setSaving(false); return; }
        setStages(prev => prev.map(s => s.id === editId ? { ...s, name: editName.trim(), color: editColor } : s));
        setEditId(null); setSaving(false);
      };

      const addStage = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const maxOrder = stages.reduce((m, s) => Math.max(m, s.ord || 0), 0);
        const slug = newName.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || `stage_${maxOrder + 1}`;
        const { data, error } = await sb.from('pipeline_stages').insert({ name: newName.trim(), color: newColor, ord: maxOrder + 1, slug, active: true }).select().single();
        if (error) { console.error('pipeline insert', error); await stockmoDialog.alert({ title: 'Add failed', message: error.message }); setSaving(false); return; }
        if (data) setStages(prev => [...prev, data]);
        setNewName(''); setSaving(false);
      };

      const deleteStage = async (id) => {
        const ok = await stockmoDialog.confirm({
          title: 'Delete stage?',
          message: 'Vehicles in this stage will need reassignment.',
          confirmLabel: 'Delete',
          danger: true,
        });
        if (!ok) return;
        const { error } = await sb.from('pipeline_stages').delete().eq('id', id);
        if (error) { console.error('pipeline delete', error); await stockmoDialog.alert({ title: 'Delete failed', message: error.message }); return; }
        setStages(prev => prev.filter(s => s.id !== id));
      };

      const moveStage = async (idx, dir) => {
        const next = [...stages];
        const swap = idx + dir;
        if (swap < 0 || swap >= next.length) return;
        [next[idx], next[swap]] = [next[swap], next[idx]];
        next.forEach((s, i) => { s.ord = i + 1; });
        setStages(next);
        await Promise.all(next.map(s => sb.from('pipeline_stages').update({ ord: s.ord }).eq('id', s.id)));
      };

      const inputCls = "w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-[13px] text-navy outline-none focus:border-primary transition-colors";

      return (
        <div className="min-h-screen bg-[#F5F5F5]">
          <div className="bg-white px-5 pt-12 lg:pt-6 pb-4 flex items-center gap-3">
            <button onClick={() => navigate('admin-dashboard')} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <Icon name="arrow_back" className="text-navy" />
            </button>
            <div>
              <h1 className="text-[20px] font-black text-navy">Pipeline Stages</h1>
              <p className="text-[11px] text-muted">Reorder or rename stages. Changes apply immediately.</p>
            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="pipeline-manager" />
          <div className="p-4 lg:px-8 lg:py-6 space-y-3 lg:max-w-3xl lg:mx-auto">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : stages.map((s, idx) => (
              <div key={s.id} className="bg-white rounded-[16px] p-3 shadow-card flex items-center gap-3">
                <div className="w-3 h-10 rounded-full flex-shrink-0" style={{ background: s.color || '#6b7280' }} />
                {editId === s.id ? (
                  <div className="flex-1 space-y-2">
                    <input value={editName} onChange={e => setEditName(e.target.value)} className={inputCls} />
                    <div className="flex items-center gap-2">
                      <label className="text-[11px] text-muted font-bold">Color</label>
                      <input type="color" value={editColor} onChange={e => setEditColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0" />
                      <button onClick={saveEdit} disabled={saving} className="flex-1 py-1.5 bg-primary text-white font-bold text-[11px] rounded-lg">{saving ? 'Saving…' : 'Save'}</button>
                      <button onClick={cancelEdit} className="px-3 py-1.5 bg-gray-100 text-muted font-bold text-[11px] rounded-lg">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex-1">
                    <div className="text-[13px] font-bold text-navy">{s.name}</div>
                    <div className="text-[10px] text-muted">Order {s.ord}</div>
                  </div>
                )}
                {editId !== s.id && (
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <button onClick={() => moveStage(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-gray-100 rounded-lg disabled:opacity-30 transition-colors"><Icon name="arrow_upward" className="text-muted text-sm" /></button>
                    <button onClick={() => moveStage(idx, 1)} disabled={idx === stages.length - 1} className="p-1.5 hover:bg-gray-100 rounded-lg disabled:opacity-30 transition-colors"><Icon name="arrow_downward" className="text-muted text-sm" /></button>
                    <button onClick={() => startEdit(s)} className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors"><Icon name="edit" className="text-navy text-sm" /></button>
                    <button onClick={() => deleteStage(s.id)} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors"><Icon name="delete" className="text-red-400 text-sm" /></button>
                  </div>
                )}
              </div>
            ))}
            {/* Add new stage */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add New Stage</div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Stage name…" className={inputCls} />
              <div className="flex items-center gap-3">
                <label className="text-[11px] text-muted font-bold">Color</label>
                <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0" />
                <button onClick={addStage} disabled={!newName.trim() || saving}
                  className="flex-1 py-2 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 disabled:opacity-40 hover:brightness-110 active:scale-[0.98] transition-all">
                  <Icon name="add" className="text-sm" /> Add Stage
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── ChecklistEditorScreen ─── */
    function ChecklistEditorScreen({ navigate, t }) {
      const [tab,         setTab]         = useState('pdi');
      const [items,       setItems]       = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [saving,      setSaving]      = useState(false);
      const [editId,      setEditId]      = useState(null);
      const [editFields,  setEditFields]  = useState({});
      const [newName,     setNewName]     = useState('');
      const [newSection,  setNewSection]  = useState('Exterior');
      const [newPriority, setNewPriority] = useState('med');
      const [newFreq,     setNewFreq]     = useState(30);

      const TABLE_MAP = { pdi: 'pdi_item_templates', maint: 'maint_task_templates', final: 'final_check_templates' };
      const table = TABLE_MAP[tab];
      const SECTIONS = ['Exterior', 'Interior', 'Mechanical', 'Electrical', 'Documents'];
      const inputCls = "bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[13px] text-navy outline-none focus:border-primary transition-colors";

      const load = async () => {
        setLoading(true); setEditId(null);
        const { data } = await sb.from(table).select('*').order('ord');
        setItems(data || []); setLoading(false);
      };
      useEffect(() => { load(); }, [tab]);

      const toggleActive = async (item) => {
        await sb.from(table).update({ active: !item.active }).eq('id', item.id);
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, active: !i.active } : i));
      };

      const startEdit = (item) => {
        setEditId(item.id);
        setEditFields({ name: item.name, section: item.section || 'Exterior', priority: item.priority || 'med', frequency_days: item.frequency_days || 30 });
      };

      const saveEdit = async (item) => {
        if (!editFields.name.trim()) return;
        setSaving(true);
        const update = tab === 'maint'
          ? { name: editFields.name.trim(), frequency_days: Number(editFields.frequency_days) || 30, priority: editFields.priority }
          : { name: editFields.name.trim(), section: editFields.section, priority: editFields.priority };
        const { error } = await sb.from(table).update(update).eq('id', item.id);
        if (error) { console.error('template update', error); showToastMsg?.('Save failed: ' + error.message); setSaving(false); return; }
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, ...update } : i));

        // Cascade name/section/priority changes to existing pending check rows
        try {
          if (tab === 'pdi') {
            await sb.from('pdi_checks')
              .update({ name: update.name, section: update.section, priority: update.priority })
              .eq('item_id', item.id).eq('state', 'pending');
          } else if (tab === 'final') {
            await sb.from('final_checks')
              .update({ name: update.name, section: update.section, priority: update.priority })
              .eq('item_id', item.id).eq('state', 'pending');
          } else if (tab === 'maint') {
            await sb.from('stock_maintenance')
              .update({ name: update.name, freq_days: update.frequency_days, priority: update.priority })
              .eq('task_id', item.id).eq('state', 'pending');
          }
        } catch (cascadeErr) {
          console.error('cascade update error', cascadeErr);
        }

        setEditId(null); setSaving(false);
      };

      const deleteItem = async (item) => {
        const ok = await stockmoDialog.confirm({
          title: 'Delete item?',
          message: `"${item.name}" will be removed from the template. Existing vehicles in progress keep this item — only new vehicles will skip it.`,
          confirmLabel: 'Delete',
          danger: true,
        });
        if (!ok) return;
        await sb.from(table).delete().eq('id', item.id);
        setItems(prev => prev.filter(i => i.id !== item.id));
      };

      const addItem = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const maxOrd = items.reduce((m, i) => Math.max(m, i.ord || 0), 0);
        const row = tab === 'maint'
          ? { name: newName.trim(), frequency_days: Number(newFreq) || 30, priority: newPriority, ord: maxOrd + 1, active: true }
          : { name: newName.trim(), section: newSection, priority: newPriority, ord: maxOrd + 1, active: true };
        const { data, error } = await sb.from(table).insert(row).select().single();
        if (error) { console.error('template insert', error); showToastMsg?.('Add failed: ' + error.message); setSaving(false); return; }
        if (data) {
          setItems(prev => [...prev, data]);
          // Seed this new template item onto all existing in-flight vehicles (not yet released)
          try {
            const { data: inFlight } = await sb.from('vehicles').select('id').neq('stage', 'released');
            if (inFlight?.length) {
              const today = new Date().toISOString().split('T')[0];
              let seedRows;
              let checkTable;
              let conflictKey;
              if (tab === 'pdi') {
                checkTable = 'pdi_checks';
                conflictKey = 'vehicle_id,item_id';
                seedRows = inFlight.map(v => ({ vehicle_id: v.id, item_id: data.id, section: data.section, name: data.name, priority: data.priority, state: 'pending' }));
              } else if (tab === 'final') {
                checkTable = 'final_checks';
                conflictKey = 'vehicle_id,item_id';
                seedRows = inFlight.map(v => ({ vehicle_id: v.id, item_id: data.id, section: data.section, name: data.name, priority: data.priority, state: 'pending' }));
              } else if (tab === 'maint') {
                checkTable = 'stock_maintenance';
                conflictKey = 'vehicle_id,task_id';
                const freqDays = Number(newFreq) || 30;
                const nextDue = new Date(today);
                nextDue.setDate(nextDue.getDate() + freqDays);
                const nextDueStr = nextDue.toISOString().split('T')[0];
                seedRows = inFlight.map(v => ({ vehicle_id: v.id, task_id: data.id, name: data.name, freq_days: freqDays, priority: data.priority, state: 'pending', last_done: today, next_due: nextDueStr }));
              }
              if (seedRows && checkTable) {
                await sb.from(checkTable).upsert(seedRows, { onConflict: conflictKey });
              }
            }
          } catch (seedErr) {
            console.error('seed new item to in-flight vehicles error', seedErr);
          }
        }
        setNewName(''); setSaving(false);
      };

      return (
        <div className="min-h-screen bg-[#F5F5F5]">
          <div className="bg-white px-5 pt-12 lg:pt-6 pb-4 flex items-center gap-3">
            <button onClick={() => navigate('admin-dashboard')} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <Icon name="arrow_back" className="text-navy" />
            </button>
            <div>
              <h1 className="text-[20px] font-black text-navy">Checklist Editor</h1>
              <p className="text-[11px] text-muted">Manage PDI, Maintenance &amp; Final Check templates.</p>
            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="checklist-editor" />
          <div className="lg:max-w-3xl lg:mx-auto">
          <nav className="bg-white border-b border-gray-100 flex px-2">
            {[['pdi','PDI'],['maint','Maintenance'],['final','Final']].map(([key, label]) => (
              <button key={key} onClick={() => setTab(key)}
                className={`flex-1 py-3 text-[10px] font-bold tracking-widest transition-colors ${tab === key ? 'text-primary border-b-2 border-primary' : 'text-muted border-b-2 border-transparent'}`}>
                {label}
              </button>
            ))}
          </nav>
          <div className="p-4 lg:px-6 lg:py-4 space-y-2">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : items.map(item => (
              <div key={item.id} className={`bg-white rounded-[14px] shadow-card overflow-hidden transition-opacity ${!item.active && editId !== item.id ? 'opacity-55' : ''}`}>
                {editId === item.id ? (
                  /* ── inline edit form ── */
                  <div className="p-3 space-y-2.5">
                    <input
                      value={editFields.name}
                      onChange={e => setEditFields(f => ({ ...f, name: e.target.value }))}
                      className={inputCls + ' w-full'}
                      placeholder="Item description…"
                      autoFocus
                    />
                    <div className="flex gap-2">
                      {tab !== 'maint' && (
                        <select value={editFields.section} onChange={e => setEditFields(f => ({ ...f, section: e.target.value }))}
                          className={inputCls + ' flex-1 appearance-none'}>
                          {SECTIONS.map(s => <option key={s}>{s}</option>)}
                        </select>
                      )}
                      {tab === 'maint' && (
                        <div className="flex-1 flex items-center gap-1.5">
                          <input type="number" min="1" max="365" value={editFields.frequency_days}
                            onChange={e => setEditFields(f => ({ ...f, frequency_days: e.target.value }))}
                            className={inputCls + ' w-full'} placeholder="Days" />
                          <span className="text-[11px] text-muted whitespace-nowrap">days</span>
                        </div>
                      )}
                      <select value={editFields.priority} onChange={e => setEditFields(f => ({ ...f, priority: e.target.value }))}
                        className={inputCls + ' flex-1 appearance-none'}>
                        <option value="high">High</option>
                        <option value="med">Med</option>
                        <option value="low">Low</option>
                      </select>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setEditId(null)}
                        className="flex-1 py-1.5 rounded-full bg-gray-100 text-muted text-[11px] font-bold hover:bg-gray-200 transition-all">
                        Cancel
                      </button>
                      <button onClick={() => saveEdit(item)} disabled={!editFields.name.trim() || saving}
                        className="flex-1 py-1.5 rounded-full bg-primary text-white text-[11px] font-bold hover:brightness-110 transition-all disabled:opacity-40">
                        {saving ? 'Saving…' : 'Save'}
                      </button>
                    </div>
                  </div>
                ) : (
                  /* ── normal display row ── */
                  <div className="flex items-center gap-2 p-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-[12px] font-bold text-navy leading-snug">{item.name}</div>
                      <div className="flex items-center gap-2 mt-0.5">
                        {item.section && <span className="text-[9px] font-bold uppercase text-muted tracking-wider">{item.section}</span>}
                        {item.frequency_days && <span className="text-[9px] font-bold uppercase text-muted tracking-wider">Every {item.frequency_days}d</span>}
                        <StatusBadge status={item.priority} />
                      </div>
                    </div>
                    <div className="flex items-center gap-1 flex-shrink-0">
                      <button onClick={() => startEdit(item)} className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors" title="Edit">
                        <Icon name="edit" className="text-muted text-[16px]" />
                      </button>
                      <button onClick={() => toggleActive(item)}
                        className={`px-2.5 py-1 rounded-full text-[10px] font-bold transition-all ${item.active ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-muted'}`}>
                        {item.active ? 'On' : 'Off'}
                      </button>
                      <button onClick={() => deleteItem(item)} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors" title="Delete">
                        <Icon name="delete" className="text-red-400 text-[16px]" />
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}

            {/* ── Add new item ── */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200 mt-4">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add Item</div>
              <input value={newName} onChange={e => setNewName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addItem()}
                placeholder="Item description…" className={inputCls + ' w-full'} />
              <div className="flex gap-2">
                {tab !== 'maint' && (
                  <select value={newSection} onChange={e => setNewSection(e.target.value)} className={inputCls + ' flex-1 appearance-none'}>
                    {SECTIONS.map(s => <option key={s}>{s}</option>)}
                  </select>
                )}
                {tab === 'maint' && (
                  <input type="number" min="1" value={newFreq} onChange={e => setNewFreq(e.target.value)}
                    placeholder="Days" className={inputCls + ' flex-1'} />
                )}
                <select value={newPriority} onChange={e => setNewPriority(e.target.value)} className={inputCls + ' flex-1 appearance-none'}>
                  <option value="high">High</option>
                  <option value="med">Med</option>
                  <option value="low">Low</option>
                </select>
              </div>
              <button onClick={addItem} disabled={!newName.trim() || saving}
                className="w-full py-2 bg-primary text-white font-black text-[12px] uppercase tracking-wider rounded-full flex items-center justify-center gap-1.5 disabled:opacity-40 hover:brightness-110 active:scale-[0.98] transition-all">
                <Icon name="add" className="text-sm" /> {saving ? 'Saving…' : 'Add Item'}
              </button>
            </div>
          </div>
          </div>{/* end lg:max-w-3xl */}
        </div>
      );
    }

    /* ─── ModelManagerScreen ─── */
    function ModelManagerScreen({ navigate, t }) {
      const [models, setModels]     = useState([]);
      const [loading, setLoading]   = useState(true);
      const [expanded, setExpanded] = useState(null);
      const [saving, setSaving]     = useState(false);

      // New model form
      const [newName,    setNewName]    = useState('');
      const [newVariant, setNewVariant] = useState('');
      const [newEngine,  setNewEngine]  = useState('');
      const [newFuel,    setNewFuel]    = useState('Gasoline');
      const [newColors, setNewColors] = useState([]); // array of strings
      const [colorInput, setColorInput] = useState('');

      // Per-model color editing (for existing models)
      const [editColorId, setEditColorId]     = useState(null); // model id being edited
      const [editColorInput, setEditColorInput] = useState('');

        sb.from('vehicle_models').select('*').order('name')

        const c = colorInput.trim();
        if (!c || newColors.includes(c)) return;
        setNewColors(prev => [...prev, c]);
        setColorInput('');

        setSaving(true);
        const fuel = newFuel || detectFuel(newVariant, newName);

          name:      newName.trim(),
          variant:   newVariant.trim(),

          fuel_type: fuel,
          color_options: newColors,

        if (!c) return;
        const current = model.color_options || [];
        if (current.includes(c)) { setEditColorInput(''); return; }

        if (!model.id.startsWith('local-')) {
          await sb.from('vehicle_models').update({ color_options: updated }).eq('id', model.id);
        }
        setModels(prev => prev.map(m => m.id === model.id ? { ...m, color_options: updated } : m));
        setEditColorInput('');
      };

      const removeColorFromModel = async (model, color) => {
        const updated = (model.color_options || []).filter(c => c !== color);
        if (!model.id.startsWith('local-')) {
          await sb.from('vehicle_models').update({ color_options: updated }).eq('id', model.id);
        }
        setModels(prev => prev.map(m => m.id === model.id ? { ...m, color_options: updated } : m));
      };

      const inputCls = "bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-[13px] text-navy outline-none focus:border-primary transition-colors";

      return (
        <div className="min-h-screen bg-[#F5F5F5]">
          <div className="bg-white px-5 pt-12 lg:pt-6 pb-4 flex items-center gap-3">

              <Icon name="arrow_back" className="text-navy" />
            </button>
            <div>
              <h1 className="text-[20px] font-black text-navy">Model Manager</h1>
              <p className="text-[11px] text-muted">Add or remove vehicle model configurations.</p>
            </div>
          </div>
          <ConfigSubNav navigate={navigate} current="model-manager" />
          <div className="p-4 lg:px-8 lg:py-6 space-y-3 lg:max-w-3xl lg:mx-auto">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-6 h-6 border-[3px] border-primary border-t-transparent rounded-full animate-spin" /></div>
            ) : models.map(m => (
              <div key={m.id} className="bg-white rounded-[16px] shadow-card overflow-hidden">
                <button onClick={() => { setExpanded(expanded === m.id ? null : m.id); setEditColorId(null); setEditColorInput(''); }}
                  className="w-full flex items-center gap-3 p-3 text-left hover:bg-gray-50 transition-colors">
                  <div className="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                    <Icon name="directions_car" className="text-primary text-lg" />
                  </div>
                  <div className="flex-1">
                    <div className="text-[13px] font-black text-navy">{m.name}</div>
                    <div className="text-[10px] text-muted">{m.engine} · {m.fuel_type || ''} · <span className="font-semibold">{(m.color_options||[]).length} color{(m.color_options||[]).length !== 1 ? 's' : ''}</span></div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={e => { e.stopPropagation(); deleteModel(m.id); }} className="p-1.5 hover:bg-red-50 rounded-lg transition-colors">
                      <Icon name="delete" className="text-red-400 text-sm" />
                    </button>
                    <Icon name={expanded === m.id ? 'expand_less' : 'expand_more'} className="text-muted" />
                  </div>
                </button>
                {expanded === m.id && (
                  <div className="px-4 pb-4 border-t border-gray-100 space-y-3 pt-3">
                    <div className="text-[10px] font-black uppercase tracking-widest text-muted">Color Options</div>
                    {/* Color chips */}
                    <div className="flex flex-wrap gap-1.5 min-h-[28px]">
                      {(m.color_options || []).map(c => (
                        <span key={c} className="flex items-center gap-1 pl-2.5 pr-1.5 py-1 bg-gray-100 text-navy text-[11px] font-semibold rounded-full">
                          {c}
                          <button onClick={() => removeColorFromModel(m, c)}
                            className="w-3.5 h-3.5 flex items-center justify-center rounded-full bg-gray-300 hover:bg-red-200 transition-colors">
                            <Icon name="close" className="text-[9px] text-navy" />
                          </button>
                        </span>
                      ))}
                      {!(m.color_options?.length) && <span className="text-[12px] text-muted italic">No colors yet</span>}
                    </div>
                    {/* Add color input */}
                    <div className="flex gap-2">
                      <input
                        value={editColorId === m.id ? editColorInput : ''}
                        onFocus={() => { setEditColorId(m.id); }}
                        onChange={e => setEditColorInput(e.target.value)}

                      <button

                        Add
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}

            {/* ── Add new model ── */}
            <div className="bg-white rounded-[16px] p-4 shadow-card space-y-3 border-2 border-dashed border-gray-200">
              <div className="text-[11px] font-bold uppercase tracking-widest text-muted">Add Model</div>
              <input value={newName} onChange={e => setNewName(e.target.value)}
                placeholder="Model name (e.g. GS3 Emzoom)" className={inputCls + ' w-full'} />
              <input value={newVariant} onChange={e => setNewVariant(e.target.value)}
                placeholder="Variant (e.g. Premium, Elite — optional)" className={inputCls + ' w-full'} />
              <input value={newEngine} onChange={e => setNewEngine(e.target.value)}
                placeholder="Engine (e.g. 1.5T 174hp 7-DCT — optional)" className={inputCls + ' w-full'} />
              <select value={newFuel} onChange={e => setNewFuel(e.target.value)} className={inputCls + ' w-full appearance-none'}>
                <option>Gasoline</option>
                <option>Diesel</option>
                <option>HEV</option>
                <option>PHEV</option>
                <option>Electric</option>
              </select>

              {/* Color input for new model */}
              <div className="space-y-2">
                <div className="text-[10px] font-bold uppercase tracking-widest text-muted">Colors</div>
                {newColors.length > 0 && (
                  <div className="flex flex-wrap gap-1.5">
                    {newColors.map(c => (
                      <span key={c} className="flex items-center gap-1 pl-2.5 pr-1.5 py-1 bg-primary/10 text-primary text-[11px] font-semibold rounded-full">
                        {c}
                        <button onClick={() => removeColorFromNew(c)}
                          className="w-3.5 h-3.5 flex items-center justify-center rounded-full bg-primary/20 hover:bg-red-200 transition-colors">
                          <Icon name="close" className="text-[9px] text-primary" />

                <div className="flex gap-2">
                  <input

                    onChange={e => setColorInput(e.target.value)}

                  />
                  <button onClick={addColorToNew} disabled={!colorInput.trim()}

                <Icon name="add" className="text-sm" /> {saving ? 'Saving…' : 'Add Model'}
              </button>
            </div>
          </div>
        </div>
      );
    }
